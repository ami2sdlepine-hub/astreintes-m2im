async function saveNewDossier() {
  // V2.16.0 — Type optionnel à la création (qualification possible plus tard)
  if (!tempDossier || !tempDossier.etablissement) {
    toast('Établissement obligatoire', 'error');
    return;
  }
  
  // Si type non choisi, on laisse à null → le dossier sera "À qualifier"
  if (tempDossier.type === 'telephone') {
    tempDossier.statut = 'cloture';
  } else if (tempDossier.type === 'deplacement') {
    tempDossier.statut = 'intervention';
    if (tempDossier.pointDepart === 'autre-site') {
      const openSeq = findOpenSequence();
      // Si une séquence est ouverte, on rejoint cette séquence
      // Sinon on crée une nouvelle séquence ET on marque automatiquement le départ domicile à X
      if (openSeq) {
        tempDossier.sequenceId = openSeq.sequenceId;
      } else {
        tempDossier.sequenceId = uid();
      }
      // Auto-marquer le départ domicile à X (chaînage entrant)
      tempDossier.departDomicile = 'X';
    } else {
      tempDossier.sequenceId = uid();
    }
  } else {
    // V2.16.0 — Type non choisi : statut "pending" (à qualifier)
    tempDossier.statut = 'pending';
  }
  
  // Ajouter aux favoris (pour auto-complétion future)
  if (tempDossier.etablissement && !state.settings.favorisEtablissements.includes(tempDossier.etablissement)) {
    state.settings.favorisEtablissements = state.settings.favorisEtablissements || [];
    state.settings.favorisEtablissements.unshift(tempDossier.etablissement);
    if (state.settings.favorisEtablissements.length > 20) {
      state.settings.favorisEtablissements = state.settings.favorisEtablissements.slice(0, 20);
    }
    await saveSettings();
  }
  
  // V2.9.9 — Nettoyer le flag _isEdit (résidu d'édition)
  delete tempDossier._isEdit;
  
  // V2.11.1 — Si le dossier est créé par admin/manager pour un tech, retour à la vue d'origine
  const isForTech = tempDossier._createdByAdmin === true;
  const targetUsername = tempDossier.username || 'le technicien';
  const returnTo = tempDossier._returnTo || 'dashboard-admin';
  delete tempDossier._createdByAdmin;
  delete tempDossier._returnTo;
  
  await saveDossier(tempDossier);
  haptic('success');
  
  if (isForTech) {
    toast(`✅ Dossier créé pour ${targetUsername}`, 'success');
    // Retour à la vue d'origine (Dashboard ou Manager-view)
    view.current = returnTo;
    tempDossier = null;
    render();
    // Recharger les données du dashboard ou manager
    if (returnTo === 'dashboard-admin') {
      await dashboardLoadData();
    } else if (returnTo === 'manager-view') {
      await managerLoadDossiers();
    }
    return;
  }
  
  toast(tempDossier.type === 'telephone' ? 'Appel enregistré' : 'Dossier créé', 'success');
  
  if (tempDossier.type === 'deplacement') {
    view.dossierId = tempDossier.id;
    view.current = 'detail';
  } else {
    view.current = 'list';
  }
  tempDossier = null;
  render();
}

async function setTimestampNow(field) {
  const d = state.dossiers.find(x => x.id === view.dossierId);
  if (!d) return;
  
  // V2.9.3 — Bug fix : pour les dossiers passés (saisie rétroactive)
  // on prend la date d'appel du dossier au lieu de "aujourd'hui"
  const now = new Date();
  const dossierDate = d.dateAppel ? new Date(d.dateAppel) : null;
  let timestamp;
  
  if (dossierDate) {
    // Détecter si on est sur un dossier de plus d'1h dans le passé
    // → on suppose saisie rétroactive → on garde la date du dossier
    const dossierToday = new Date(dossierDate.getFullYear(), dossierDate.getMonth(), dossierDate.getDate());
    const realToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    
    if (dossierToday.getTime() !== realToday.getTime()) {
      // V2.15.4 — Détection du cas "intervention de nuit qui déborde sur lendemain"
      // Ex: appel à 22h hier soir, le tech clique "Arrivée site" à 00:05 ce matin
      //     → on est techniquement sur le lendemain de dateAppel, mais c'est juste
      //        le passage minuit, pas une vraie saisie rétroactive
      // Critères : différence entre dossierDate et now < 12h ET on est dans la même nuit (now avant 12h)
      const hoursSinceAppel = (now - dossierDate) / 3600000;
      const isNightContinuation = hoursSinceAppel >= 0 && hoursSinceAppel < 12 && now.getHours() < 12;
      
      if (isNightContinuation) {
        // Cas "passage minuit" : on utilise simplement now (le tech est en train de travailler maintenant)
        timestamp = now;
      } else {
        // Saisie vraiment rétroactive (dossier d'un jour ancien) : utiliser la date du dossier + heure actuelle
        timestamp = new Date(dossierDate);
        timestamp.setHours(now.getHours(), now.getMinutes(), 0, 0);
        
        // Si le retourDomicile est plus tôt que le départ → passage minuit → +1 jour
        if (field === 'retourDomicile' && d.departDomicile && d.departDomicile !== 'X') {
          const departDate = new Date(d.departDomicile);
          if (timestamp < departDate) {
            timestamp.setDate(timestamp.getDate() + 1);
          }
        } else if (field === 'arriveeSite' && d.departDomicile && d.departDomicile !== 'X') {
          const departDate = new Date(d.departDomicile);
          if (timestamp < departDate) {
            timestamp.setDate(timestamp.getDate() + 1);
          }
        } else if (field === 'departSite' && d.arriveeSite) {
          const arriveeDate = new Date(d.arriveeSite);
          if (timestamp < arriveeDate) {
            timestamp.setDate(timestamp.getDate() + 1);
          }
        } else if (field === 'retourDomicile' && d.departSite) {
          const departSiteDate = new Date(d.departSite);
          if (timestamp < departSiteDate) {
            timestamp.setDate(timestamp.getDate() + 1);
          }
        }
      }
    } else {
      // Saisie temps réel : utiliser maintenant
      timestamp = now;
    }
  } else {
    timestamp = now;
  }
  
  // V2.15.4 — GARDE-FOU FINAL : si le timestamp calculé est AVANT dateAppel, c'est impossible
  // (on ne peut pas être arrivé sur site AVANT l'appel). Forcer le lendemain.
  if (d.dateAppel && field !== 'departDomicile') {
    const appel = new Date(d.dateAppel);
    if (timestamp < appel) {
      console.warn('[V2.15.4] Timestamp avant dateAppel détecté, correction auto au lendemain :', field);
      // Avancer d'1 jour pour que ce soit après dateAppel
      timestamp.setDate(timestamp.getDate() + 1);
    }
  }
  
  d[field] = roundTo5(timestamp).toISOString();
  recalcDurations(d);
  
  if (field === 'retourDomicile' && d.statut === 'intervention') {
    d.statut = 'cloture';
    await saveDossier(d);
    haptic('success');
    toast(`Clôturé • ${d.totalTrajetCalcule || '—'} payés`, 'success');
    render();
    return;
  }
  
  await saveDossier(d);
  haptic('medium');
  toast(`${field} : ${fmtTime(d[field])}`, 'success');
  render();
}

async function editTimestamp(field) {
  const d = state.dossiers.find(x => x.id === view.dossierId);
  if (!d) return;
  const current = d[field] ? new Date(d[field]) : new Date();
  const newDate = await showTimePicker(current, `${field}`);
  if (!newDate) return;
  let finalDate = roundTo5(newDate);
  
  // V2.11.0 — GARDE-FOU 1 (refonte) : forcer la date sur la BONNE référence
  // - Pour departDomicile : date de dateAppel (premier événement)
  // - Pour arriveeSite : date de departDomicile (sinon dateAppel)
  // - Pour departSite : date d'arriveeSite (sinon dateAppel)
  // - Pour retourDomicile : date de departSite (sinon arriveeSite)
  // Cela gère naturellement les passages minuit : si arriveeSite est au 16/05,
  // alors departSite hérite du 16/05 (pas du 15/05 comme dateAppel).
  if (d.dateAppel && ['arriveeSite', 'departSite', 'departDomicile', 'retourDomicile'].includes(field)) {
    const refFieldByTarget = {
      'departDomicile': 'dateAppel',
      'arriveeSite': 'departDomicile',
      'departSite': 'arriveeSite',
      'retourDomicile': 'departSite'
    };
    
    // Trouver la meilleure date de référence (le timestamp précédent valide)
    let refDateStr = null;
    let candidate = refFieldByTarget[field];
    while (candidate) {
      const v = candidate === 'dateAppel' ? d.dateAppel : d[candidate];
      if (v && v !== 'X') {
        refDateStr = v;
        break;
      }
      // Remonter à la référence précédente
      candidate = refFieldByTarget[candidate];
    }
    // Fallback : dateAppel
    if (!refDateStr) refDateStr = d.dateAppel;
    
    const refDate = new Date(refDateStr);
    // Forcer la date (jour/mois/année) à celle de la référence, en gardant les heures/minutes saisies
    finalDate = new Date(
      refDate.getFullYear(), refDate.getMonth(), refDate.getDate(),
      finalDate.getHours(), finalDate.getMinutes(), finalDate.getSeconds()
    );
  }
  
  // V2.9 — Protection passage minuit
  // Si on modifie un timestamp qui doit être APRÈS un autre, on vérifie
  const checkAfterField = {
    'arriveeSite': 'departDomicile',
    'departSite': 'arriveeSite',
    'retourDomicile': 'departSite'
  };
  
  const previousField = checkAfterField[field];
  if (previousField && d[previousField] && d[previousField] !== 'X') {
    const previousDate = new Date(d[previousField]);
    if (finalDate < previousDate) {
      // L'heure saisie est AVANT le timestamp précédent → bascule probable au jour suivant
      const nextDayDate = new Date(finalDate);
      nextDayDate.setDate(nextDayDate.getDate() + 1);
      
      const confirmed = await showConfirm(
        '🌙 Passage minuit ?',
        `L'heure saisie (${fmtTime(finalDate)}) est avant ${fmtTime(previousDate)} (${labelField(previousField)}). ` +
        `Tu veux dire le lendemain à ${fmtTime(finalDate)} ? Total estimé : ${fmtDuration(diffMs(previousDate, nextDayDate))}.`
      );
      
      if (confirmed) {
        finalDate = nextDayDate;
      }
    }
  }
  
  // V2.11.0 — GARDE-FOU 2 : alerte si la date est > 36h de dateAppel
  // (sauf chaînage sur weekend long, qui peut effectivement durer ~64h)
  if (d.dateAppel && field !== 'dateAppel') {
    const appel = new Date(d.dateAppel);
    const diffHours = Math.abs((finalDate - appel) / 3600000);
    if (diffHours > 36) {
      const confirmed = await showConfirm(
        '⚠️ Date inhabituelle',
        `L'horodatage est à ${Math.round(diffHours)}h de la date de l'appel. ` +
        `Es-tu sûr ? (Confirme uniquement si c'est un weekend long ou un cas particulier)`
      );
      if (!confirmed) return;
    }
  }
  
  d[field] = finalDate.toISOString();
  recalcDurations(d);
  
  // Auto-clôture quand on saisit/modifie le retour domicile
  if (field === 'retourDomicile' && d.statut === 'intervention') {
    d.statut = 'cloture';
    d.cloture = true; // V2.16.6 — cohérence du flag de clôture
    await saveDossier(d);
    haptic('success');
    toast(`Clôturé • ${d.totalTrajetCalcule || '—'} payés`, 'success');
    render();
    cloudSaveCritical(d); // V2.16.6 GF#2 — sauvegarde vérifiée (action critique)
    return;
  }
  
  await saveDossier(d);
  render();
}

function showTimePicker(initialDate, title = 'Choisir l\'heure', noRound = false) {
  return new Promise((resolve) => {
    const baseDate = noRound ? new Date(initialDate) : roundTo5(initialDate);
    const initialValue = `${baseDate.getHours().toString().padStart(2,'0')}:${baseDate.getMinutes().toString().padStart(2,'0')}`;
    const stepValue = noRound ? '60' : '300'; // 1 min ou 5 min
    
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">${title}</div>
        <div class="modal-subtitle">${noRound ? 'Sélectionne l\'heure exacte' : 'Arrondie au 5 minutes le plus proche'}</div>
        
        <input type="time" id="native-time-picker" value="${initialValue}" step="${stepValue}"
               style="width:100%;font-size:32px;text-align:center;padding:20px;background:var(--bg-subtle);
                      border:2px solid var(--accent);border-radius:var(--radius-lg);margin-bottom:16px;
                      color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:800;
                      font-variant-numeric:tabular-nums;letter-spacing:-0.02em;">
        
        <div class="time-quick-options">
          <button class="time-quick" data-tp="now">⏱ Maintenant</button>
          <button class="time-quick" data-tp="hour-back">↩ −1h</button>
          <button class="time-quick" data-tp="hour-forward">→ +1h</button>
        </div>
        
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-secondary" style="flex:1" data-tp="cancel">Annuler</button>
          <button class="btn btn-primary" style="flex:1" data-tp="ok">Valider</button>
        </div>
      </div>
    `;
    
    const input = overlay.querySelector('#native-time-picker');
    
    overlay.querySelectorAll('[data-tp]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const action = e.currentTarget.dataset.tp;
        haptic('light');
        if (action === 'now') {
          const now = noRound ? new Date() : roundTo5(new Date());
          input.value = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        } else if (action === 'hour-back') {
          const [hh, mm] = input.value.split(':').map(Number);
          let newH = (hh - 1 + 24) % 24;
          input.value = `${newH.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;
        } else if (action === 'hour-forward') {
          const [hh, mm] = input.value.split(':').map(Number);
          let newH = (hh + 1) % 24;
          input.value = `${newH.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;
        } else if (action === 'cancel') {
          overlay.remove(); resolve(null);
        } else if (action === 'ok') {
          const [hh, mm] = input.value.split(':').map(Number);
          const result = new Date(initialDate);
          result.setHours(hh, mm, 0, 0);
          overlay.remove();
          resolve(noRound ? result : roundTo5(result));
        }
      });
    });
    
    overlay.addEventListener('click', () => { overlay.remove(); resolve(null); });
    document.body.appendChild(overlay);
    
    setTimeout(() => input.focus(), 100);
  });
}

function showDatePicker(initialDate) {
  return new Promise((resolve) => {
    let currentMonth = new Date(initialDate.getFullYear(), initialDate.getMonth(), 1);
    let selectedDate = new Date(initialDate);
    
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    
    function renderPicker() {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const monthName = currentMonth.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
      
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDayOfWeek = (firstDay.getDay() + 6) % 7; // Lun = 0
      
      const cells = [];
      // Jours du mois précédent
      for (let i = startDayOfWeek - 1; i >= 0; i--) {
        const d = new Date(year, month, -i);
        cells.push({ date: d, otherMonth: true });
      }
      // Jours du mois
      for (let d = 1; d <= lastDay.getDate(); d++) {
        cells.push({ date: new Date(year, month, d), otherMonth: false });
      }
      // Jours du mois suivant (compléter)
      while (cells.length % 7 !== 0) {
        const lastCell = cells[cells.length - 1].date;
        const next = new Date(lastCell); next.setDate(next.getDate() + 1);
        cells.push({ date: next, otherMonth: true });
      }
      
      const today = new Date();
      
      overlay.innerHTML = `
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-handle"></div>
          <div class="modal-title">Choisir une date</div>
          
          <div class="date-nav">
            <button class="date-nav-btn" data-dp="prev">‹</button>
            <div class="date-nav-title">${monthName}</div>
            <button class="date-nav-btn" data-dp="next">›</button>
          </div>
          
          <div class="date-picker-grid">
            ${['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(d => `<div class="date-cell header">${d}</div>`).join('')}
            ${cells.map(c => {
              const isToday = c.date.toDateString() === today.toDateString();
              const isSelected = c.date.toDateString() === selectedDate.toDateString();
              return `<button class="date-cell ${c.otherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}" data-dp="day" data-day="${c.date.toISOString()}">${c.date.getDate()}</button>`;
            }).join('')}
          </div>
          
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" style="flex:1" data-dp="cancel">Annuler</button>
            <button class="btn btn-primary" style="flex:1" data-dp="ok">Valider</button>
          </div>
        </div>
      `;
      
      overlay.querySelectorAll('[data-dp]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const action = e.currentTarget.dataset.dp;
          haptic('light');
          switch (action) {
            case 'prev': currentMonth.setMonth(currentMonth.getMonth() - 1); renderPicker(); break;
            case 'next': currentMonth.setMonth(currentMonth.getMonth() + 1); renderPicker(); break;
            case 'day':
              selectedDate = new Date(e.currentTarget.dataset.day);
              renderPicker();
              break;
            case 'cancel':
              overlay.remove(); resolve(null); break;
            case 'ok':
              overlay.remove(); resolve(selectedDate); break;
          }
        });
      });
    }
    
    overlay.addEventListener('click', () => { overlay.remove(); resolve(null); });
    document.body.appendChild(overlay);
    renderPicker();
  });
}

  view.current = 'list';
  render();
}

  d.arriveeSite = '';
  d.departSite = '';
  d.finIntervention = '';

function showConfirm(title, message, type = 'normal') {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">${escapeHtml(title)}</div>
        <div class="modal-subtitle">${escapeHtml(message)}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary" style="flex:1" data-cf="no">Annuler</button>
          <button class="btn ${type === 'danger' ? 'btn-danger' : 'btn-primary'}" style="flex:1" data-cf="yes">Confirmer</button>
        </div>
      </div>
    `;
    overlay.querySelectorAll('[data-cf]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        overlay.remove();
        resolve(e.currentTarget.dataset.cf === 'yes');
      });
    });
    overlay.addEventListener('click', () => { overlay.remove(); resolve(false); });
    document.body.appendChild(overlay);
  });
}

function showPrompt(title, message, defaultValue = '', placeholder = '') {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">${escapeHtml(title)}</div>
        ${message ? `<div class="modal-subtitle">${escapeHtml(message)}</div>` : ''}
        <input type="text" class="form-input" id="prompt-input" value="${escapeHtml(defaultValue)}" placeholder="${escapeHtml(placeholder)}" autofocus style="margin-bottom:16px">
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary" style="flex:1" data-pr="no">Annuler</button>
          <button class="btn btn-primary" style="flex:1" data-pr="yes">Valider</button>
        </div>
      </div>
    `;
    const input = overlay.querySelector('#prompt-input');
    setTimeout(() => input.focus(), 100);
    
    overlay.querySelectorAll('[data-pr]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const yes = e.currentTarget.dataset.pr === 'yes';
        const val = input.value;
        overlay.remove();
        resolve(yes ? val : null);
      });
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = input.value;
        overlay.remove();
        resolve(val);
      }
    });
    overlay.addEventListener('click', () => { overlay.remove(); resolve(null); });
    document.body.appendChild(overlay);
  });
}

      ` : ''}

  `;
  
  overlay.querySelectorAll('[data-sync]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = e.currentTarget.dataset.sync;

      if (action === 'save') {

  });

  document.body.appendChild(overlay);
}

async function calculateDistance() {
  // Déterminer sur quel dossier on travaille : tempDossier (création) ou dossier existant (détail)
  let workingDossier = tempDossier;
  let isExisting = false;
  
  if (!workingDossier && view.dossierId) {
    workingDossier = state.dossiers.find(x => x.id === view.dossierId);
    isExisting = true;
  }
  
  if (!workingDossier) {
    toast('Aucun dossier en cours', 'error');
    return;
  }
  
  const destination = workingDossier.adresseSite;
  // L'ID du dossier en cours d'édition (pour l'exclure de la recherche du site précédent)
  const currentDossierId = workingDossier.id;
  
  if (!authState.isAuthenticated) {
    toast('Tu dois être connecté pour calculer la distance', 'error');
    return;
  }
  if (!destination) { toast('Saisis d\'abord l\'adresse du site', 'error'); return; }
  
  // Déterminer le point de départ selon le contexte
  const pointDepart = workingDossier.pointDepart || 'domicile';
  
  if (pointDepart === 'domicile') {
    if (!state.settings.adresseDomicile) {
      toast('Configure ton adresse domicile dans Réglages', 'error');
      return;
    }
    await performDistanceCalc(state.settings.adresseDomicile, destination, workingDossier, isExisting);
  } else if (pointDepart === 'autre-site') {
    await showChainOriginModal(destination, workingDossier, isExisting, currentDossierId);
  } else {
    await showOtherLocationModal(destination, workingDossier, isExisting);
  }
}

async function performDistanceCalc(origin, destination, dossier, isExisting) {
  if (!origin || !origin.trim()) {
    toast('Adresse de départ vide ou invalide', 'error');
    return;
  }
  
  toast('Calcul en cours...', 'warning');
  
  try {
    // V2.10.1 — Utilisation du nouveau backend authentifié
    const data = await cloudMapsDistance(origin, destination);
    
    if (!data.success) {
      toast('Erreur : ' + (data.error || 'inconnue'), 'error');
      return;
    }
    
    if (!data.distanceKm || parseFloat(data.distanceKm) === 0) {
      toast('Distance 0 km ? Vérifie tes adresses', 'warning');
    }
    
    // Mettre à jour le dossier
    if (dossier) {
      dossier.km = data.distanceKm;
      haptic('success');
      toast(`📍 ${data.distanceKm} km (${data.durationText})`, 'success');
      
      // Si dossier déjà sauvegardé, persister la modif
      if (isExisting) {
        await saveDossier(dossier);
      }
      render();
    }
  } catch (err) {
    console.error(err);
    toast('Erreur réseau. Vérifie ta connexion.', 'error');
  }
}

// V2.9.7 — Logique correcte pour déterminer "site précédent" :
// - Si le dossier en cours a déjà une arrivée site → on ne propose que les dossiers arrivés AVANT
// - Si le dossier en cours n'a PAS encore d'arrivée site (tu n'y es pas allé) → tous les dossiers
//   avec une arrivée site sont automatiquement antérieurs (puisque tu n'y es pas encore allé)
function findPreviousSitesInSequence(excludeId = null, referenceDossier = null) {
  function getDossierTimestamp(d) {
    if (d.arriveeSite) return new Date(d.arriveeSite);
    if (d.departDomicile && d.departDomicile !== 'X') return new Date(d.departDomicile);
    return new Date(d.dateAppel);
  }
  
  // Le dossier de référence est-il "pas encore arrivé sur site" ?
  const referenceNotArrivedYet = referenceDossier && !referenceDossier.arriveeSite;
  
  const referenceTimestamp = referenceDossier 
    ? getDossierTimestamp(referenceDossier) 
    : new Date();
  
  const candidates = state.dossiers
    .filter(d => d.id !== excludeId)
    .filter(d => d.type === 'deplacement')
    .filter(d => d.adresseSite && d.adresseSite.trim())
    .filter(d => {
      // Si le dossier en cours n'a pas encore d'arrivée site,
      // tous les dossiers AVEC arrivée site sont candidats (tu y es déjà allé)
      if (referenceNotArrivedYet && d.arriveeSite) return true;
      
      // Sinon, filtre classique : antérieur en horaire d'intervention
      const candidateTs = getDossierTimestamp(d);
      return candidateTs <= referenceTimestamp;
    })
    .sort((a, b) => getDossierTimestamp(b) - getDossierTimestamp(a))
    .slice(0, 10);
  
  return candidates;
}

function findPreviousSiteInSequence(excludeId = null, referenceDossier = null) {
  const candidates = findPreviousSitesInSequence(excludeId, referenceDossier);
  return candidates.length > 0 ? candidates[0] : null;
}

// Géolocalisation + reverse geocoding
async function getCurrentLocation() {
  if (!('geolocation' in navigator)) {
    toast('Géolocalisation non supportée sur ce téléphone', 'error');
    return null;
  }
  
  toast('📡 Récupération de ta position...', 'warning');
  
  try {
    const position = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 60000 // accepte une position jusqu'à 1 min
      });
    });
    
    const lat = position.coords.latitude;
    const lng = position.coords.longitude;
    
    // V2.10.1 — Geocoder via nouveau backend authentifié
    const data = await cloudMapsGeocode(lat, lng);
    
    if (!data.success) {
      toast('Geocoding : ' + (data.error || 'erreur'), 'error');
      return null;
    }
    
    haptic('success');
    toast(`📍 Position : ${data.address.substring(0, 40)}...`, 'success');
    return data.address;
  } catch (err) {
    if (err.code === 1) toast('Permission GPS refusée', 'error');
    else if (err.code === 2) toast('Position GPS indisponible', 'error');
    else if (err.code === 3) toast('Timeout GPS, réessaie', 'error');
    else toast('Erreur GPS : ' + err.message, 'error');
    return null;
  }
}

// Demander permission GPS au lancement (1 seule fois)
async function requestGeolocationPermission() {
  if (!('geolocation' in navigator)) return;
  // En appelant getCurrentPosition une fois, on déclenche la demande de permission
  // navigator.permissions n'est pas universel donc on fait soft
  try {
    navigator.geolocation.getCurrentPosition(
      () => { /* permission accordée, rien à faire */ },
      () => { /* permission refusée, on ne fait rien */ },
      { timeout: 1000, maximumAge: Infinity }
    );
  } catch(e) {}
}

      if (!start || !end || start === 'X' || end === 'X') return 0;
      const s = new Date(start), e = new Date(end);
      let ms = e - s;
      if (ms < 0 || ms > 24 * 3600 * 1000) {
        const sm = s.getHours() * 60 + s.getMinutes();
        const em = e.getHours() * 60 + e.getMinutes();
        let dm = em - sm;
        if (dm < 0) dm += 24 * 60;
        ms = dm * 60 * 1000;

      return ms;

    // PRÉPARATION DES DONNÉES — calcul des séquences et totaux
    // ═══════════════════════════════════════════════════════════════════
    // V2.9.11 — Algorithme tolérant qui détecte les chaînages par leur STRUCTURE
    // (départ='X' / retour='X') plutôt que par le sequenceId qui peut être cassé.
    // 
    // Principe :
    // 1. Tri des dossiers déplacement par horaire d'intervention réel (arrivée site)
    // 2. Parcours linéaire : on identifie des "groupes de chaînage" consécutifs
    //    - Un groupe DÉMARRE par un dossier avec departDomicile != 'X' (vrai départ)
    //    - Un groupe SE TERMINE par un dossier avec retourDomicile != 'X' (vrai retour)
    //    - Entre les deux : tous les dossiers font partie du même groupe
    let totalTrajetMs = 0;
    let totalKm = 0;
    
    // Helper : horaire d'intervention réel
    // V2.9.12 — Tri intelligent qui détecte les arriveeSite avec dates incohérentes
    // (saisies rétroactivement avec mauvaise date) et fallback sur dateAppel
    // V2.15.2 — Fenêtre élargie à 36h pour gérer les interventions qui débordent sur le lendemain
    // (ex: appel à 22h, arrivée le lendemain à 0h05 → 26h diff, hors fenêtre 24h donc ignoré)
    function getInterventionTime(d) {
      // Si on a arriveeSite ET dateAppel, on vérifie la cohérence
      if (d.arriveeSite && d.dateAppel) {
        const arr = new Date(d.arriveeSite);
        const app = new Date(d.dateAppel);
        const diffHours = (arr - app) / 3600000;
        // arriveeSite est valide si dans une fenêtre [-1h, +36h] après l'appel
        // (élargi de 24h → 36h pour les interventions de nuit qui débordent J+1)
        if (diffHours >= -1 && diffHours <= 36) return arr;
        // Sinon : date erronée, fallback sur dateAppel
      }
      if (d.dateAppel) return new Date(d.dateAppel);
      if (d.departDomicile && d.departDomicile !== 'X') return new Date(d.departDomicile);
      if (d.arriveeSite) return new Date(d.arriveeSite);
      return new Date(0);
    }
    
    // Tri des dossiers déplacement par horaire d'intervention
    const deplacementsTries = allWeekDossiers
      .filter(d => d.type === 'deplacement')
      .sort((a, b) => getInterventionTime(a) - getInterventionTime(b));
    
    // Construction des groupes de chaînage (par structure)
    const chainGroups = [];   // [{ dossiers: [...], firstDepart, lastRetour }]
    let currentGroup = null;
    
    for (const d of deplacementsTries) {
      const isRealDepart = d.departDomicile && d.departDomicile !== 'X';
      const isRealRetour = d.retourDomicile && d.retourDomicile !== 'X';
      const isChainEntry = d.departDomicile === 'X';
      const isChainExit = d.retourDomicile === 'X';
      
      if (isRealDepart) {
        // Démarrage d'un nouveau groupe
        // (si un groupe précédent est resté ouvert sans retour, on le pousse aussi)
        if (currentGroup) chainGroups.push(currentGroup);
        currentGroup = { dossiers: [d], firstDepart: d.departDomicile, lastRetour: null };
      } else if (isChainEntry && currentGroup) {
        // Continuation du groupe en cours
        currentGroup.dossiers.push(d);
      } else if (isChainEntry && !currentGroup) {
        // Chaînage entrant orphelin (sequenceId cassé) : créer un nouveau groupe
        currentGroup = { dossiers: [d], firstDepart: null, lastRetour: null };
      } else {
        // Cas anormal (pas de départ + pas de chaînage) : isolé
        if (currentGroup) chainGroups.push(currentGroup);
        currentGroup = { dossiers: [d], firstDepart: null, lastRetour: null };
      }
      
      if (isRealRetour && currentGroup) {
        currentGroup.lastRetour = d.retourDomicile;
        chainGroups.push(currentGroup);
        currentGroup = null;
      }
    }
    if (currentGroup) chainGroups.push(currentGroup);
    
    // Index : dossierId → { group, isFirst, isLast, totalGroupMs }
    const dossierGroupInfo = {};
    chainGroups.forEach(g => {
      const seqMs = (g.firstDepart && g.lastRetour) ? safeDiffMs(g.firstDepart, g.lastRetour) : 0;
      if (g.firstDepart && g.lastRetour) totalTrajetMs += seqMs;
      
      g.dossiers.forEach((d, idx) => {
        dossierGroupInfo[d.id] = {
          group: g,
          isFirst: idx === 0,
          isLast: idx === g.dossiers.length - 1,
          isSingle: g.dossiers.length === 1,
          totalGroupMs: seqMs
        };
      });
    });
    
    const dossierRows = allWeekDossiers.map(d => {
      const isPhone = d.type === 'telephone';
      // V2.15.1 — Remplacer le marqueur de chaînage par un tiret long propre (—)
      // (l'ancien "→ chaînage" rendait mal dans le PDF avec la police par défaut)
      let departDom = d.departDomicile === 'X' ? '—' : (d.departDomicile ? fmtTime(d.departDomicile) : '');
      let retourDom = d.retourDomicile === 'X' ? '—' : (d.retourDomicile ? fmtTime(d.retourDomicile) : '');
      let totalTrajet = '';
      
      if (!isPhone) {
        const info = dossierGroupInfo[d.id];
        if (info && !info.isSingle) {
          // Dossier dans une séquence de plusieurs
          if (!info.isLast) {
            // V2.15.1 — Tiret long pour les dossiers chaînés intermédiaires
            totalTrajet = '—';
          } else if (info.totalGroupMs > 0) {
            // V2.15.0 — Le total de la séquence apparaît uniquement sur le dernier dossier (Q2=E1, F1)
            totalTrajet = fmtDuration(info.totalGroupMs);
          }
        } else if (d.departDomicile && d.retourDomicile && d.departDomicile !== 'X' && d.retourDomicile !== 'X') {
          // Dossier isolé classique
          const ms = safeDiffMs(d.departDomicile, d.retourDomicile);
          totalTrajet = fmtDuration(ms);
          // Note : totalTrajetMs déjà compté via dossierGroupInfo (groupe isolé d'1 dossier)
        } else if (d.retourDomicile === 'X' || d.departDomicile === 'X') {
          // V2.15.1 — Tiret long pour les dossiers orphelins avec marqueur
          totalTrajet = '—';
        }
      }
      
      if (!isPhone) totalKm += safeKm(d.km);
      
      return {
        d, isPhone,
        date: fmtDateShort(d.dateAppel),
        // V2.11.0 — Forcer la conversion en string pour éviter les erreurs jsPDF
        code: String(d.codeAstreinte || ''),
        demandeur: String(d.etablissement || ''),
        heureAppel: d.bureau ? 'BUREAU' : fmtTime(d.dateAppel),
        parTel: isPhone ? 'X' : '',
        surSite: !isPhone ? 'X' : '',
        rapport: String(d.rapportN || d.rapportNum || ''),
        arrSite: d.arriveeSite ? fmtTime(d.arriveeSite) : '',
        depSite: d.departSite ? fmtTime(d.departSite) : (d.finIntervention ? fmtTime(d.finIntervention) : ''),
        // V2.15.3 — Calcul auto du temps passé sur site : departSite - arriveeSite
        // Si > 24h ou dates incohérentes : afficher "—" (cas rétroactif sur anciens dossiers)
        tpsSite: (() => {
          if (isPhone) return '';
          const depSiteVal = d.departSite || d.finIntervention;
          if (!d.arriveeSite || !depSiteVal) return '';
          if (d.arriveeSite === 'X' || depSiteVal === 'X') return '';
          const ms = safeDiffMs(d.arriveeSite, depSiteVal);
          // Garde-fou : si > 24h ou négatif, c'est une donnée incohérente
          if (ms <= 0 || ms > 24 * 3600 * 1000) return '—';
          return fmtDuration(ms);
        })(),
        // V2.11.0 — Sécurité : ne garder que les valeurs numériques valides
        km: (() => { const n = safeKm(d.km); return n > 0 ? n : ''; })(),
        departDom, retourDom, totalTrajet
      };
    });
    
    // Pagination : 17 lignes par page
    const nbPages = Math.max(1, Math.ceil(dossierRows.length / ROWS_PER_PAGE));
    
    // ═══════════════════════════════════════════════════════════════════
    // RENDU D'UNE PAGE
    // ═══════════════════════════════════════════════════════════════════
    function renderPage(pageNum, pageDossierRows) {
      const isLastPage = (pageNum === nbPages);
      
      doc.setFont('helvetica', 'normal');
      doc.setLineWidth(0.5);
      doc.setDrawColor(0);
      doc.setTextColor(0);
      
      // ─────────────────────────────────────────────────────────
      // 1. EN-TÊTE LOGO + TITRES (y = 17 à 56)
      // ─────────────────────────────────────────────────────────
      const headerH = 39;
      doc.rect(TABLE_LEFT, HEADER_TOP, TABLE_WIDTH, headerH);
      // Séparateur vertical après le logo
      const logoW = 77;  // (94 - 17 = 77, comme Semaine n°)
      doc.line(TABLE_LEFT + logoW, HEADER_TOP, TABLE_LEFT + logoW, HEADER_TOP + headerH);
      // Séparateur horizontal entre G1-0-8 et sous-titre
      doc.line(TABLE_LEFT + logoW, HEADER_TOP + headerH/2, TABLE_LEFT + TABLE_WIDTH, HEADER_TOP + headerH/2);
      
      // Logo (personnalisable)
      try {
        doc.addImage(getLogo(), 'PNG', TABLE_LEFT + 6, HEADER_TOP + 5, logoW - 12, headerH - 10);
      } catch(e) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(14);
        doc.text(state.settings.technicien || 'LOGO', TABLE_LEFT + logoW/2, HEADER_TOP + 23, { align: 'center' });
      }
      
      // Titre "G1-0-8 - Version D"
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.text('G1-0-8  -  Version D', TABLE_LEFT + logoW + (TABLE_WIDTH - logoW)/2, HEADER_TOP + headerH/2 - 4, { align: 'center' });
      // Sous-titre
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.text("Suivi des interventions de l'astreinte Hebdomadaire", TABLE_LEFT + logoW + (TABLE_WIDTH - logoW)/2, HEADER_TOP + headerH/2 + 13, { align: 'center' });
      
      // ─────────────────────────────────────────────────────────
      // 2. BANDEAU IDENTITÉ TECHNICIEN (y = 67)
      // ─────────────────────────────────────────────────────────
      const idY = ID_Y + 3;
      
      // "Nom du technicien :" — gras + souligné
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      const lblTech = 'Nom du technicien :';
      doc.text(lblTech, 19, idY);
      doc.line(19, idY + 1.5, 19 + doc.getTextWidth(lblTech), idY + 1.5);
      
      // Valeur du nom (normal)
      doc.setFont('helvetica', 'normal');
      doc.text(state.settings.technicien || '', 19 + doc.getTextWidth(lblTech) + 4, idY);
      
      // Titulaire (x=585) avec case à cocher
      const isTitulaire = (state.settings.statutSemaine || 'titulaire') === 'titulaire';
      const isSuppleant = state.settings.statutSemaine === 'suppleant';
      
      doc.setFont('helvetica', 'bold');
      doc.text('Titulaire', 585, idY);
      doc.line(585, idY + 1.5, 585 + doc.getTextWidth('Titulaire'), idY + 1.5);
      drawCheckbox(629, idY - 8, 10, isTitulaire);
      
      doc.text('Suppléant', 667, idY);
      doc.line(667, idY + 1.5, 667 + doc.getTextWidth('Suppléant'), idY + 1.5);
      drawCheckbox(714, idY - 8, 10, isSuppleant);
      
      // ─────────────────────────────────────────────────────────
      // 3. TABLEAU PRINCIPAL — EN-TÊTE NIVEAU 1 (bandeaux gris)
      // ─────────────────────────────────────────────────────────
      const groupY = TABLE_TOP;
      
      // Cellule "Semaine n°" fusionnée verticalement (couvre les 2 niveaux d'en-tête)
      doc.setLineWidth(0.5);
      doc.rect(GRID.x[0], TABLE_TOP, GRID.x[2] - GRID.x[0], HEADER_H);
      // "Semaine n°" en haut + numéro en bas-gauche
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.text('Semaine n°', GRID.x[0] + 4, TABLE_TOP + 11);
      doc.setFontSize(13);
      doc.text(String(week.weekNumber), GRID.x[0] + 35, TABLE_TOP + 26);
      
      // En-tête niveau 2 pour N° et Date (sous Semaine n°)
      // N° et Date sont leurs propres colonnes
      // Ligne verticale séparant N° de Date
      doc.line(GRID.x[1], TABLE_TOP + 31, GRID.x[1], TABLE_TOP + HEADER_H);
      // Ligne horizontale séparant le label de N°/Date
      doc.line(GRID.x[0], TABLE_TOP + 31, GRID.x[2], TABLE_TOP + 31);
      
      doc.setFontSize(8);
      doc.text('N°', (GRID.x[0] + GRID.x[1])/2, TABLE_TOP + HEADER_H - 5, { align: 'center' });
      doc.text('Date', (GRID.x[1] + GRID.x[2])/2, TABLE_TOP + HEADER_H - 5, { align: 'center' });
      
      // Bandeaux gris des 4 groupes
      GRID.groups.slice(1).forEach(g => {
        fillRect(g.x0, groupY, g.x1 - g.x0, H_GROUP, GRAY);
        doc.rect(g.x0, groupY, g.x1 - g.x0, H_GROUP);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8.5);
        doc.text(g.title, (g.x0 + g.x1)/2, groupY + 9, { align: 'center' });
      });
      
      // ─────────────────────────────────────────────────────────
      // 4. EN-TÊTES NIVEAU 2 (sous-colonnes)
      // ─────────────────────────────────────────────────────────
      const sub2Y = TABLE_TOP + H_GROUP;
      
      // Sous-bandeau "TEMPS DE TRAVAIL" en gris (au-dessus de "Heure d'arrivée" + "Départ du site")
      // Position : x[8] à x[10], y=sub2Y à sub2Y+H_TEMPSTRAV
      const ttX0 = GRID.x[8], ttX1 = GRID.x[10];
      fillRect(ttX0, sub2Y, ttX1 - ttX0, H_TEMPSTRAV, GRAY);
      doc.rect(ttX0, sub2Y, ttX1 - ttX0, H_TEMPSTRAV);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.text('TEMPS DE TRAVAIL', (ttX0 + ttX1)/2, sub2Y + 7, { align: 'center' });
      
      // Sous-cellules de niveau 2 (en-têtes colonnes)
      // Pour les colonnes qui n'ont pas de sous-bandeau, la cellule occupe toute la hauteur restante
      // Pour Heure d'arrivée et Départ site, elles sont SOUS le bandeau TEMPS DE TRAVAIL
      
      const subCellY = sub2Y + H_TEMPSTRAV;  // y où commencent les libellés sous TEMPS DE TRAVAIL
      const subCellH = H_SUBHEADER - H_TEMPSTRAV;
      
      const subHeaders = [
        // idx 2..14 correspondent aux colonnes (idx 0 et 1 sont N° et Date, déjà dans Semaine n°)
        { idx: 2,  label: 'N° ABONNÉ\nou\nCODE ASTREINTE', fullHeight: true },
        { idx: 3,  label: 'Nom du Demandeur\n(client)',     fullHeight: true },
        { idx: 4,  label: "Heure\nd'appel du\nclient",     fullHeight: true },
        { idx: 5,  label: 'Par\nTél.',                       fullHeight: true },
        { idx: 6,  label: 'Sur\nsite',                       fullHeight: true },
        { idx: 7,  label: 'RAPPORT\nN°',                     fullHeight: true },
        { idx: 8,  label: "Heure d'arrivée\nsur site",       fullHeight: false },
        { idx: 9,  label: 'Départ du site',                   fullHeight: false },
        { idx: 10, label: 'Temps\npassé sur\nsite*',        fullHeight: true },
        { idx: 11, label: 'DISTANCE\nEN KM',                 fullHeight: true },
        { idx: 12, label: 'DEPART DU\nDOMICILE (ou\nautres lieux) *',         fullHeight: true },
        { idx: 13, label: 'FIN DU TRAJET\nET RETOUR\nDOMICILE (ou\nautres lieux) *', fullHeight: true },
        { idx: 14, label: 'TOTAL DES\nHEURES TRAJETS*',      fullHeight: true }
      ];
      
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(6.2);
      
      subHeaders.forEach(({ idx, label, fullHeight }) => {
        const x = GRID.x[idx];
        const w = GRID.x[idx + 1] - GRID.x[idx];
        const y = fullHeight ? sub2Y : subCellY;
        const h = fullHeight ? H_SUBHEADER : subCellH;
        
        // Bordure de la cellule (fond blanc, pas de gris)
        doc.rect(x, y, w, h);
        
        // Texte centré
        const lines = label.split('\n');
        const lineH = 6.5;
        const startY = y + h/2 - (lines.length * lineH)/2 + 4.5;
        lines.forEach((ln, i) => {
          doc.text(ln, x + w/2, startY + i * lineH, { align: 'center', maxWidth: w - 2 });
        });
      });
      
      // ─────────────────────────────────────────────────────────
      // 5. CORPS DU TABLEAU — 17 lignes
      // ─────────────────────────────────────────────────────────
      const bodyTop = TABLE_TOP + HEADER_H;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      
      for (let r = 0; r < ROWS_PER_PAGE; r++) {
        const rowY = bodyTop + r * ROW_H;
        const row = pageDossierRows[r] || null;
        const rowNum = (pageNum - 1) * ROWS_PER_PAGE + r + 1;
        
        // Bordures de chaque cellule
        for (let c = 0; c < GRID.x.length - 1; c++) {
          doc.rect(GRID.x[c], rowY, GRID.x[c + 1] - GRID.x[c], ROW_H);
        }
        
        // Numéro de ligne (toujours affiché)
        doc.setFontSize(7);
        if (row) doc.setTextColor(0); else doc.setTextColor(150);
        doc.text(String(rowNum), (GRID.x[0] + GRID.x[1])/2, rowY + ROW_H/2 + 2.5, { align: 'center' });
        doc.setTextColor(0);
        
        if (row) {
          // Date
          doc.text(row.date, (GRID.x[1] + GRID.x[2])/2, rowY + ROW_H/2 + 2.5, { align: 'center' });
          
          // Cellules de données
          const cells = [
            { idx: 2,  val: row.code },
            { idx: 3,  val: row.demandeur, truncate: 28 },
            { idx: 4,  val: row.heureAppel },
            { idx: 5,  val: row.parTel },
            { idx: 6,  val: row.surSite },
            { idx: 7,  val: row.rapport },
            { idx: 8,  val: row.arrSite },
            { idx: 9,  val: row.depSite },
            { idx: 10, val: row.tpsSite },
            { idx: 11, val: row.km ? String(row.km) : '' },
            { idx: 12, val: row.departDom },
            { idx: 13, val: row.retourDom },
            { idx: 14, val: row.totalTrajet }
          ];
          
          cells.forEach(({ idx, val, truncate }) => {
            if (val === null || val === undefined || val === '') return;
            const x = GRID.x[idx];
            const w = GRID.x[idx + 1] - GRID.x[idx];
            // V2.11.0 — Bug fix : forcer la conversion en string pour éviter l'erreur jsPDF
            let display = String(val);
            if (truncate && display.length > truncate) display = display.substring(0, truncate - 2) + '..';
            doc.text(display, x + w/2, rowY + ROW_H/2 + 2.5, { align: 'center', maxWidth: w - 2 });
          });
        }
      }
      
      // ─────────────────────────────────────────────────────────
      // 6. PIED DU TABLEAU : "* Mention obligatoire" + TOTAL HEBDOMADAIRE
      // ─────────────────────────────────────────────────────────
      // Y du pied selon original : 429 pour "* Mention obligatoire"
      // TOTAL HEBDOMADAIRE : y=454-485 avec fond gris (sur cols 12-15)
      
      const footerY = TABLE_BOTTOM;  // 454
      
      // Bloc TOTAL HEBDOMADAIRE (uniquement sur dernière page)
      // Selon l'audit : x=573-684 fond gris, x=684-744 case vide
      // Mais notre grille a x[12]=567, x[13]=678, x[14]=749, x[15]=824
      // On va aligner : bloc gris de x[12] à x[14], case totale x[14] à x[15]
      
      const totalLabelX0 = GRID.x[12];
      const totalLabelX1 = GRID.x[14];
      const totalValueX0 = GRID.x[14];
      const totalValueX1 = GRID.x[15];
      const totalH = 31;
      const totalY = footerY;
      
      // Fond gris du label
      fillRect(totalLabelX0, totalY, totalLabelX1 - totalLabelX0, totalH, GRAY);
      doc.rect(totalLabelX0, totalY, totalLabelX1 - totalLabelX0, totalH);
      doc.rect(totalValueX0, totalY, totalValueX1 - totalValueX0, totalH);
      
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(0);
      doc.text('TOTAL HEBDOMADAIRE', (totalLabelX0 + totalLabelX1)/2, totalY + totalH/2 + 3, { align: 'center' });
      
      // Valeur du total (uniquement sur dernière page)
      if (isLastPage) {
        doc.setFontSize(11);
        doc.text(fmtDuration(totalTrajetMs), (totalValueX0 + totalValueX1)/2, totalY + totalH/2 + 3.5, { align: 'center' });
      }
      
      // "* Mention obligatoire" : aligné à gauche sous le tableau
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      const mentionTxt = '* Mention obligatoire';
      const mentionY = totalY + 6;
      doc.text(mentionTxt, 19, mentionY);
      doc.line(19, mentionY + 1.5, 19 + doc.getTextWidth(mentionTxt), mentionY + 1.5);
      
      // ─────────────────────────────────────────────────────────
      // 7. PHRASE D'AVERTISSEMENT (y=487)
      // ─────────────────────────────────────────────────────────
      const warningY = totalY + totalH + 5;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      
      const warn1 = "En cas d'impossibilité d'intervention du titulaire, ";
      const warn2 = "celui-ci doit appeler son suppléant dans l'heure qui suit l'appel du client";
      const warn3 = " !!!";
      
      doc.text(warn1, 19, warningY);
      const warn1W = doc.getTextWidth(warn1);
      
      doc.setFont('helvetica', 'bold');
      doc.text(warn2, 19 + warn1W, warningY);
      const warn2W = doc.getTextWidth(warn2);
      doc.line(19 + warn1W, warningY + 1.2, 19 + warn1W + warn2W, warningY + 1.2);
      
      doc.setFont('helvetica', 'normal');
      doc.text(warn3, 19 + warn1W + warn2W, warningY);
      
      // ─────────────────────────────────────────────────────────
      // 8. 4 CADRES ÉTAPES — V2.11.0 : sur TOUTES les pages (comme l'original Eurofeu)
      // ─────────────────────────────────────────────────────────
      {
        // Position : y débute à warningY + 18 pour bien séparer
        const stepY = warningY + 18;  // ≈ 503
        const stepGap = 8;
        const stepW = (TABLE_WIDTH - 3 * stepGap) / 4;
        const stepH = PAGE_H - stepY - 5;  // remplit jusqu'en bas
        
        const steps = [
          {
            num: 'Etape n°1',
            title: 'Validation du Salarié :',
            fields: ['Date :', 'Signature :'],
            prefill: {
              date: fmtDate(new Date()),
              signature: state.settings.technicien || ''
            }
          },
          {
            num: 'Etape n°2',
            title: 'Contrôle et Analyse des documents\npar l\'Agent Administratif :',
            fields: ['Date :', 'Signature :']
          },
          {
            num: 'Etape n°3',
            title: 'Validation par le Responsable du Service :',
            fields: ['Date :', 'Signature :']
          },
          {
            num: 'Etape n°4',
            title: 'Date de réception du Document par le\nService RH :',
            fields: ['Date :']
          }
        ];
        
        steps.forEach((step, i) => {
          const x = TABLE_LEFT + i * (stepW + stepGap);
          
          // "Étape n°X" au-dessus du cadre
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(8);
          doc.text(step.num, x + stepW/2, stepY - 2, { align: 'center' });
          
          // Cadre rectangulaire
          doc.setLineWidth(0.8);
          doc.rect(x, stepY, stepW, stepH);
          doc.setLineWidth(0.5);
          
          // Titre dans le cadre (gras + souligné)
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(8);
          const titleLines = step.title.split('\n');
          titleLines.forEach((tl, ti) => {
            const titleY = stepY + 9 + ti * 9;
            doc.text(tl, x + stepW/2, titleY, { align: 'center' });
            const tlW = doc.getTextWidth(tl);
            doc.line(x + stepW/2 - tlW/2, titleY + 1.2, x + stepW/2 + tlW/2, titleY + 1.2);
          });
          
          // Champs Date / Signature
          const fieldStartY = stepY + 9 + titleLines.length * 9 + 9;
          step.fields.forEach((field, fi) => {
            const fY = fieldStartY + fi * 16;
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(7.5);
            doc.text(field, x + 4, fY);
            const fW = doc.getTextWidth(field);
            doc.line(x + 4, fY + 1, x + 4 + fW, fY + 1);
            
            // Pré-remplissage Étape 1
            if (step.prefill) {
              doc.setFont('helvetica', 'normal');
              doc.setFontSize(8);
              if (field === 'Date :' && step.prefill.date) {
                doc.text(step.prefill.date, x + 4 + fW + 4, fY);
              } else if (field === 'Signature :' && step.prefill.signature) {
                doc.text(step.prefill.signature, x + 4 + fW + 4, fY);
              }
            }
          });
        });
      }
    }
    
    // ═══════════════════════════════════════════════════════════════════
    // BOUCLE DES PAGES
    // ═══════════════════════════════════════════════════════════════════
    for (let p = 1; p <= nbPages; p++) {
      if (p > 1) doc.addPage();
      const startIdx = (p - 1) * ROWS_PER_PAGE;
      const pageRows = dossierRows.slice(startIdx, startIdx + ROWS_PER_PAGE);
      renderPage(p, pageRows);
    }
    
    const filename = `G1-0-8_S${week.weekNumber}_${(state.settings.technicien || 'tech').replace(/\s+/g, '_')}.pdf`;
    doc.save(filename);
    haptic('success');
    toast(`PDF généré : ${filename}`, 'success');
  } catch (err) {
    console.error(err);
    toast('Erreur génération PDF : ' + err.message, 'error');
  }
}

// ----------------------------------------------------------------------------
// EMAIL EXPORT
// ----------------------------------------------------------------------------
function generateEmailNuit() {
  // V2.9.9 — Période intelligente (jours fériés FR + weekends)
  const period = computeNightPeriod();
  
  const dossiers = state.dossiers.filter(d => {
    const dt = new Date(d.dateAppel);
    return dt >= period.start && dt <= period.end;
  }).sort((a, b) => new Date(a.dateAppel) - new Date(b.dateAppel));
  
  if (dossiers.length === 0) {
    toast('Aucun dossier sur cette période', 'error');
    return;
  }
  
  buildEmail(dossiers, `CR Astreinte — ${period.label} du ${fmtDate(period.start)} au ${fmtDate(period.end)}`);
}

async function generateEmailCustom() {
  const start = await showPrompt('Date de début', 'Format JJ/MM/AAAA', fmtDate(new Date()));
  if (!start) return;
  const end = await showPrompt('Date de fin', 'Format JJ/MM/AAAA', fmtDate(new Date()));
  if (!end) return;
  
  try {
    const [d1, m1, y1] = start.split('/');
    const [d2, m2, y2] = end.split('/');
    const startDate = new Date(y1, m1-1, d1, 0, 0);
    const endDate = new Date(y2, m2-1, d2, 23, 59);
    
    const dossiers = state.dossiers.filter(d => {
      const dt = new Date(d.dateAppel);
      return dt >= startDate && dt <= endDate;
    }).sort((a, b) => new Date(a.dateAppel) - new Date(b.dateAppel));
    
    buildEmail(dossiers, `CR Astreinte — Du ${fmtDate(startDate)} au ${fmtDate(endDate)}`);
  } catch (e) {
    toast('Format de date invalide', 'error');
  }
}

function buildEmail(dossiers, subject) {
  if (dossiers.length === 0) { toast('Aucun dossier sur cette période', 'error'); return; }
  
  // Trier par date croissante
  dossiers = [...dossiers].sort((a, b) => new Date(a.dateAppel) - new Date(b.dateAppel));
  
  // Période couverte
  const firstDate = new Date(dossiers[0].dateAppel);
  const lastDate = new Date(dossiers[dossiers.length - 1].dateAppel);
  const nbInterventions = dossiers.filter(d => d.type === 'deplacement').length;
  const nbTelephone = dossiers.filter(d => d.type === 'telephone').length;
  const totalKm = dossiers.reduce((s, d) => s + safeKm(d.km), 0);
  
  // === V2.9.8 — Email pro Outlook (texte brut épuré) ===
  let body = `Bonjour,\r\n\r\n`;
  body += `Veuillez trouver ci-dessous le compte-rendu de l'astreinte couvrant la période du `;
  body += `${fmtDate(firstDate)} au ${fmtDate(lastDate)}.\r\n\r\n`;
  
  // Récapitulatif au début (pratique pour la lecture rapide)
  body += `RÉCAPITULATIF\r\n`;
  body += `─────────────────────────────────────────────\r\n`;
  body += `   Total dossiers     : ${dossiers.length}\r\n`;
  body += `   Interventions site : ${nbInterventions}\r\n`;
  body += `   Résolution tel.    : ${nbTelephone}\r\n`;
  if (totalKm > 0) body += `   Kilomètres parcourus : ${totalKm.toFixed(1)} km\r\n`;
  body += `\r\n`;
  
  body += `DÉTAIL DES INTERVENTIONS\r\n`;
  body += `═════════════════════════════════════════════\r\n\r\n`;
  
  dossiers.forEach((d, i) => {
    const num = String(i + 1).padStart(2, '0');
    const isPhone = d.type === 'telephone';
    
    body += `─── DOSSIER N°${num} ─── ${isPhone ? 'Résolution téléphonique' : 'Intervention sur site'} ───\r\n\r\n`;
    
    // Date et réception
    body += `   Date          : ${fmtDate(d.dateAppel)}`;
    if (!d.bureau) body += ` à ${fmtTime(d.dateAppel)}`;
    body += `\r\n`;
    
    body += `   Réception     : ${d.bureau ? 'Transmis par le bureau' : 'Appel direct'}\r\n`;
    
    // Code astreinte (important)
    body += `   Code astreinte: ${d.codeAstreinte || '—'}\r\n`;
    
    body += `   Établissement : ${d.etablissement || '—'}\r\n`;
    
    // Motif
    body += `\r\n   Motif de l'appel :\r\n`;
    if (d.motif) {
      d.motif.split('\n').forEach(line => {
        body += `      ${line}\r\n`;
      });
    } else {
      body += `      (non renseigné)\r\n`;
    }
    
    // Traitement
    if (isPhone) {
      body += `\r\n   Traitement    : Résolu par téléphone\r\n`;
    } else {
      body += `\r\n   Traitement    : Intervention sur site\r\n`;
      body += `   N° rapport    : ${d.rapportN || '—'}\r\n`;
      
      // Compte-rendu
      body += `\r\n   Compte-rendu d'intervention :\r\n`;
      if (d.compteRendu) {
        d.compteRendu.split('\n').forEach(line => {
          body += `      ${line}\r\n`;
        });
      } else {
        body += `      (non renseigné)\r\n`;
      }
    }
    
    body += `\r\n\r\n`;
  });
  
  body += `═════════════════════════════════════════════\r\n\r\n`;
  body += `Restant à votre disposition pour tout complément d'information.\r\n\r\n`;
  body += `Cordialement,\r\n`;
  
  // Copie dans le presse-papier pour Outlook si besoin
  navigator.clipboard.writeText(body).then(() => toast('Texte copié + Outlook ouvert', 'success'))
    .catch(() => toast('Outlook ouvert', 'success'));
  
  const mailto = `mailto:${state.settings.emailDestinataire || ''}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

// ----------------------------------------------------------------------------
// DATA IMPORT/EXPORT
// ----------------------------------------------------------------------------
function exportData() {
  const data = JSON.stringify({ settings: state.settings, dossiers: state.dossiers, exportedAt: new Date().toISOString() }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `astreintes_backup_${new Date().toISOString().substring(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Sauvegarde téléchargée', 'success');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = JSON.parse(e.target.result);
        const confirmed = await showConfirm('Restaurer ?', `${data.dossiers?.length || 0} dossiers à importer. Les données actuelles seront remplacées.`, 'danger');
        if (!confirmed) return;
        
        await dbClear('dossiers');
        if (data.settings) {
          state.settings = { ...DEFAULT_SETTINGS, ...data.settings };
          await saveSettings();
        }
        state.dossiers = [];
        if (data.dossiers) {
          for (const d of data.dossiers) {
            await dbPut('dossiers', d);
            state.dossiers.push(d);
          }
        }
        toast('Données restaurées', 'success');
        applyTheme();
        render();
      } catch (err) {
        toast('Fichier invalide', 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

async function resetAllData() {
  const c1 = await showConfirm('Tout effacer ?', 'Tous les dossiers et réglages seront supprimés.', 'danger');
  if (!c1) return;
  const c2 = await showConfirm('Vraiment sûr ?', 'Cette action est définitive.', 'danger');
  if (!c2) return;
  
  await dbClear('dossiers');
  await dbClear('settings');
  state = { settings: { ...DEFAULT_SETTINGS }, dossiers: [] };
  view = { current: 'list', filter: 'all', dossierId: null, weekOffset: 0 };
  applyTheme();
  render();
  toast('Données effacées', 'success');
}

// ----------------------------------------------------------------------------
// TOAST
// ----------------------------------------------------------------------------
function toast(message, type = 'info') {
  const container = $('#toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = (type === 'success' ? '✓ ' : type === 'error' ? '✕ ' : '') + escapeHtml(message);
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

// ----------------------------------------------------------------------------
// NOTIFICATIONS — Rappels matinaux et alertes
// ----------------------------------------------------------------------------
function checkAndNotify() {
  if (!state.settings.alertesActives) return;
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  
  const now = new Date();
  const todayKey = now.toISOString().substring(0, 10);
  const lastNotifKey = 'lastNotif_' + todayKey;
  
  // Rappel matinal à l'heure définie
  const [rh, rm] = (state.settings.rappelHeure || '08:00').split(':').map(Number);
  const isAlreadyNotifiedToday = localStorage.getItem(lastNotifKey) === 'morning';
  
  if (now.getHours() === rh && now.getMinutes() >= rm && now.getMinutes() < rm + 5 && !isAlreadyNotifiedToday) {
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    const todayMorning = new Date(now); todayMorning.setHours(0, 0, 0, 0);
    
    const nightDossiers = state.dossiers.filter(d => {
      const dt = new Date(d.dateAppel);
      return dt >= yesterday && dt < todayMorning;
    });
    
    if (nightDossiers.length > 0) {
      new Notification('📋 Rappel CR Astreinte', {
        body: `${nightDossiers.length} dossier(s) cette nuit à reporter par mail.`,
        icon: AMI2S_LOGO_BASE64,
        tag: 'morning-reminder'
      });
      localStorage.setItem(lastNotifKey, 'morning');
    }
  }
  
  // Alerte dossier "en intervention" depuis +24h
  state.dossiers.forEach(d => {
    if (d.statut === 'intervention' && d.createdAt) {
      const age = (now - new Date(d.createdAt)) / 1000 / 3600; // en heures
      const alertKey = 'alertStale_' + d.id;
      if (age > 24 && !localStorage.getItem(alertKey)) {
        new Notification('⚠ Dossier en cours depuis 24h', {
          body: `${d.etablissement} - pense à le clôturer ou modifier son statut.`,
          icon: AMI2S_LOGO_BASE64,
          tag: 'stale-' + d.id
        });
        localStorage.setItem(alertKey, '1');
      }
    }
  });
}

// Démarrer le check toutes les minutes
setInterval(() => {
  try { checkAndNotify(); } catch(e) { console.error(e); }
}, 60000);

// ----------------------------------------------------------------------------
// WAKE LOCK — Écran toujours allumé pendant les saisies
// ----------------------------------------------------------------------------
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    if (wakeLock) await wakeLock.release();
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (err) {
    console.log('Wake Lock impossible:', err.message);
  }
}

async function releaseWakeLock() {
  if (wakeLock) {
    try { await wakeLock.release(); } catch(e) {}
    wakeLock = null;
  }
}

// Réactiver le wake lock quand l'app revient au premier plan
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && (view.current === 'new' || view.current === 'detail')) {
    requestWakeLock();
  }
});

// ----------------------------------------------------------------------------
// INIT V2.10.0 — Gate authentification avant chargement de l'app
// ----------------------------------------------------------------------------
// V2.11.0 — Helpers splash screen
function setSplashStatus(text) {
  const el = document.getElementById('splash-status');
  if (el) el.textContent = text;
}
function hideSplash() {
  const splash = document.getElementById('splash-screen');
  if (splash) {
    splash.classList.add('hidden');
    // Retirer du DOM après l'animation pour économiser des ressources
    setTimeout(() => splash.remove(), 500);
  }
}

async function init() {
  try {
    setSplashStatus('Vérification de la session');
    
    // V2.11 — Récupérer la config app en parallèle (maintenance + version)
    const appConfigPromise = fetchAppConfig();
    
    // 1. Vérifier si un token est déjà en local
    const hasLocalToken = authLoadFromStorage();

    if (hasLocalToken) {
      setSplashStatus('Connexion au serveur');
      // 2. Valider la session côté serveur (sliding 7j)
      const valid = await authValidate();
      if (valid) {
        // ✅ Token valide → attendre la config + lancer l'app
        setSplashStatus('Chargement des données');
        await appConfigPromise;
        
        // V2.11 — Si maintenance + non admin → bloquer
        if (checkMaintenanceBlock()) {
          hideSplash();
          return;
        }
        
        const result = await startMainApp();
        hideSplash();
        
        // V2.11 — Afficher bandeau/modal MAJ après le démarrage
        if (isUpdateAvailable()) {
          if (appConfig.forceUpdate) {
            renderUpdateModal();
          } else {
            renderUpdateBanner();
          }
        }
        
        // V2.11 — Démarrer le polling périodique
        startAppConfigPolling();
        
        // V2.12.0 — Vérifier immédiatement s'il y a une urgence active
        checkUrgenceActive();
        
        return result;
      }
      // Token invalide ou expiré côté serveur → on tombe sur le login
    }

    // 3. Pas de token ou token invalide → afficher l'écran de login
    // V2.11 FIX : on ne bloque PLUS le login en mode maintenance, sinon
    // l'admin déconnecté ne peut plus se reconnecter pour désactiver !
    // Le blocage se fera après login pour les non-admins (dans authLogin).
    await appConfigPromise;
    renderLoginScreen();
    hideSplash();
  } catch (err) {
    console.error('Init error', err);
    hideSplash();
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444">Erreur d\'initialisation : ' + err.message + '</div>';
  }
}

init();
