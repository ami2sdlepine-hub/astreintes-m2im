// ASTREINTES M2IM V2.10.0 — MODULE AUTH (Patch 1)
// ============================================================================
// Backend Apps Script multi-tenants : login, sessions 7j glissantes, roles
// admin/technicien/manager. Token stocke en localStorage (survit fermeture).
// ============================================================================

const AUTH_CONFIG = {
  BACKEND_URL: 'https://script.google.com/macros/s/AKfycbw6PDu0GtTKoxmNfEkOn606mOvUppHYRb4l0gb4PuJbVPmDs0cYzcfRZfoyMPIHLFYZPg/exec',
  STORAGE_KEY: 'astreintes_auth_v1',
  SESSION_DAYS: 7
};

let authState = {
  isAuthenticated: false,
  token: null,
  user: null,
  expiresAt: null,
  loading: false,
  error: null,
  mustChangePwd: false
};

function authLoadFromStorage() {
  try {
    const raw = localStorage.getItem(AUTH_CONFIG.STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.token || !data.expiresAt) return false;
    if (new Date(data.expiresAt) < new Date()) {
      localStorage.removeItem(AUTH_CONFIG.STORAGE_KEY);
      return false;
    }
    authState.token = data.token;
    authState.user = data.user;
    authState.expiresAt = data.expiresAt;
    authState.isAuthenticated = true;
    return true;
  } catch (e) {
    return false;
  }
}

function authSaveToStorage() {
  localStorage.setItem(AUTH_CONFIG.STORAGE_KEY, JSON.stringify({
    token: authState.token,
    user: authState.user,
    expiresAt: authState.expiresAt
  }));
}

function authClearStorage() {
  localStorage.removeItem(AUTH_CONFIG.STORAGE_KEY);
  authState.isAuthenticated = false;
  authState.token = null;
  authState.user = null;
  authState.expiresAt = null;
  authState.mustChangePwd = false;
}

async function authCall(action, data) {
  try {
    const response = await fetch(AUTH_CONFIG.BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action,
        data: data || {},
        token: authState.token
      })
    });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    return await response.json();
  } catch (err) {
    return { success: false, error: 'Erreur reseau : ' + err.message };
  }
}

async function authLogin(username, password) {
  authState.loading = true;
  authState.error = null;
  renderLoginScreen();

  const res = await authCall('login', { username, password });

  if (res.success) {
    authState.token = res.token;
    authState.user = res.user;
    authState.expiresAt = res.expires_at;
    authState.isAuthenticated = true;
    authState.mustChangePwd = res.user.must_change_pwd === true;
    authState.error = null;
    authSaveToStorage();
    authState.loading = false;
    return true;
  } else {
    authState.loading = false;
    authState.error = res.error || 'Erreur inconnue';
    renderLoginScreen();
    return false;
  }
}

async function authLogout() {
  if (authState.token) {
    await authCall('logout', {});
  }
  // V2.12.1 — Reset flag polling pour qu'il puisse redémarrer au prochain login
  _appConfigPollingStarted = false;
  // V2.10.3 — Nettoyage complet pour éviter les fuites de données entre comptes
  await wipeLocalUserData();
  authClearStorage();
  renderLoginScreen();
}

// V2.10.3 — Vider toutes les données utilisateur du device (IndexedDB + état mémoire)
async function wipeLocalUserData() {
  try {
    if (db) {
      await dbClear('dossiers');
      await dbClear('settings');
    }
  } catch (e) {
    console.error('wipeLocalUserData IDB error', e);
  }
  // Reset mémoire
  state.dossiers = [];
  state.settings = { ...DEFAULT_SETTINGS };
  // Reset flag migration (chaque user a sa propre migration)
  try {
    localStorage.removeItem('astreintes_migration_done_v1');
  } catch (e) {}
  // Reset état admin
  adminState.users = [];
  adminState.logs = [];
  adminState.editingUser = null;
  adminState.creatingUser = false;
  // Reset état cloud
  cloudSyncState.status = 'idle';
  cloudSyncState.lastSync = null;
  cloudSyncState.pendingChanges = 0;
  cloudSyncState.lastError = null;
}

async function authValidate() {
  if (!authState.token) return false;
  const res = await authCall('validateSession', {});
  if (res.success) {
    authState.expiresAt = new Date(Date.now() + AUTH_CONFIG.SESSION_DAYS * 86400000).toISOString();
    authSaveToStorage();
    return true;
  } else {
    authClearStorage();
    return false;
  }
}

async function authChangePassword(oldPassword, newPassword) {
  const res = await authCall('changePassword', { oldPassword, newPassword });
  if (res.success) {
    authState.mustChangePwd = false;
    return { ok: true };
  }
  return { ok: false, error: res.error || 'Erreur' };
}

function renderLoginScreen() {
  const app = document.getElementById('app');
  if (!app) return;

  if (authState.isAuthenticated && authState.mustChangePwd) {
    app.innerHTML = `
      <div class="login-screen">
        <div class="login-card">
          <div class="login-title">🔐 Changer le mot de passe</div>
          <div class="login-subtitle">Premier login : mot de passe à modifier</div>
          <div class="login-info">
            Choisissez un nouveau mot de passe (min. 6 caractères).
          </div>
          <div class="login-error ${authState.error ? 'visible' : ''}" id="login-error">${authState.error || ''}</div>
          <div class="login-form-group">
            <label>Mot de passe actuel</label>
            <input type="password" id="pwd-old" placeholder="••••••••" autocomplete="current-password">
          </div>
          <div class="login-form-group">
            <label>Nouveau mot de passe</label>
            <input type="password" id="pwd-new" placeholder="Min. 6 caractères" autocomplete="new-password">
          </div>
          <div class="login-form-group">
            <label>Confirmer</label>
            <input type="password" id="pwd-confirm" placeholder="Retaper le mot de passe" autocomplete="new-password">
          </div>
          <button class="login-btn" id="btn-change-pwd" ${authState.loading ? 'disabled' : ''}>
            ${authState.loading ? '⏳ Modification...' : '✓ Valider'}
          </button>
        </div>
      </div>
    `;
    document.getElementById('btn-change-pwd').addEventListener('click', async () => {
      const oldPwd = document.getElementById('pwd-old').value;
      const newPwd = document.getElementById('pwd-new').value;
      const confirm = document.getElementById('pwd-confirm').value;

      if (!oldPwd || !newPwd) {
        authState.error = 'Tous les champs sont requis';
        renderLoginScreen();
        return;
      }
      if (newPwd.length < 6) {
        authState.error = 'Min. 6 caractères';
        renderLoginScreen();
        return;
      }
      if (newPwd !== confirm) {
        authState.error = 'Les mots de passe ne correspondent pas';
        renderLoginScreen();
        return;
      }

      authState.loading = true;
      authState.error = null;
      renderLoginScreen();

      const r = await authChangePassword(oldPwd, newPwd);
      authState.loading = false;

      if (r.ok) {
        if (typeof toast === 'function') toast('Mot de passe modifié', 'success');
        startMainApp();
      } else {
        authState.error = r.error;
        renderLoginScreen();
      }
    });
    return;
  }

  app.innerHTML = `
    <div class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          ${typeof AMI2S_LOGO_BASE64 !== 'undefined'
            ? `<img src="${getLogo()}" alt="Logo">`
            : '<div style="font-size:32px;font-weight:800;color:var(--accent);">AMI2S</div>'}
        </div>
        <div class="login-title">Astreintes AMI2S</div>
        <div class="login-subtitle">Connectez-vous pour accéder à l'application</div>
        <div class="login-error ${authState.error ? 'visible' : ''}" id="login-error">${authState.error || ''}</div>
        <div class="login-form-group">
          <label>Nom d'utilisateur</label>
          <input type="text" id="login-username" placeholder="Ex: Admin" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false">
        </div>
        <div class="login-form-group">
          <label>Mot de passe</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="login-btn" id="btn-login" ${authState.loading ? 'disabled' : ''}>
          ${authState.loading ? '⏳ Connexion...' : '🔓 Se connecter'}
        </button>
        <div class="login-footer">
          Astreintes AMI2S V${APP_VERSION} • Session 7 jours
        </div>
      </div>
    </div>
  `;

  const doLogin = async () => {
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value;
    if (!u || !p) {
      authState.error = 'Username et mot de passe requis';
      renderLoginScreen();
      return;
    }
    const ok = await authLogin(u, p);
    if (ok) {
      // V2.11 FIX : vérifier maintenance APRÈS login (pour autoriser admin à se reconnecter)
      // Re-fetch la config pour avoir l'état le plus récent
      await fetchAppConfig();
      if (appConfig.maintenanceMode && authState.user && authState.user.role !== 'admin') {
        // Non-admin connecté pendant maintenance → bloquer
        renderMaintenanceScreen();
        return;
      }
      
      if (!authState.mustChangePwd) {
        startMainApp();
      } else {
        renderLoginScreen();
      }
    }
  };

  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('login-password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-username').focus();
}

async function startMainApp() {
  try {
    // V2.10.3 — Vérifier que les données locales appartiennent bien au user connecté
    await openDB();
    const lastUserRow = await dbGet('settings', '_last_user');
    const currentUserId = authState.user && authState.user.id;
    if (lastUserRow && lastUserRow.value !== currentUserId) {
      // L'appareil a été utilisé par un autre user avant → vider les données
      console.log('Changement d\'utilisateur détecté, nettoyage local...');
      await wipeLocalUserData();
    }
    // Marquer le user courant comme propriétaire des données locales
    if (currentUserId) {
      await dbPut('settings', { key: '_last_user', value: currentUserId });
    }

    await loadState();

    // V2.11.0 — Précharge cloudPull EN PARALLÈLE (non bloquant)
    // On lance le pull cloud immédiatement, sans attendre, pour gagner du temps perçu
    let cloudPullPromise = null;
    if (authState.isAuthenticated && authState.user && authState.user.role !== 'manager') {
      cloudPullPromise = cloudPull(false).catch(err => {
        console.warn('cloudPull en parallèle a échoué:', err);
      });
    }

    // V2.10.3 — Récupérer les settings personnels depuis le cloud
    if (authState.isAuthenticated) {
      try {
        const cloudSettings = await cloudGetUserSettings();
        if (cloudSettings) {
          // Fusionner avec les settings actuels (cloud prioritaire sur les champs personnels)
          state.settings = { ...DEFAULT_SETTINGS, ...state.settings, ...cloudSettings };
          await dbPut('settings', { key: 'main', value: state.settings });
        }
      } catch (e) {
        console.error('cloudGetUserSettings error', e);
      }
    }

    applyTheme();
    
    // V2.11.0 — Page d'accueil selon le rôle
    if (authState.user && authState.user.role === 'manager') {
      view.current = 'manager-view';
      render();
      // Charger les dossiers de toute l'équipe
      managerLoadDossiers();
    } else if (authState.user && authState.user.role === 'superviseur') {
      // V2.12.1 — Superviseur : vue dédiée temps réel
      view.current = 'superviseur';
      render();
      // Démarrer le mode superviseur (Wake Lock + refresh 15s + horloge)
      startSuperviseurMode();
    } else {
      render();
    }

    if ('serviceWorker' in navigator) {
      // V2.11.0 — Service Worker minimal
      // NOTE : créé via Blob URL, donc scope limité (ne peut PAS intercepter les fetches
      // de la page principale dans un déploiement single-file GitHub Pages).
      // Pour un vrai cache PWA, il faudrait un fichier sw.js séparé hébergé.
      // Ici on garde un SW minimal pour conformité PWA install.
      const swCode = `
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => self.clients.claim());
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
    }

    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    if (typeof requestGeolocationPermission === 'function') {
      requestGeolocationPermission();
    }

    // V2.11.0 — Attendre la fin du pull cloud lancé en parallèle, puis re-render
    if (cloudPullPromise) {
      cloudPullPromise.then(() => {
        if (typeof render === 'function') render();
      });
    }
    
    // V2.12.1 FIX — Démarrer le polling AppConfig (incluant urgence 15s)
    // Important : ce démarrage doit avoir lieu après login frais (sinon pas de réception urgence)
    if (typeof startAppConfigPolling === 'function') {
      startAppConfigPolling();
    }
    // V2.12.2 — Charger les acquittements persistés AVANT de check urgence
    if (typeof loadAcknowledgedIds === 'function') {
      loadAcknowledgedIds();
    }
    // V2.12.1 — Vérifier immédiatement s'il y a une urgence active
    if (typeof checkUrgenceActive === 'function') {
      checkUrgenceActive();
    }
  } catch (err) {
    console.error('startMainApp error', err);
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444">Erreur : ' + err.message + '</div>';
  }
}

async function handleLogoutClick() {
  if (!confirm('Se déconnecter ?')) return;
  await authLogout();
}

// ============================================================================
// ASTREINTES AMI2S V2.10.1 — MODULE CLOUD SYNC (Patch 2)
// ============================================================================
// Sync bidirectionnelle dossiers avec le nouveau backend multi-tenants.
// Migration manuelle des dossiers locaux vers le cloud (bouton Réglages).
// ============================================================================

let cloudSyncState = {
  status: 'idle', // idle | syncing | ok | error
  lastSync: null,
  pendingChanges: 0,
  lastError: null
};

// ── Appel API authentifié (réutilise authCall) ─────────────────
async function cloudCall(action, data) {
  if (!authState.token) {
    return { success: false, error: 'Non authentifié' };
  }
  return await authCall(action, data);
}

// ── Récupérer tous les dossiers du cloud pour cet utilisateur ──
async function cloudPull(showFeedback = false) {
  if (!authState.isAuthenticated) return { success: false, error: 'Non connecté' };

  cloudSyncState.status = 'syncing';
  updateSyncBadge();

  try {
    const res = await cloudCall('getDossiers', {});
    if (!res.success) throw new Error(res.error);

    const remoteDossiers = res.dossiers || [];
    const currentUserId = authState.user && authState.user.id;

    // V2.11.0 — Filtrage côté frontend : on ne traite QUE les dossiers
    // appartenant à l'utilisateur connecté (admin verra tous les dossiers
    // de l'équipe via le futur Dashboard, pas ici)
    const myRemoteDossiers = remoteDossiers.filter(d => d.user_id === currentUserId);

    // V2.11.0 — Identifier les dossiers locaux à supprimer
    // (présents en local mais plus dans le cloud OU appartenant à un autre user)
    const remoteIdsByUser = new Set(myRemoteDossiers.map(d => d.id));
    const toDelete = state.dossiers.filter(d => {
      // Dossier d'un autre user → à supprimer du local
      if (d.user_id && d.user_id !== currentUserId) return true;
      // Dossier déjà synchronisé qui n'existe plus côté cloud → à supprimer du local
      // (sauf s'il n'a pas encore été pushé : pas de user_id du tout)
      if (d.user_id === currentUserId && !remoteIdsByUser.has(d.id)) return true;
      return false;
    });

    for (const d of toDelete) {
      try { await dbDelete('dossiers', d.id); } catch (e) {}
    }
    state.dossiers = state.dossiers.filter(d => !toDelete.includes(d));

    const localById = {};
    state.dossiers.forEach(d => { localById[d.id] = d; });

    let added = 0, updated = 0, repaired = 0, restored = 0;
    const toRepair = []; // V2.11.0 — dossiers à re-pousser vers le cloud

    for (const remote of myRemoteDossiers) {
      const adapted = adaptCloudToLocal(remote);
      const local = localById[adapted.id];
      if (!local) {
        await dbPut('dossiers', adapted);
        state.dossiers.push(adapted);
        added++;
      } else {
        // ────────────────────────────────────────────────────────────
        // V2.11.0 — RÉPARATION PRIORITAIRE : récupérer departSite depuis le cloud
        // ────────────────────────────────────────────────────────────
        // Si le cloud a finIntervention rempli MAIS le local n'a pas departSite,
        // c'est que le local a été corrompu (bug pré-V2.10.6). On restaure depuis le cloud.
        const localHasDepartSite = local.departSite && local.departSite !== '';
        const cloudHasFinInter = remote.finIntervention && remote.finIntervention !== '';

        if (cloudHasFinInter && !localHasDepartSite) {
          // ✅ Récupération depuis le cloud (priorité absolue, ignore les timestamps)
          local.departSite = remote.finIntervention;
          local.finIntervention = remote.finIntervention;
          await dbPut('dossiers', local);
          const idx = state.dossiers.findIndex(x => x.id === adapted.id);
          if (idx >= 0) state.dossiers[idx] = local;
          restored++;
          continue;
        }

        // V2.11.0 — Réparation inverse : local a departSite mais cloud a finIntervention vide
        // On re-pousse vers le cloud
        if (localHasDepartSite && !cloudHasFinInter) {
          toRepair.push(local);
          repaired++;
          continue;
        }

        // Sync standard : last-write-wins
        const localTime = new Date(local.updatedAt || local.updated_at || local.createdAt || 0).getTime();
        const remoteTime = new Date(adapted.updatedAt || adapted.updated_at || 0).getTime();
        if (remoteTime > localTime) {
          // V2.16.6 GF#4 — Protection anti-écrasement : ne JAMAIS vider un retour domicile
          // rempli (ni dé-clôturer) avec une version cloud incomplète, même plus récente.
          // Un retour rempli ne se vide jamais sans action utilisateur explicite.
          const localRetourFilled = local.retourDomicile && local.retourDomicile !== '';
          const remoteRetourEmpty = !remote.retourDomicile || remote.retourDomicile === '';
          const localCloture = local.statut === 'cloture' || local.cloture === true;
          const remoteNotCloture = !(remote.cloture === true || remote.cloture === 'true');
          if ((localRetourFilled && remoteRetourEmpty) || (localCloture && remoteNotCloture && remoteRetourEmpty)) {
            console.warn('[GF4] Écrasement cloud BLOQUÉ (version cloud incomplète) pour', local.id, '— version locale préservée et re-poussée');
            toRepair.push(local);
            continue;
          }
          await dbPut('dossiers', adapted);
          const idx = state.dossiers.findIndex(x => x.id === adapted.id);
          if (idx >= 0) state.dossiers[idx] = adapted;
          updated++;
        }
      }
    }

    // V2.11.0 — Toast informatif sur la restauration
    if (restored > 0) {
      console.log(`✅ Restauration : ${restored} dossier(s) ont récupéré leur "Départ du site" depuis le cloud`);
      setTimeout(() => {
        toast(`✅ ${restored} dossier(s) restauré(s) depuis le cloud`, 'success');
      }, 500);
    }

    // V2.11.0 — Re-pousser les dossiers à réparer (en arrière-plan, pas bloquant)
    if (toRepair.length > 0) {
      console.log(`Réparation : ${toRepair.length} dossier(s) avec departSite manquant côté cloud`);
      (async () => {
        for (let i = 0; i < toRepair.length; i++) {
          await cloudPushDossier(toRepair[i], false);
          if (i % 3 === 2) await new Promise(r => setTimeout(r, 400));
        }
        toast(`🔧 ${toRepair.length} dossier(s) réparé(s) (departSite re-synchronisé)`, 'success');
      })();
    }

    cloudSyncState.status = 'ok';
    cloudSyncState.lastSync = new Date().toISOString();
    cloudSyncState.lastError = null;
    updateSyncBadge();

    if (showFeedback) {
      const removed = toDelete.length;
      toast(`Cloud : ${added} ajouté(s), ${updated} mis à jour${removed ? ', ' + removed + ' supprimé(s) du local' : ''}`, 'success');
    }
    
    // V2.14.7 — Réparation auto des séquences orphelines après sync
    // (silent = pas de toast spam, juste des logs console si quelque chose est réparé)
    try {
      await repairOrphanSequences(true);
    } catch (e) {
      console.warn('[V2.14.7] repairOrphanSequences error:', e);
    }

    // V2.16.6 GF#1 — Audit d'intégrité (démarrage + toutes les 15 min)
    try { ensureIntegrityInterval(); refreshIntegrityBanner(); } catch (e) { console.warn('[GF1] audit error:', e); }

    if (typeof render === 'function') render();
    return { success: true, added, updated };
  } catch (err) {
    console.error('cloudPull error', err);
    cloudSyncState.status = 'error';
    cloudSyncState.lastError = err.message;
    updateSyncBadge();
    if (showFeedback) toast('Erreur cloud pull : ' + err.message, 'error');
    return { success: false, error: err.message };
  }
}

// ── Envoyer un dossier vers le cloud ────────────────────────────
async function cloudPushDossier(dossier, showFeedback = false) {
  if (!authState.isAuthenticated) return { success: false, error: 'Non connecté' };

  try {
    // V2.16.6 GF#3 — Validation du payload : refuser l'envoi d'un dossier corrompu
    const _vErr = validateDossierForCloud(dossier);
    if (_vErr) {
      console.error('[GF3] Envoi cloud REFUSÉ (' + _vErr + ') pour le dossier', dossier && dossier.id, dossier);
      if (showFeedback) toast('⛔ Envoi annulé : ' + _vErr, 'error');
      return { success: false, error: 'Payload invalide : ' + _vErr };
    }
    const adapted = adaptLocalToCloud(dossier);
    const res = await cloudCall('saveDossier', { dossier: adapted });
    if (!res.success) throw new Error(res.error);
    if (showFeedback) toast('Dossier synchronisé', 'success');
    return { success: true };
  } catch (err) {
    console.error('cloudPushDossier error', err);
    if (showFeedback) toast('Erreur push : ' + err.message, 'error');
    return { success: false, error: err.message };
  }
}

// ── Sync auto en arrière-plan (debounce) ───────────────────────
let cloudSyncTimeout = null;
function scheduleCloudSync(dossier) {
  if (!authState.isAuthenticated) return;
  cloudSyncState.pendingChanges++;
  updateSyncBadge();

  if (cloudSyncTimeout) clearTimeout(cloudSyncTimeout);
  cloudSyncTimeout = setTimeout(async () => {
    if (dossier) {
      await cloudPushDossier(dossier, false);
    }
    cloudSyncState.pendingChanges = 0;
    cloudSyncState.lastSync = new Date().toISOString();
    cloudSyncState.status = 'ok';
    updateSyncBadge();
  }, 3000);
}

// ════════════════════════════════════════════════════════════════════════
// V2.16.6 — GARDE-FOUS ANTI-CORRUPTION (séquence fantôme / sauvegarde cloud)
// ════════════════════════════════════════════════════════════════════════

// GF#3 — Validation du payload avant envoi cloud.
// Retourne null si OK, sinon un message d'erreur.
function validateDossierForCloud(d) {
  if (!d || !d.id) return "id manquant";
  if (d.statut === undefined || d.statut === null || d.statut === '') return "statut manquant";
  return null;
}

// GF#2 — File de re-synchronisation pour les sauvegardes critiques non confirmées.
const criticalResyncQueue = [];
let _resyncTimer = null;
function enqueueCriticalResync(dossier) {
  if (!criticalResyncQueue.find(x => x.id === dossier.id)) criticalResyncQueue.push(dossier);
  if (_resyncTimer) return;
  let attempt = 0;
  const tick = async () => {
    if (!criticalResyncQueue.length) { _resyncTimer = null; return; }
    attempt++;
    const item = criticalResyncQueue[0];
    const r = await cloudSaveCritical(item, true);
    if (r.success) {
      criticalResyncQueue.shift();
      toast('✅ Sauvegarde confirmée (re-sync auto)', 'success');
      attempt = 0;
      _resyncTimer = setTimeout(tick, 1200);
    } else {
      const delay = Math.min(30000, 3000 * attempt);
      _resyncTimer = setTimeout(tick, delay);
    }
  };
  _resyncTimer = setTimeout(tick, 3000);
}

// GF#2 — Sauvegarde cloud AVEC vérification (refetch immédiat). Utilisée pour les
// actions critiques qui ferment une séquence (retour domicile, clôture).
async function cloudSaveCritical(dossier, fromQueue) {
  if (!authState.isAuthenticated) return { success: false, error: 'Non connecté' };
  try {
    const push = await cloudPushDossier(dossier, false);
    if (!push.success) throw new Error(push.error || 'push échoué');
    // Vérification : on relit le cloud immédiatement pour confirmer
    const res = await cloudCall('getDossiers', {});
    if (!res.success) throw new Error(res.error || 'vérif échouée');
    const cloud = (res.dossiers || []).find(x => x.id === dossier.id);
    if (!cloud) throw new Error('introuvable après envoi');
    const wantRetour = dossier.retourDomicile;
    const okRetour = !wantRetour || (cloud.retourDomicile && cloud.retourDomicile !== '');
    const wantCloture = (dossier.statut === 'cloture') || (dossier.cloture === true);
    const okCloture = !wantCloture || (cloud.cloture === true || cloud.cloture === 'true');
    if (!okRetour || !okCloture) throw new Error('non confirmé côté cloud');
    return { success: true };
  } catch (e) {
    console.warn('[GF2] cloudSaveCritical échec :', e.message, dossier && dossier.id);
    if (!fromQueue) {
      toast('⚠️ Sauvegarde non confirmée, nouvelle tentative automatique...', 'error');
      enqueueCriticalResync(dossier);
    }
    return { success: false, error: e.message };
  }
}

// GF#1 — Audit d'intégrité : détecte les dossiers suspects/corrompus.
function findCorruptedDossiers() {
  const uid = authState.user && authState.user.id;
  const now = Date.now();
  const list = (state.dossiers || []).filter(d => d && !d.deleted && (!uid || !d.user_id || d.user_id === uid));
  const issues = [];
  list.forEach(d => {
    const reasons = [];
    const upd = d.updated_at || d.updatedAt;
    const updT = upd ? new Date(upd).getTime() : 0;
    const depSite = d.departSite || d.finIntervention;
    // Signature DOMITYS : sauvegarde antérieure au départ site
    if (depSite && depSite !== 'X' && updT && new Date(depSite).getTime() > updT + 1000) {
      reasons.push('Sauvegarde antérieure au départ site');
    }
    if (d.arriveeSite && d.arriveeSite !== 'X' && updT && new Date(d.arriveeSite).getTime() > updT + 1000) {
      reasons.push("Sauvegarde antérieure à l'arrivée site");
    }
    if (d.statut === undefined || d.statut === null || d.statut === '') {
      reasons.push('Statut manquant');
    }
    // Intervention ouverte anormalement longue (> 18h sans retour)
    if (d.type === 'deplacement' && d.statut === 'intervention' && !d.retourDomicile && d.dateAppel) {
      const ageH = (now - new Date(d.dateAppel).getTime()) / 3600000;
      if (ageH > 18) reasons.push('Intervention ouverte depuis ' + Math.round(ageH) + 'h');
    }
    if (reasons.length) issues.push({ d, reasons });
  });
  return issues;
}

let _integrityIntervalSet = false;

// GF#1 — Réparation d'un dossier corrompu
async function repairCorruptedDossier(id) {
  const d = (state.dossiers || []).find(x => x.id === id);
  if (!d) { toast('Dossier introuvable', 'error'); return; }
  // Statut manquant → inférer
  if (d.statut === undefined || d.statut === null || d.statut === '') {
    d.statut = (d.cloture === true || (d.retourDomicile && d.retourDomicile !== '')) ? 'cloture'
             : (d.type === 'deplacement' ? 'intervention' : 'pending');
  }
  // Déplacement ouvert sans retour → demander la date + l'heure de retour
  if (d.type === 'deplacement' && (!d.retourDomicile || d.retourDomicile === '')) {
    const base = new Date(d.departSite || d.finIntervention || d.dateAppel || Date.now());
    const day = await showDatePicker(base);
    if (!day) return;
    const dt = await showTimePicker(day, 'Heure de retour domicile');
    if (!dt) return;
    const finalRetour = new Date(day);
    finalRetour.setHours(dt.getHours(), dt.getMinutes(), 0, 0);
    d.retourDomicile = finalRetour.toISOString();
    d.statut = 'cloture';
    d.cloture = true;
    if (typeof recalcDurations === 'function') recalcDurations(d);
  }
  d.updated_at = new Date().toISOString();
  await saveDossier(d);
  const res = await cloudSaveCritical(d);
  if (res.success) toast('✅ Dossier réparé et synchronisé', 'success');
  refreshIntegrityBanner();
  render();
}

// ── Adaptateurs entre format local et format cloud ─────────────
function adaptLocalToCloud(d) {
  // Cloud attend les mêmes noms de champs mais ajoute user_id/username
  return {
    id: d.id,
    user_id: d.user_id || (authState.user && authState.user.id) || '',
    username: d.username || (authState.user && authState.user.username) || '',
    type: d.type || '',
    dateAppel: d.dateAppel || '',
    heureAppel: d.heureAppel || '',
    etablissement: d.etablissement || '',
    codeAstreinte: d.codeAstreinte || '',
    demandeur: d.demandeur || '',
    rapportNum: d.rapportNum || d.rapportN || '',
    departDomicile: d.departDomicile || '',
    arriveeSite: d.arriveeSite || '',
    // V2.11.0 — Bug fix : le champ local s'appelle "departSite" (départ du site),
    // on l'envoie dans la colonne cloud "finIntervention" (= heure de fin d'intervention sur site)
    finIntervention: d.departSite || d.finIntervention || '',
    retourDomicile: d.retourDomicile || '',
    adresse: d.adresse || d.adresseSite || '',
    km: d.km !== undefined ? d.km : '',
    motif: d.motif || '',
    rapport: d.rapport || '',
    compteRendu: d.compteRendu || '',
    sequenceId: d.sequenceId || '',
    cloture: d.cloture || d.statut === 'cloture' || false,
    recupereERP: d.recupereERP || false,
    // V2.14.0 — Persistance du point de départ (domicile / autre-site / autre-lieu)
    pointDepart: d.pointDepart || 'domicile',
    created_at: d.createdAt || d.created_at || new Date().toISOString(),
    updated_at: new Date().toISOString(),
    deleted: d.deleted || false
  };
}

function adaptCloudToLocal(d) {
  // On préserve les champs natifs du local pour éviter de casser la V2.9.12
  // V2.11.0 — Forcer la conversion en string pour les champs texte
  // (Google Sheets peut retourner des nombres pour codeAstreinte, rapportNum, etc.)
  const toStr = (v) => (v === null || v === undefined || v === '') ? '' : String(v);
  return {
    id: d.id,
    user_id: d.user_id,
    username: d.username,
    type: d.type,
    dateAppel: d.dateAppel,
    heureAppel: d.heureAppel,
    etablissement: toStr(d.etablissement),
    codeAstreinte: toStr(d.codeAstreinte),
    demandeur: toStr(d.demandeur),
    rapportNum: toStr(d.rapportNum),
    rapportN: toStr(d.rapportNum), // alias rétrocompat
    departDomicile: d.departDomicile,
    arriveeSite: d.arriveeSite,
    // V2.11.0 — Bug fix : on recupère "finIntervention" du cloud et on le réinjecte dans "departSite" local
    finIntervention: d.finIntervention,
    departSite: d.finIntervention || null,
    retourDomicile: d.retourDomicile,
    adresse: toStr(d.adresse),
    adresseSite: toStr(d.adresse), // alias rétrocompat
    // V2.11.0 — Sécurité : km doit être un nombre valide, sinon null
    km: (() => { const n = safeKm(d.km); return n > 0 ? n : null; })(),
    motif: toStr(d.motif),
    rapport: toStr(d.rapport),
    compteRendu: toStr(d.compteRendu),
    sequenceId: d.sequenceId,
    cloture: d.cloture,
    statut: d.cloture ? 'cloture' : 'intervention',
    recupereERP: d.recupereERP,
    // V2.14.0 — Persistance du point de départ (domicile / autre-site / autre-lieu)
    pointDepart: d.pointDepart || 'domicile',
    createdAt: d.created_at,
    created_at: d.created_at,
    updatedAt: d.updated_at,
    updated_at: d.updated_at,
    deleted: d.deleted
  };
}

// ── Migration des dossiers locaux vers le cloud (bouton manuel) ─
async function migrateLocalDossiersToCloud() {
  if (!authState.isAuthenticated) {
    toast('Vous devez être connecté', 'error');
    return;
  }

  // V2.11.0 — Ne migrer que les dossiers qui m'appartiennent ou qui n'ont pas encore de user_id
  const myId = authState.user && authState.user.id;
  const toMigrate = state.dossiers.filter(d => !d.user_id || d.user_id === myId);
  const localCount = toMigrate.length;
  if (localCount === 0) {
    toast('Aucun dossier local à migrer', 'warning');
    return;
  }

  if (!confirm(`Migrer ${localCount} dossier(s) local(aux) vers le cloud ?\n\nLes dossiers existants dans le cloud avec le même ID seront mis à jour.`)) {
    return;
  }

  toast(`Migration de ${localCount} dossiers en cours...`, 'warning');
  let success = 0, errors = 0;

  for (let i = 0; i < toMigrate.length; i++) {
    const d = toMigrate[i];
    const res = await cloudPushDossier(d, false);
    if (res.success) success++;
    else errors++;
    // Petit délai pour pas saturer Google
    if (i % 5 === 4) await new Promise(r => setTimeout(r, 500));
  }

  if (errors === 0) {
    toast(`${success} dossiers migrés avec succès`, 'success');
    // V2.11.0 — Flag de migration par user (et non global)
    if (authState.user && authState.user.id) {
      localStorage.setItem('astreintes_migration_done_' + authState.user.id, '1');
    }
  } else {
    toast(`${success} OK, ${errors} erreurs`, 'warning');
  }
  if (typeof render === 'function') render();
}

function hasMigrationBeenDone() {
  // V2.11.0 — Flag par user (chaque user a sa propre migration)
  if (!authState.user || !authState.user.id) return false;
  return localStorage.getItem('astreintes_migration_done_' + authState.user.id) === '1';
}

let userSettingsSyncTimeout = null;
function scheduleUserSettingsSave() {
  if (!authState.isAuthenticated) return;
  if (userSettingsSyncTimeout) clearTimeout(userSettingsSyncTimeout);

// V2.13.2 — Calcule la plage de dates [start, end] selon le filtre période
// Retourne null si pas de filtre période (tout)
function computeFilterDateRange() {
  const f = dashboardState.advFilters;
  if (!f.period || f.period === 'all') return null;
  const now = new Date();
  if (f.period === 'today') {
    const start = new Date(now); start.setHours(0,0,0,0);
    const end = new Date(now); end.setHours(23,59,59,999);
    return { start, end };
  }
  if (f.period === '7d') {
    const end = new Date(now);
    const start = new Date(now.getTime() - 7 * 86400000);
    return { start, end };
  }
  if (f.period === '30d') {
    const end = new Date(now);
    const start = new Date(now.getTime() - 30 * 86400000);
    return { start, end };
  }
  if (f.period === 'week-astreinte') {
    // Semaine d'astreinte courante (Lun 9h → Lun 9h)
    const { start, end } = getAstreinteWeek(now);
    return { start, end };
  }
  if (f.period === 'custom') {
    if (!f.customStart || !f.customEnd) return null;
    const start = new Date(f.customStart + 'T00:00:00');
    const end = new Date(f.customEnd + 'T23:59:59');
    if (isNaN(start.getTime()) || isNaN(end.getTime())) return null;
    return { start, end };
  }
  return null;
}

// V2.13.2 — Détecte si un dossier a été créé pendant les heures d'astreinte (hors bureau)
// Bureau : Lun-Jeu 9h-18h, Ven 9h-17h. Reste = astreinte.
function isDuringAstreinteHours(dateAppel) {
  try {
    const d = new Date(dateAppel);
    if (isNaN(d.getTime())) return false;
    const day = d.getDay(); // 0=dim, 1=lun, ..., 6=sam
    const h = d.getHours() + d.getMinutes() / 60;
    // Week-end : samedi (6) et dimanche (0) = toujours astreinte
    if (day === 0 || day === 6) return true;
    // Lundi à jeudi : bureau 9h-18h
    if (day >= 1 && day <= 4) return !(h >= 9 && h < 18);
    // Vendredi : bureau 9h-17h
    if (day === 5) return !(h >= 9 && h < 17);
    return false;
  } catch(e) { return false; }
}

// V2.13.2 — Applique les filtres avancés sur une liste de dossiers
// Utilisé par renderDashboardOverview / renderDashboardStats
function applyDashboardAdvFilters(dossiers) {
  const f = dashboardState.advFilters;
  let list = dossiers || [];
  
  // Filtre période
  const range = computeFilterDateRange();
  if (range) {
    list = list.filter(d => {
      const dt = new Date(d.dateAppel);
      return dt >= range.start && dt <= range.end;
    });
  }
  
  // Filtre techniciens (par user_id)
  if (f.techs && f.techs.length > 0) {
    const techSet = new Set(f.techs);
    list = list.filter(d => techSet.has(d.user_id));
  }
  
  // Filtre type
  if (f.type === 'telephone') list = list.filter(d => d.type === 'telephone');
  else if (f.type === 'deplacement') list = list.filter(d => d.type === 'deplacement');
  
  // Filtre statut
  if (f.statut === 'en-cours') list = list.filter(d => !dashboardIsCloture(d));
  else if (f.statut === 'clotures') list = list.filter(d => dashboardIsCloture(d));
  else if (f.statut === 'non-recupere-erp') list = list.filter(d => dashboardIsCloture(d) && !d.recupereERP);
  
  // Filtre astreinte uniquement (hors heures bureau)
  if (f.astreinteOnly) {
    list = list.filter(d => isDuringAstreinteHours(d.dateAppel));
  }
  
  return list;
}

// V2.13.2 — Applique les filtres avancés sur la liste d'urgences (logique différente)
function applyDashboardAdvFiltersUrgences(urgences) {
  const f = dashboardState.advFilters;
  let list = urgences || [];
  
  // Filtre période (sur dateDeclenchement)
  const range = computeFilterDateRange();
  if (range) {
    list = list.filter(u => {
      try {
        const dt = new Date(u.dateDeclenchement);
        return dt >= range.start && dt <= range.end;
      } catch(e) { return false; }
    });
  }
  
  // Filtre techniciens (par userIdDeclencheur)
  if (f.techs && f.techs.length > 0) {
    const techSet = new Set(f.techs);
    list = list.filter(u => techSet.has(u.userIdDeclencheur));
  }
  
  // Filtre statut (interprété pour urgences : en-cours = non acquittée, clotures = acquittée)
  if (f.statut === 'en-cours') list = list.filter(u => !u.dateAcquittement);
  else if (f.statut === 'clotures') list = list.filter(u => !!u.dateAcquittement);
  // 'non-recupere-erp' n'a pas de sens pour les urgences, on ignore
  // 'type' et 'astreinteOnly' non applicables aux urgences
  
  return list;
}

// Graphique a) Évolution mensuelle sur 12 derniers mois (ou période filtrée si filtre actif)
function buildDatasetEvolutionMensuelle(dossiers) {
  const f = dashboardState.advFilters;
  const hasPeriodFilter = f.period && f.period !== 'all';
  
  // Si filtre période actif, on utilise la plage filtrée, sinon 12 mois glissants
  let monthsCount = 12;
  let endDate = new Date();
  let startDate = new Date(endDate.getFullYear(), endDate.getMonth() - 11, 1);
  
  if (hasPeriodFilter) {
    const range = computeFilterDateRange();
    if (range) {
      startDate = new Date(range.start.getFullYear(), range.start.getMonth(), 1);
      endDate = range.end;
      // Calcul du nb de mois inclus
      monthsCount = (endDate.getFullYear() - startDate.getFullYear()) * 12 + (endDate.getMonth() - startDate.getMonth()) + 1;
      if (monthsCount < 1) monthsCount = 1;
      if (monthsCount > 24) monthsCount = 24; // cap pour ne pas exploser
    }
  }
  
  const labels = [];
  const counts = [];
  const moisCourts = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Août', 'Sep', 'Oct', 'Nov', 'Déc'];
  
  for (let i = 0; i < monthsCount; i++) {
    const d = new Date(startDate.getFullYear(), startDate.getMonth() + i, 1);
    const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
    const monthEnd = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);
    const yyStr = String(d.getFullYear()).slice(2);
    labels.push(moisCourts[d.getMonth()] + ' ' + yyStr);
    
    const n = dossiers.filter(dos => {
      try {
        const dt = new Date(dos.dateAppel);
        return dt >= monthStart && dt <= monthEnd;
      } catch(e) { return false; }
    }).length;
    counts.push(n);
  }
  
  return { labels: labels, counts: counts };
}

// Graphique b) Activité par jour de la semaine (Lun=1, Dim=7 en interne mais affichage Lun → Dim)
function buildDatasetParJourSemaine(dossiers) {
  // Index : 0=Lun, 1=Mar, ..., 6=Dim (notre format affichage)
  const counts = [0, 0, 0, 0, 0, 0, 0];
  dossiers.forEach(d => {
    try {
      const dt = new Date(d.dateAppel);
      // getDay() : 0=Dim, 1=Lun, ..., 6=Sam → on remappe pour Lun=0
      const jsDay = dt.getDay();
      const idx = (jsDay === 0) ? 6 : (jsDay - 1);
      counts[idx]++;
    } catch(e) {}
  });
  return { labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'], counts: counts };
}

// Graphique c) Activité par heure de la journée (0-23)
function buildDatasetParHeure(dossiers) {
  const counts = new Array(24).fill(0);
  dossiers.forEach(d => {
    try {
      const dt = new Date(d.dateAppel);
      const h = dt.getHours();
      if (h >= 0 && h < 24) counts[h]++;
    } catch(e) {}
  });
  // Labels 00h, 01h, ..., 23h
  const labels = [];
  for (let i = 0; i < 24; i++) labels.push(String(i).padStart(2, '0') + 'h');
  return { labels: labels, counts: counts };
}

// Graphique e) Charge par technicien (nb de dossiers par tech, trié décroissant)
function buildDatasetChargeParTech(dossiers) {
  const byTech = {};
  dossiers.forEach(d => {
    const username = dashboardGetUsername(d);
    if (!username) return;
    byTech[username] = (byTech[username] || 0) + 1;
  });
  // Trier par nb décroissant
  const sorted = Object.entries(byTech).sort((a, b) => b[1] - a[1]);
  return {
    labels: sorted.map(x => x[0]),
    counts: sorted.map(x => x[1])
  };
}

// Graphique g) Évolution des urgences par semaine (sur les 12 dernières semaines ou période filtrée)
function buildDatasetEvolutionUrgences(urgences) {
  const f = dashboardState.advFilters;
  const hasPeriodFilter = f.period && f.period !== 'all';
  
  let weeksCount = 12;
  let endDate = new Date();
  // Lundi de la semaine courante à 00h
  const dayOfWeek = endDate.getDay() === 0 ? 6 : endDate.getDay() - 1; // 0=Lun
  let lastWeekStart = new Date(endDate);
  lastWeekStart.setDate(lastWeekStart.getDate() - dayOfWeek);
  lastWeekStart.setHours(0, 0, 0, 0);
  
  if (hasPeriodFilter) {
    const range = computeFilterDateRange();
    if (range) {
      // On part du lundi de la semaine de range.start
      const rangeDayOfWeek = range.start.getDay() === 0 ? 6 : range.start.getDay() - 1;
      const startWeek = new Date(range.start);
      startWeek.setDate(startWeek.getDate() - rangeDayOfWeek);
      startWeek.setHours(0, 0, 0, 0);
      const diffMs = lastWeekStart.getTime() - startWeek.getTime();
      weeksCount = Math.ceil(diffMs / (7 * 86400000)) + 1;
      if (weeksCount < 1) weeksCount = 1;
      if (weeksCount > 24) weeksCount = 24;
      lastWeekStart = new Date(lastWeekStart);
    }
  }
  
  const labels = [];
  const counts = [];
  // On démarre de (weeksCount - 1) semaines avant lastWeekStart
  for (let i = weeksCount - 1; i >= 0; i--) {
    const weekStart = new Date(lastWeekStart);
    weekStart.setDate(weekStart.getDate() - i * 7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 7);
    
    // Label : "S22" (numéro de semaine ISO)
    const weekNum = getWeekNumber(weekStart);
    labels.push('S' + weekNum);
    
    const n = urgences.filter(u => {
      try {
        const dt = new Date(u.dateDeclenchement);
        return dt >= weekStart && dt < weekEnd;
      } catch(e) { return false; }
    }).length;
    counts.push(n);
  }
  
  return { labels: labels, counts: counts };
}

// Graphique h) Délais d'acquittement urgences (histogramme par tranches)
function buildDatasetDelaisAck(urgences) {
  // Tranches : < 1min, 1-5min, 5-15min, 15-30min, > 30min
  const buckets = [0, 0, 0, 0, 0];
  const labels = ['< 1 min', '1-5 min', '5-15 min', '15-30 min', '> 30 min'];
  
  urgences.forEach(u => {
    const s = u.delaiAckSeconds;
    if (s === null || s === undefined || s === '' || isNaN(s)) return;
    const sec = Number(s);
    if (sec < 60) buckets[0]++;
    else if (sec < 5 * 60) buckets[1]++;
    else if (sec < 15 * 60) buckets[2]++;
    else if (sec < 30 * 60) buckets[3]++;
    else buckets[4]++;
  });
  
  return { labels: labels, counts: buckets };
}

// V2.16.6 — Clé de semaine ISO "AAAA-Wnn" (gère le passage d'année)
function getWeekKey(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const isoYear = d.getUTCFullYear();
  const yearStart = new Date(Date.UTC(isoYear, 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return isoYear + '-W' + String(weekNo).padStart(2, '0');
}

// V2.16.6 — Map du planning d'astreinte multi-semaines
function getAstreintePlanning() {
  try {
    const m = JSON.parse(appConfig.astreintePlanning || '{}');
    return (m && typeof m === 'object') ? m : {};
  } catch (e) {
    return {};
  }
}

// V2.16.6 — Résout la désignation d'astreinte de la semaine courante.
// Priorité au planning multi-semaines ; repli sur les anciennes clés (rétrocompat).
function resolveCurrentAstreinte() {
  const wk = getWeekKey(new Date());
  const m = getAstreintePlanning();
  if (m[wk] && m[wk].t) {
    return { titulaireId: m[wk].t, suppleantId: m[wk].s || '' };
  }
  // Repli legacy : ancienne désignation mono-semaine (clés séparées)
  if (appConfig.astreinteTitulaireId && appConfig.astreinteWeekNumber === getWeekNumber(new Date())) {
    return { titulaireId: appConfig.astreinteTitulaireId, suppleantId: appConfig.astreinteSuppleantId || '' };
  }
  return null;
}

function isCurrentUserAstreinteTitulaire() {
  if (!appConfig.loaded || !authState.user) return false;
  const a = resolveCurrentAstreinte();
  return !!(a && authState.user.id === a.titulaireId);
}

// Vérifier si l'utilisateur courant est le tech d'astreinte suppléant
function isCurrentUserAstreinteSuppleant() {
  if (!appConfig.loaded || !authState.user) return false;

  return !!(a && a.suppleantId && authState.user.id === a.suppleantId);
}

  // Filtrer les personnes pouvant être désignées comme tech d'astreinte
  // V2.13.6 — Inclure aussi admin et manager (humains qui peuvent intervenir),
  // exclure uniquement superviseur (qui est une tablette) et les comptes supprimés
  const techs = users.filter(u => {
    if (u.deleted === true || u.deleted === 'true') return false;
    return u.role === 'technicien' || u.role === 'admin' || u.role === 'manager';

  let selectedOffset = 0;
  const weekSelections = {}; // { "AAAA-Wnn": { t: titulaireId, s: suppleantId } }
  (function initWeekSelections() {
    const m = getAstreintePlanning();
    Object.keys(m).forEach(wk => {
      if (m[wk] && m[wk].t) weekSelections[wk] = { t: m[wk].t, s: m[wk].s || '' };
    });
    // Import legacy (ancienne désignation mono-semaine) si pas déjà dans la map
    const curK = getWeekKey(new Date());
    if (!weekSelections[curK] && appConfig.astreinteTitulaireId && appConfig.astreinteWeekNumber === currentWeekNum) {
      weekSelections[curK] = { t: appConfig.astreinteTitulaireId, s: appConfig.astreinteSuppleantId || '' };
    }
  })();

  const selWeekDate = () => { const b = new Date(); b.setDate(b.getDate() + selectedOffset * 7); return b; };
  const selWeekKeyFn = () => getWeekKey(selWeekDate());
  const selWeekNumFn = () => getWeekNumber(selWeekDate());
  const selWeekRangeLabel = () => {
    const w = getAstreinteWeek(selWeekDate());
    const opt = { day: '2-digit', month: '2-digit' };
    return w.start.toLocaleDateString('fr-FR', opt) + ' 09h → ' + w.end.toLocaleDateString('fr-FR', opt) + ' 09h';
  };

  let selectedTitulaire = '';
  let selectedSuppleant = '';
  const syncSelFromWeek = () => {
    const c = weekSelections[selWeekKeyFn()] || { t: '', s: '' };
    selectedTitulaire = c.t || '';
    selectedSuppleant = c.s || '';
  };
  const commitSelToWeek = () => {
    const k = selWeekKeyFn();
    if (selectedTitulaire) weekSelections[k] = { t: selectedTitulaire, s: selectedSuppleant || '' };
    else delete weekSelections[k];
  };
  syncSelFromWeek();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay visible';
  
  const renderModal = () => {
    const titulaireName = techs.find(t => t.id === selectedTitulaire);
    const suppleantName = techs.find(t => t.id === selectedSuppleant);
    
    overlay.innerHTML = `
      <div class="modal" style="max-width:560px">
        <div class="modal-header">
          <div class="modal-title">🚨 Astreinte de la semaine</div>
          <button class="modal-close" data-action="ast-close">×</button>
        </div>
        <div class="modal-body" style="padding:20px;max-height:70vh;overflow-y:auto">
          <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:18px;font-size:13px;color:var(--text)">
            <strong>💡 À quoi sert cette désignation ?</strong><br>
            <span style="color:var(--text-tertiary)">
              Seul le <strong>titulaire</strong> verra le bandeau rouge "🔴 ASTREINTE EN COURS" sur sa page Dossiers.<br>
              Le <strong>suppléant</strong> verra un bandeau orange "🥈 Suppléant - en backup".<br>
              Les autres techs n'auront aucune alerte. La désignation expire à la fin de la semaine.
            </span>
          </div>
          
          <div style="padding:12px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.3);border-radius:10px;margin-bottom:18px">
            <div style="font-size:11px;text-transform:uppercase;color:var(--text-tertiary);letter-spacing:0.5px;margin-bottom:6px;text-align:center">Semaine concernée</div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <button data-action="ast-week-prev" ${selectedOffset <= 0 ? 'disabled style="opacity:0.3;cursor:not-allowed"' : 'style="cursor:pointer"'} style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;font-size:18px;color:var(--text);font-weight:700;flex-shrink:0">‹</button>
              <div style="flex:1;text-align:center">
                <div style="font-size:16px;font-weight:700;color:var(--text)">Semaine n°${selWeekNumFn()}${selectedOffset === 0 ? ' (en cours)' : selectedOffset === 1 ? ' (suivante)' : ' (dans ' + selectedOffset + ' sem.)'}</div>
                <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">${selWeekRangeLabel()}</div>
              </div>
              <button data-action="ast-week-next" style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;font-size:18px;color:var(--text);font-weight:700;flex-shrink:0;cursor:pointer">›</button>
            </div>
          </div>

          ${(() => {
            const planned = Object.keys(weekSelections).filter(k => weekSelections[k] && weekSelections[k].t).sort();
            const curK = getWeekKey(new Date());
            const future = planned.filter(k => k >= curK);
            if (future.length <= 1) return '';
            return `
              <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:18px">
                <div style="font-size:10px;text-transform:uppercase;color:var(--text-tertiary);letter-spacing:0.5px;margin-bottom:6px">📅 Semaines déjà planifiées</div>
                <div style="display:flex;flex-direction:column;gap:4px">
                  ${future.map(k => {
                    const sel = weekSelections[k];
                    const t = techs.find(x => x.id === sel.t);
                    const wkNum = k.split('-W')[1];
                    return `<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text)"><span>S${wkNum}${k === curK ? ' (en cours)' : ''}</span><span style="font-weight:600">${escapeHtml(t ? (t.full_name || t.username) : '?')}</span></div>`;

                </div>

          })()}

          <!-- Titulaire -->

                <div style="display:flex;align-items:center;gap:10px">
                  <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#dc2626);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px">
                    ${escapeHtml((titulaireName?.full_name || titulaireName?.username || '?').substring(0,1).toUpperCase())}
                  </div>
                  <div>
                    <div style="font-weight:700;font-size:14px;color:var(--text)">${escapeHtml(titulaireName?.full_name || titulaireName?.username || '?')}</div>

            <button data-action="ast-pick-titulaire" style="width:100%;padding:11px;background:var(--bg-subtle);border:1px dashed var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:13px">

            </button>
          </div>
          
          <!-- Suppléant -->
          <div style="margin-bottom:18px">
            <label style="display:block;font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:8px;letter-spacing:0.5px">
              🥈 Suppléant (optionnel)
            </label>
            ${selectedSuppleant ? `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.3);border-radius:10px;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:10px">
                  <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#eab308,#ca8a04);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px">
                    ${escapeHtml((suppleantName?.full_name || suppleantName?.username || '?').substring(0,1).toUpperCase())}

                  <div>
                    <div style="font-weight:700;font-size:14px;color:var(--text)">${escapeHtml(suppleantName?.full_name || suppleantName?.username || '?')}</div>

                  </div>
                </div>
                <button data-action="ast-clear-suppleant" style="background:transparent;border:none;color:var(--text-tertiary);font-size:18px;cursor:pointer;padding:4px">×</button>
              </div>
            ` : ''}
            <button data-action="ast-pick-suppleant" style="width:100%;padding:11px;background:var(--bg-subtle);border:1px dashed var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:13px">
              ${selectedSuppleant ? '↻ Changer le suppléant' : '+ Choisir un suppléant'}
            </button>
          </div>
        </div>
        <div class="modal-footer" style="padding:14px 20px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border)">
          <button class="btn btn-secondary" data-action="ast-close">Annuler</button>
          ${selectedTitulaire ? `<button class="btn btn-secondary" data-action="ast-clear-all" style="color:#ef4444">🗑 Retirer (cette semaine)</button>` : ''}
          <button class="btn btn-primary" data-action="ast-save" ${!Object.values(weekSelections).some(e => e && e.t) ? 'disabled style="opacity:0.5"' : ''}>📢 Enregistrer</button>
        </div>
      </div>
    `;
  };
  
  // Mini-modal de choix d'un tech
  const openTechPicker = (type) => {
    const picker = document.createElement('div');
    picker.className = 'modal-overlay visible';
    picker.style.zIndex = '99999';
    picker.innerHTML = `
      <div class="modal" style="max-width:440px">
        <div class="modal-header">
          <div class="modal-title">Choisir ${type === 'titulaire' ? 'le titulaire' : 'le suppléant'}</div>
          <button class="modal-close" data-action="picker-close">×</button>
        </div>
        <div class="modal-body" style="padding:14px 20px;max-height:60vh;overflow-y:auto">
          <div style="display:flex;flex-direction:column;gap:6px">
            ${techs.map(t => {
              const isSelectedOther = (type === 'titulaire' ? selectedSuppleant : selectedTitulaire) === t.id;
              return `
                <button data-tech-id="${escapeHtml(t.id)}" ${isSelectedOther ? 'disabled' : ''} style="display:flex;align-items:center;gap:10px;padding:11px;background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;cursor:${isSelectedOther ? 'not-allowed' : 'pointer'};text-align:left;color:var(--text);font-size:13px;opacity:${isSelectedOther ? '0.4' : '1'}">
                  <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">
                    ${escapeHtml((t.full_name || t.username || '?').substring(0,1).toUpperCase())}
                  </div>
                  <div style="flex:1">${escapeHtml(t.full_name || t.username)}</div>
                  ${isSelectedOther ? '<span style="font-size:10px;color:var(--text-tertiary)">déjà choisi</span>' : ''}
                </button>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(picker);
    
    picker.addEventListener('click', (e) => {
      const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;
      if (action === 'picker-close' || e.target === picker) {
        picker.remove();
        return;
      }
      const techBtn = e.target.closest('[data-tech-id]');
      if (techBtn && !techBtn.disabled) {
        const id = techBtn.dataset.techId;
        if (type === 'titulaire') selectedTitulaire = id;
        else selectedSuppleant = id;
        commitSelToWeek();
        picker.remove();
        renderModal();
      }
    });
  };
  
  renderModal();
  document.body.appendChild(overlay);
  
  overlay.addEventListener('click', async (e) => {
    const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;
    
    if (action === 'ast-close' || e.target === overlay) {
      overlay.remove();
      return;
    }
    
    if (action === 'ast-pick-titulaire') {
      openTechPicker('titulaire');
      return;
    }
    
    if (action === 'ast-pick-suppleant') {
      openTechPicker('suppleant');
      return;
    }
    
    if (action === 'ast-week-prev') {
      commitSelToWeek();
      if (selectedOffset > 0) selectedOffset--;
      syncSelFromWeek();
      renderModal();
      return;
    }

    if (action === 'ast-week-next') {
      commitSelToWeek();
      selectedOffset++;
      syncSelFromWeek();
      renderModal();
      return;
    }

    if (action === 'ast-clear-titulaire') {
      selectedTitulaire = '';
      selectedSuppleant = '';
      commitSelToWeek();
      renderModal();
      return;
    }

    if (action === 'ast-clear-suppleant') {
      selectedSuppleant = '';
      commitSelToWeek();
      renderModal();
      return;
    }

    if (action === 'ast-clear-all') {
      // V2.16.6 — Retire la désignation de la semaine actuellement affichée
      delete weekSelections[selWeekKeyFn()];
      selectedTitulaire = '';
      selectedSuppleant = '';
      renderModal();
      return;
    }

    if (action === 'ast-save') {
      commitSelToWeek();
      const clean = {};
      Object.keys(weekSelections).forEach(wk => {
        const e2 = weekSelections[wk];
        if (e2 && e2.t) clean[wk] = { t: e2.t, s: e2.s || '' };
      });
      const btn = e.target;
      btn.textContent = '⏳ Enregistrement...';
      btn.disabled = true;

      const okPlan = await setAppConfigValue('astreintePlanning', JSON.stringify(clean));

      // Rétrocompat : synchroniser les anciennes clés mono-semaine sur la semaine en cours
      const curKey = getWeekKey(new Date());
      let okLegacy = true;
      if (clean[curKey]) {
        const r1 = await setAppConfigValue('astreinteTitulaireId', clean[curKey].t);
        const r2 = await setAppConfigValue('astreinteSuppleantId', clean[curKey].s || '');
        const r3 = await setAppConfigValue('astreinteWeekNumber', String(currentWeekNum));
        okLegacy = r1 && r2 && r3;
      } else {
        // Plus de désignation pour la semaine en cours → on nettoie les anciennes clés
        const r1 = await setAppConfigValue('astreinteTitulaireId', '');
        const r2 = await setAppConfigValue('astreinteSuppleantId', '');
        const r3 = await setAppConfigValue('astreinteWeekNumber', '0');
        okLegacy = r1 && r2 && r3;
      }

      if (okPlan && okLegacy) {
        const nbWeeks = Object.keys(clean).length;
        toast(nbWeeks > 0 ? `✅ Planning enregistré (${nbWeeks} semaine${nbWeeks > 1 ? 's' : ''})` : '🗑 Planning vidé', 'success');
        overlay.remove();
        render();
      } else {
        toast('Erreur lors de l\'enregistrement', 'error');
        btn.disabled = false;
      }
      return;
    }
  });
}


// ============================================================================
// V2.12.0 — SYSTEME D'URGENCE (bouton + alerte + son boucle)
// ============================================================================

// Etat global du système d'urgence
const urgenceState = {
  audioContext: null,
  oscillator: null,
  gainNode: null,
  loopTimer: null,
  isPlaying: false,
  isShowing: false,        // ecran alerte affiché?
  acknowledgedIds: new Set(), // ids des urgences déja acquittées localement
  snoozeUntil: 0,          // V2.12.1 - timestamp jusqu'auquel les alertes sont ignorées
  vibrateTimer: null,
  // V2.12.3 — Keepalive audio (son silencieux 24/7 pour garder l'AudioContext vivant)
  keepaliveCtx: null,       // AudioContext dédié au keepalive
  keepaliveOsc: null,       // Oscillator silencieux
  keepaliveActive: false    // Si le keepalive est démarré
};

// V2.12.2 — Identifiant unique par device (permet à un user connecté sur 2 appareils
// de recevoir l'alerte sur l'autre appareil même s'il l'a déclenchée depuis le premier)
function getDeviceId() {
  let id = localStorage.getItem('_deviceId');
  if (!id) {
    id = 'dev-' + Math.random().toString(36).substring(2, 12) + '-' + Date.now().toString(36);
    localStorage.setItem('_deviceId', id);
  }
  return id;
}

// ============================================================================
// V2.12.3 — KEEPALIVE AUDIO (son silencieux 24/7 pour garder l'AudioContext vivant)
// Indispensable pour que l'alerte d'urgence sonne IMMÉDIATEMENT sur tablette inactive
// ============================================================================
function startAudioKeepalive() {
  if (urgenceState.keepaliveActive) return true; // déjà actif
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Forcer la reprise (nécessite une interaction utilisateur récente)
    if (ctx.state === 'suspended') {
      ctx.resume();
    }
    
    // Créer un oscillator silencieux qui tourne 24/7
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1; // 1 Hz = inaudible
    gain.gain.value = 0.0001; // volume quasi nul
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    
    urgenceState.keepaliveCtx = ctx;
    urgenceState.keepaliveOsc = osc;
    urgenceState.keepaliveActive = true;
    
    // Sauvegarder l'état pour le restaurer après reload
    try { localStorage.setItem('_audioKeepaliveActive', 'true'); } catch(e) {}
    
    console.log('🔊 Keepalive audio démarré (son silencieux en boucle)');
    return true;
  } catch (e) {
    console.warn('Keepalive audio échec:', e);
    return false;
  }
}

function stopAudioKeepalive() {
  try {
    if (urgenceState.keepaliveOsc) {
      urgenceState.keepaliveOsc.stop();
      urgenceState.keepaliveOsc.disconnect();
    }
    if (urgenceState.keepaliveCtx) {
      urgenceState.keepaliveCtx.close();
    }
  } catch (e) {}
  urgenceState.keepaliveCtx = null;
  urgenceState.keepaliveOsc = null;
  urgenceState.keepaliveActive = false;
  try { localStorage.removeItem('_audioKeepaliveActive'); } catch(e) {}
}

// Vérifie si le keepalive est en bonne santé (AudioContext pas suspendu)
function checkAudioKeepalive() {
  if (!urgenceState.keepaliveActive) return false;
  if (!urgenceState.keepaliveCtx) return false;
  if (urgenceState.keepaliveCtx.state === 'suspended') {
    // Tenter de reprendre
    urgenceState.keepaliveCtx.resume().catch(e => {});
    return false;
  }
  return true;
}

// Génère un son strident via Web Audio API (fonctionne sans fichier mp3)
function urgencePlayAlertSound() {
  if (urgenceState.isPlaying) return;
  try {
    // V2.12.3 — Utiliser le contexte keepalive s'il existe (déjà actif et "chaud")
    // Sinon créer un nouveau contexte
    let ctx;
    if (urgenceState.keepaliveCtx && urgenceState.keepaliveCtx.state !== 'closed') {
      ctx = urgenceState.keepaliveCtx;
      // S'assurer qu'il n'est pas suspendu
      if (ctx.state === 'suspended') {
        ctx.resume().catch(e => {});
      }
    } else {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      urgenceState.audioContext = ctx;
      // Forcer la reprise s'il est suspended
      if (ctx.state === 'suspended') {
        ctx.resume().catch(e => console.warn('AudioContext resume failed:', e));
      }
    }
    
    // Pattern : bip-bip-bip (3 bips de 0.3s avec pause 0.2s = 1.5s par boucle)
    
    const playOneBip = (startTime, freq) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      gain.gain.value = 0;
      
      // Enveloppe : attack rapide + release rapide
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(0.5, startTime + 0.02);
      gain.gain.setValueAtTime(0.5, startTime + 0.25);
      gain.gain.linearRampToValueAtTime(0, startTime + 0.3);
      
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(startTime);
      osc.stop(startTime + 0.32);
    };
    
    const playPattern10s = () => {
      const t0 = ctx.currentTime;
      // 6 series de 3 bips alternés en 10 secondes
      for (let serie = 0; serie < 6; serie++) {
        const serieStart = t0 + serie * 1.6;
        const freq = (serie % 2 === 0) ? 1000 : 1400;
        playOneBip(serieStart, freq);
        playOneBip(serieStart + 0.5, freq);
        playOneBip(serieStart + 1.0, freq);
      }
    };
    
    urgenceState.isPlaying = true;
    playPattern10s();
    
    // Boucle : tous les 11 sec, relancer le pattern de 10s
    urgenceState.loopTimer = setInterval(() => {
      if (!urgenceState.isPlaying) return;
      // V2.12.2 — Re-tenter resume au cas où
      if (ctx.state === 'suspended') {
        ctx.resume().catch(e => {});
      }
      playPattern10s();
    }, 11000);
    
    // V2.12.2 — Vibration IMMEDIATE (avant même le son si Android)
    urgenceVibrateLoop();
  } catch (e) {
    console.warn('Audio API non disponible:', e);
  }
}

// Arrêter le son
function urgenceStopAlertSound() {
  urgenceState.isPlaying = false;
  if (urgenceState.loopTimer) {
    clearInterval(urgenceState.loopTimer);
    urgenceState.loopTimer = null;
  }
  // V2.12.3 — Ne fermer le contexte QUE s'il n'est pas le keepalive
  if (urgenceState.audioContext && urgenceState.audioContext !== urgenceState.keepaliveCtx) {
    try { urgenceState.audioContext.close(); } catch(e) {}
    urgenceState.audioContext = null;
  }
  if (urgenceState.vibrateTimer) {
    clearInterval(urgenceState.vibrateTimer);
    urgenceState.vibrateTimer = null;
  }
  try { if (navigator.vibrate) navigator.vibrate(0); } catch(e) {}
}

// Vibration en boucle (Android)
function urgenceVibrateLoop() {
  if (!navigator.vibrate) return;
  // Pattern d'urgence : 3 longues + 2 courtes
  const pattern = [500, 200, 500, 200, 500, 200, 150, 100, 150];
  try { navigator.vibrate(pattern); } catch(e) {}
  urgenceState.vibrateTimer = setInterval(() => {
    if (!urgenceState.isPlaying) return;
    try { navigator.vibrate(pattern); } catch(e) {}
  }, 3000); // re-vibrer toutes les 3 sec
}

// Afficher l'écran d'alerte plein écran (admin/manager)
function urgenceShowAlertScreen(details) {
  if (urgenceState.isShowing) return;
  urgenceState.isShowing = true;
  
  // Parser les détails
  let info = {};
  try { info = typeof details === 'string' ? JSON.parse(details) : details; } catch(e) { info = {}; }
  
  // V2.12.2 — Lancer son + vibration IMMÉDIATEMENT (avant le DOM)
  urgencePlayAlertSound();
  
  const techName = info.username || 'Un technicien';
  const motif = info.motif || 'Pas de motif précisé';
  const time = info.time ? new Date(info.time).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';
  const etablissement = info.etablissement || '';
  const adresse = info.adresse || '';
  
  // URL Maps si adresse
  const mapsUrl = adresse 
    ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(adresse)}` 
    : null;
  
  const screen = document.createElement('div');
  screen.id = 'urgence-alert-screen';
  screen.innerHTML = `
    <div class="urg-alert-icon">🚨</div>
    <div class="urg-alert-title">URGENCE</div>
    <div class="urg-alert-tech">📞 ${escapeHtml(techName)}${time ? ' • ' + time : ''}</div>
    <div class="urg-alert-motif">
      ${etablissement ? `<div style="font-weight:700;margin-bottom:8px">📍 ${escapeHtml(etablissement)}</div>` : ''}
      <strong>Motif :</strong> ${escapeHtml(motif)}
    </div>
    <div class="urg-alert-actions">
      ${mapsUrl ? `<a href="${mapsUrl}" target="_blank" rel="noopener">🗺️ Voir sur Maps</a>` : ''}
      ${info.dossierId ? `<a href="#" data-action="urg-view-dossier" data-id="${escapeHtml(info.dossierId)}">📋 Voir dossier</a>` : ''}
    </div>
    <button class="urg-alert-ack-btn" data-action="urg-acknowledge">
      ✓ J'AI PRIS EN COMPTE
    </button>
    <div class="urg-alert-info">
      Le son et la vibration continueront jusqu'à l'acquittement
    </div>
  `;
  document.body.appendChild(screen);
  
  screen.addEventListener('click', async (e) => {
    const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;
    
    if (action === 'urg-acknowledge') {
      e.preventDefault();
      const btn = screen.querySelector('.urg-alert-ack-btn');
      btn.textContent = '⏳ Validation...';
      btn.disabled = true;
      await urgenceAcknowledge(info.id);
    }
    
    if (action === 'urg-view-dossier') {
      e.preventDefault();
      const did = e.target.dataset.id || e.target.closest('[data-action]')?.dataset.id;
      if (did) {
        // V2.14.13 — Comportement adapté au rôle :
        // - Admin/Manager/Superviseur : ouvre la modale détaillée (le dossier appartient à un autre user)
        // - Tech : navigue vers sa propre vue dossier (comportement initial)
        const isSupervisorView = canReceiveUrgence();
        
        if (isSupervisorView) {
          // Tenter de trouver le dossier dans les caches disponibles
          let dossier = (dashboardState.allDossiers || []).find(x => x.id === did);
          if (!dossier) {
            dossier = (state.dossiers || []).find(x => x.id === did);
          }
          
          // Si pas trouvé en cache, fetch cloud direct
          if (!dossier) {
            try {
              console.log('[V2.14.13] Fetch cloud pour urgence dossier id=', did);
              const res = await cloudCall('getDossiers', {});
              if (res && res.success && Array.isArray(res.dossiers)) {
                dossier = res.dossiers.find(x => x.id === did);
              }
            } catch(err) {
              console.error('[V2.14.13] Erreur fetch cloud:', err);
            }
          }
          
          if (dossier) {
            // S'assurer que le dossier est dans dashboardState pour la modale
            if (!Array.isArray(dashboardState.allDossiers)) dashboardState.allDossiers = [];
            const existing = dashboardState.allDossiers.findIndex(x => x.id === did);
            if (existing >= 0) dashboardState.allDossiers[existing] = dossier;
            else dashboardState.allDossiers.push(dossier);
            
            // Fermer l'écran d'alerte et ouvrir la modale superviseur
            urgenceCloseAlertScreen();
            openSuperviseurDossierModal(did);
          } else {
            toast('Dossier introuvable (peut-être supprimé)', 'warning');
            console.warn('[V2.14.13] Dossier id=' + did + ' introuvable nulle part');
          }
        } else {
          // Tech qui voit sa propre urgence : comportement initial
          urgenceCloseAlertScreen();
          view.current = 'detail';
          view.dossierId = did;
          render();
        }
      }
    }
  });
  
  // Tenter d'envoyer une notification push aussi (si autorisé)
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      const n = new Notification('🚨 URGENCE Astreinte', {
        body: `${techName} demande de l'aide - ${motif}`,
        icon: getLogo(),
        tag: 'urgence-' + (info.id || 'unknown'),
        requireInteraction: true
      });
      n.onclick = () => window.focus();
    } catch(e) {}
  }
  // V2.12.2 — Son et vibration déjà lancés en début de fonction
}

// Fermer l'écran alerte
function urgenceCloseAlertScreen() {
  const screen = document.getElementById('urgence-alert-screen');
  if (screen) screen.remove();
  urgenceState.isShowing = false;
  urgenceStopAlertSound();
}

// Acquitter l'urgence (appel cloud)
// V2.12.2 — Helpers pour persister les acquittements (survie au rafraîchissement)
function loadAcknowledgedIds() {
  try {
    const stored = localStorage.getItem('_urgenceAckIds');
    if (stored) {
      const arr = JSON.parse(stored);
      urgenceState.acknowledgedIds = new Set(arr);
    }
  } catch (e) {}
}

function saveAcknowledgedIds() {
  try {
    const arr = Array.from(urgenceState.acknowledgedIds);
    // Garder seulement les 50 derniers acquittements (pour éviter d'accumuler)
    const last50 = arr.slice(-50);
    localStorage.setItem('_urgenceAckIds', JSON.stringify(last50));
  } catch (e) {}
}

async function urgenceAcknowledge(urgenceId) {
  try {
    // V2.12.2 — Stocker l'id LOCALEMENT en premier (pour ne plus le retrigger même si cloud tarde)
    if (urgenceId) {
      urgenceState.acknowledgedIds.add(urgenceId);
      saveAcknowledgedIds();
    }
    
    // Marquer comme acquittée côté cloud
    const ok = await setAppConfigValue('urgenceAck', true);
    // Marquer aussi inactive après ack
    await setAppConfigValue('urgenceActive', false);
    
    // V2.13.0 — Logger l'acquittement dans l'historique (non-bloquant)
    if (urgenceId) {
      try {
        await cloudCall('ackUrgenceLog', {
          id: urgenceId,
          deviceId: getDeviceId()
        });
      } catch(e) { console.warn('ackUrgenceLog KO :', e.message); }
    }
    
    // Forcer localement appConfig pour ne pas re-trigger immédiatement
    appConfig.urgenceAck = true;
    appConfig.urgenceActive = false;
    
    urgenceCloseAlertScreen();
    
    if (ok) {
      toast('✓ Urgence acquittée', 'success');
    } else {
      toast('Acquittement local (cloud KO)', 'warning');
    }
  } catch (e) {
    toast('Erreur acquittement : ' + e.message, 'error');
  }
}

// Déclencher une urgence depuis l'app (tech)
async function urgenceTrigger(contextDossier = null) {
  // V2.13.1 — Bloquer si le bouton est désactivé par l'admin (sauf pour l'admin lui-même)

  }
  
  // V2.14.9 — Si un dossier est fourni en contexte, on pré-remplit le motif
  // avec toutes les infos utiles pour que l'admin comprenne en un coup d'œil
  let prefillMotif = '';
  let contextHeader = '';
  if (contextDossier) {

    const typeIcon = d.type === 'telephone' ? '📞 Appel téléphonique' : '🚗 Déplacement';

      lines.push('Motif intervention : ' + motifShort);
    }
    lines.push('');
    lines.push('━━━ Ce dont j\'ai besoin : ━━━');

    prefillMotif = lines.join('\n');
    
    contextHeader = `
      <div style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.3);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--text);line-height:1.5">

        ${d.codeAstreinte ? '<span style="color:var(--text-tertiary)"> · ' + escapeHtml(d.codeAstreinte) + '</span>' : ''}
      </div>

  // Modale de confirmation

    <div class="modal" style="max-width:440px;border:2px solid #dc2626">
      <div class="modal-header" style="background:rgba(220,38,38,0.1)">
        <div class="modal-title" style="color:#dc2626">🚨 Déclencher l'urgence ?</div>
        <button class="modal-close" data-action="urg-trig-close">×</button>

        <div style="background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.3);border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:var(--text);line-height:1.5">
          ⚠️ <strong>Cette action enverra une alerte sonore et visuelle à ton administrateur</strong> (et aux managers).<br>
          <span style="color:var(--text-tertiary);font-size:11px">Utilise ce bouton seulement en cas de réelle difficulté nécessitant une assistance.</span>
        </div>
        
        <div style="background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px;margin-bottom:14px;font-size:11px;color:#ef4444;line-height:1.4">
          🚨 <strong>EN CAS D'URGENCE VITALE</strong> (incendie, blessure, agression) :<br>
          <strong>1.</strong> Appelle d'abord le 18 (pompiers), 17 (police) ou 15 (SAMU)<br>
          <strong>2.</strong> Ensuite seulement utilise ce bouton pour avertir ton admin

      // Envoyer au cloud (3 clés)

      if (ok1 && ok2 && ok3) {
