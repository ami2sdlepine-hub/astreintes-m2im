function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// ── V2.11.0 — Export Excel/CSV de la semaine ────────────────────
function managerExportWeekCSV() {
  const weekDossiers = getManagerWeekDossiers();
  if (weekDossiers.length === 0) {
    toast('Aucun dossier sur cette semaine', 'warning');
    return;
  }

  const fmt = (iso) => {
    if (!iso || iso === 'X') return iso === 'X' ? 'chaînage' : '';
    try {
      const dt = new Date(iso);
      return dt.toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch (e) { return iso; }
  };
  const escape = (v) => {
    if (v === null || v === undefined) return '';
    const s = String(v).replace(/"/g, '""').replace(/\r?\n/g, ' / ');
    return /[",;]/.test(s) ? `"${s}"` : s;
  };

  const headers = [
    'Technicien', 'Date appel', 'Type', 'Établissement', 'Code astreinte',
    'Demandeur', 'N° rapport', 'Motif',
    'Départ domicile', 'Arrivée site', 'Départ site', 'Retour domicile',
    'Adresse site', 'Km', 'Rapport', 'Compte-rendu',
    'Récupéré ERP', 'Récupéré par', 'Récupéré le'
  ];

  const lines = [headers.map(escape).join(';')];
  for (const d of weekDossiers) {
    const row = [
      d.username || '',
      fmt(d.dateAppel),
      d.type === 'telephone' ? 'Téléphone' : 'Déplacement',
      d.etablissement || '',
      d.codeAstreinte || '',
      d.demandeur || '',
      d.rapportNum || '',
      d.motif || '',
      fmt(d.departDomicile),
      fmt(d.arriveeSite),
      fmt(d.finIntervention),
      fmt(d.retourDomicile),
      d.adresse || '',
      d.km || '',
      d.rapport || '',
      d.compteRendu || '',
      d.recupereERP ? 'Oui' : 'Non',
      d.recupereERP_by || '',
      d.recupereERP_at ? fmt(d.recupereERP_at) : ''
    ];
    lines.push(row.map(escape).join(';'));
  }

  // BOM UTF-8 pour Excel
  const csv = '\uFEFF' + lines.join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const baseDate = new Date();
  baseDate.setDate(baseDate.getDate() + managerState.weekOffset * 7);
  const week = getAstreinteWeek(baseDate);
  const fname = `astreintes_AMI2S_${week.start.toISOString().substring(0,10)}_au_${week.end.toISOString().substring(0,10)}.csv`;
  a.href = url;
  a.download = fname;
  a.click();
  URL.revokeObjectURL(url);
  toast(`📊 Export téléchargé : ${weekDossiers.length} dossier(s)`, 'success');
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substring(2, 9);

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function roundTo5(date) {
  const d = new Date(date);
  const rounded = Math.round(d.getMinutes() / 5) * 5;
  d.setMinutes(rounded); d.setSeconds(0); d.setMilliseconds(0);
  return d;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function fmtDateShort(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
}
function fmtTime(d) {
  if (!d) return '—';
  return new Date(d).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}
// V2.11.0 — Helper sécurisé pour parser un km : refuse les dates et valeurs absurdes
function safeKm(v) {
  if (v === null || v === undefined || v === '') return 0;
  const s = String(v);
  // Refuser les dates ISO (caractères T, Z, ou tiret avec longueur > 4)
  if (s.includes('T') || s.includes('Z') || (s.includes('-') && s.length > 4)) return 0;
  const n = parseFloat(s);
  if (isNaN(n) || n < 0 || n > 10000) return 0;
  return n;
}
function fmtDateTime(d) { return fmtDate(d) + ' • ' + fmtTime(d); }

function fmtDuration(ms) {
  if (!ms || ms < 0) return '—';
  const total = Math.round(ms / 60000);
  const h = Math.floor(total / 60);
  const m = total % 60;
  return `${h}h${m.toString().padStart(2, '0')}`;
}

function diffMs(start, end) {
  if (!start || !end) return 0;
  return new Date(end) - new Date(start);
}

function getAstreinteWeek(date = new Date()) {
  const d = new Date(date);
  const day = d.getDay();
  const hours = d.getHours();
  let daysToMonday;
  if (day === 1 && hours < 9) daysToMonday = -7;
  else if (day === 0) daysToMonday = -6;
  else daysToMonday = -(day - 1);
  
  const start = new Date(d);
  start.setDate(d.getDate() + daysToMonday);
  start.setHours(9, 0, 0, 0);
  const end = new Date(start);
  end.setDate(start.getDate() + 7);
  
  const yearStart = new Date(start.getFullYear(), 0, 1);
  const daysSinceYearStart = Math.floor((start - yearStart) / 86400000);
  const weekNumber = Math.ceil((daysSinceYearStart + yearStart.getDay()) / 7);
  
  return { start, end, weekNumber };
}

function haptic(type = 'light') {
  if (!('vibrate' in navigator)) return;
  const patterns = { light: 10, medium: 20, heavy: [10, 30, 10], success: [10, 30, 10, 30, 10] };
  navigator.vibrate(patterns[type] || 10);
}

// ----------------------------------------------------------------------------
// STORAGE — IndexedDB
// ----------------------------------------------------------------------------
const DB_NAME = 'astreintes_ami2s';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { db = req.result; resolve(db); };
    req.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains('dossiers')) {
        const store = database.createObjectStore('dossiers', { keyPath: 'id' });
        store.createIndex('dateAppel', 'dateAppel');
        store.createIndex('sequenceId', 'sequenceId');
      }
      if (!database.objectStoreNames.contains('settings')) {
        database.createObjectStore('settings', { keyPath: 'key' });
      }
    };
  });
}

function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(store, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbClear(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

let syncTimeout = null;
function scheduleSync() {
  if (!state.settings.syncEnabled || !state.settings.syncUrl) return;
  syncStatus = 'pending';
  updateSyncBadge();
  if (syncTimeout) clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => doSync(), 3000);
}

async function doSync(showFeedback = false) {
  if (!state.settings.syncEnabled || !state.settings.syncUrl) {
    syncStatus = 'off';
    updateSyncBadge();
    return;
  }
  
  syncStatus = 'pending';
  updateSyncBadge();
  
  try {
    const payload = {
      token: state.settings.syncToken,
      action: 'sync',
      technicien: state.settings.technicien,
      dossiers: state.dossiers,
      settings: state.settings,
      clientTime: new Date().toISOString()
    };
    
    const response = await fetch(state.settings.syncUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const result = await response.json();
    if (result.error) throw new Error(result.error);
    
    state.settings.lastSync = new Date().toISOString();
    await saveSettings();
    syncStatus = 'ok';
    updateSyncBadge();
    
    if (showFeedback) {
      toast('Synchronisation réussie • ' + (result.count || 0) + ' dossiers', 'success');
    }
  } catch (err) {
    console.error('Sync error', err);
    syncStatus = 'error';
    updateSyncBadge();
    if (showFeedback) toast('Erreur de sync : ' + err.message, 'error');
  }
}

// Pull depuis Google Sheets (sync bidirectionnelle)
async function doPull(showFeedback = false) {
  if (!state.settings.syncEnabled || !state.settings.syncUrl) {
    if (showFeedback) toast('Sync non configurée', 'error');
    return;
  }
  
  syncStatus = 'pending';
  updateSyncBadge();
  
  try {
    const payload = {
      token: state.settings.syncToken,
      action: 'pull',
      technicien: state.settings.technicien
    };
    
    const response = await fetch(state.settings.syncUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const result = await response.json();
    if (result.error) throw new Error(result.error);
    
    // Fusionner avec les dossiers locaux : on garde le plus récent (updatedAt) pour chaque ID
    const remoteDossiers = result.dossiers || [];
    const localById = {};
    state.dossiers.forEach(d => { localById[d.id] = d; });
    
    let added = 0, updated = 0;
    for (const remote of remoteDossiers) {
      const local = localById[remote.id];
      if (!local) {
        // Nouveau dossier venu du cloud
        await dbPut('dossiers', remote);
        state.dossiers.push(remote);
        added++;
      } else {
        // Conflit : garder celui qui a le updatedAt le plus récent
        const localTime = new Date(local.updatedAt || local.createdAt || 0).getTime();
        const remoteTime = new Date(remote.updatedAt || remote.createdAt || 0).getTime();
        if (remoteTime > localTime) {
          await dbPut('dossiers', remote);
          const idx = state.dossiers.findIndex(x => x.id === remote.id);
          if (idx >= 0) state.dossiers[idx] = remote;
          updated++;
        }
      }
    }
    
    // Récupérer aussi les réglages partagés
    if (result.settings) {
      const remoteSettings = result.settings;
      // Ne pas écraser les credentials locaux (syncUrl, syncToken) ni le thème local
      const preserved = ['syncUrl', 'syncToken', 'syncEnabled', 'lastSync', 'theme'];
      for (const key in remoteSettings) {
        if (!preserved.includes(key) && remoteSettings[key]) {
          state.settings[key] = remoteSettings[key];
        }
      }
      await saveSettings();
    }
    
    syncStatus = 'ok';
    updateSyncBadge();
    
    if (showFeedback) {
      toast(`Synchronisé : ${added} ajoutés, ${updated} mis à jour`, 'success');
    }
    render();
  } catch (err) {
    console.error('Pull error', err);
    syncStatus = 'error';
    updateSyncBadge();
    if (showFeedback) toast('Erreur de pull : ' + err.message, 'error');
  }
}

// Sync complète : pull + push (utilise au démarrage et manuellement)
async function doFullSync(showFeedback = false) {
  if (!state.settings.syncEnabled || !state.settings.syncUrl) {
    if (showFeedback) toast('Sync non configurée', 'error');
    return;
  }
  
  if (showFeedback) toast('Synchronisation complète...', 'warning');
  
  await doPull(false);
  await doSync(false);
  
  if (showFeedback) {
    toast('Synchronisation complète réussie', 'success');
  }
}

// Les vues Dossiers/Stats/Export utilisent toutes cette fonction.
// Les rôles Manager/Admin auront accès aux dossiers de toute l'équipe via
// des vues dédiées (Patch 4 Manager / Patch 3b Dashboard).
function getMyDossiers() {
  const myId = authState.user && authState.user.id;
  if (!myId) return [];
  return state.dossiers.filter(d => {
    // Inclure les dossiers sans user_id (anciens dossiers locaux non encore migrés)
    // et ceux qui appartiennent au user connecté
    return !d.user_id || d.user_id === myId;
  });
}

function getWeekDossiers(offset = 0) {
  const base = new Date();
  base.setDate(base.getDate() + offset * 7);
  const { start, end } = getAstreinteWeek(base);
  return getMyDossiers().filter(d => {
    const dt = new Date(d.dateAppel);
    return dt >= start && dt < end;
  });
}

function renderAstreinteEnCours() {
  // Uniquement sur la semaine actuelle
  if (view.weekOffset !== 0) return '';
  
  const now = new Date();
  const { start, end } = getAstreinteWeek(now);
  
  // Vérifier qu'on est BIEN dans la fenêtre [start, end] de l'astreinte
  if (now < start || now >= end) return '';
  
  // V2.12.0 — Si désignation active, n'afficher que pour le titulaire
  // Le suppléant a un bandeau orange différent (rendu plus bas)
  // Si pas de désignation : comportement V2.11 (tout le monde voit)
  // V2.12.1 — L'admin voit aussi le bandeau (mode test)
  const isAdminTestMode = isAdmin() && !isCurrentUserAstreinteTitulaire() && !isCurrentUserAstreinteSuppleant();
  
  if (isAstreinteDesignationActive()) {
    if (isCurrentUserAstreinteSuppleant()) {
      // Bandeau suppléant en backup (orange, sans bouton appel)
      return renderAstreinteSuppleantBanner(end, now);
    }
    if (!isCurrentUserAstreinteTitulaire() && !isAdminTestMode) {
      return ''; // ni titulaire ni suppléant ni admin → rien
    }
    // Sinon : c'est le titulaire (ou admin en test), on continue avec le bandeau rouge
  }
  
  // Calcul du temps restant
  const msRestant = end - now;
  const totalHours = Math.floor(msRestant / (1000 * 60 * 60));
  const days = Math.floor(totalHours / 24);
  const hours = totalHours % 24;
  let countdownText = '';
  if (days > 0) {
    countdownText = `${days}j ${hours}h restantes`;
  } else if (hours > 0) {
    countdownText = `${hours}h restantes`;
  } else {
    const minutes = Math.floor((msRestant / (1000 * 60)) % 60);
    countdownText = `${minutes}min restantes`;
  }
  
  // Stats
  const weekDossiers = getWeekDossiers(0);
  const totalDossiers = weekDossiers.length;
  
  // Calcul total heures travaillées (V2.11.3 — fix type telephone)
  let totalMinutes = 0;
  weekDossiers.forEach(d => {
    if (d.type === 'telephone' && d.dureeAppel) {
      // Téléphone : durée en heures (ex: "1h00", "0h30")
      const match = String(d.dureeAppel).match(/(\d+)h(\d+)?/);
      if (match) {
        totalMinutes += parseInt(match[1], 10) * 60 + (parseInt(match[2], 10) || 0);
      }
    } else if (d.type === 'deplacement' && 
               d.departDomicile && d.departDomicile !== 'X' && 
               d.retourDomicile && d.retourDomicile !== 'X') {
      // Déplacement complet : départ → retour domicile
      try {
        const t1 = new Date(d.departDomicile);
        const t2 = new Date(d.retourDomicile);
        let mins = Math.round((t2 - t1) / 60000);
        if (mins > 0 && mins < 1440) totalMinutes += mins;
      } catch(e) {}
    }
  });
  const totalHeuresStr = totalMinutes > 0 
    ? `${Math.floor(totalMinutes / 60)}h${String(totalMinutes % 60).padStart(2, '0')}`
    : '0h00';
  
  // Total km
  let totalKm = 0;
  weekDossiers.forEach(d => {
    if (d.distance) totalKm += parseFloat(d.distance) || 0;
  });
  const totalKmStr = totalKm > 0 ? totalKm.toFixed(0) + ' km' : '0 km';
  
  return `
    <div class="astreinte-active">
      <div class="astreinte-active-header">
        <span class="astreinte-active-badge">Astreinte en cours</span>
        <span class="astreinte-active-countdown">${countdownText}</span>
      </div>
      <div class="astreinte-active-stats">
        <div class="astreinte-stat">
          <div class="astreinte-stat-value">${totalDossiers}</div>
          <div class="astreinte-stat-label">Dossier${totalDossiers > 1 ? 's' : ''}</div>
        </div>
        <div class="astreinte-stat">
          <div class="astreinte-stat-value">${totalHeuresStr}</div>
          <div class="astreinte-stat-label">Travaillées</div>
        </div>
        <div class="astreinte-stat">
          <div class="astreinte-stat-value">${totalKmStr}</div>
          <div class="astreinte-stat-label">Parcourus</div>
        </div>
      </div>
      <button class="astreinte-quick-call-btn" data-action="quick-call">
        <span class="phone-icon">📞</span>
        <span>NOUVEL APPEL</span>
      </button>
      ${(() => {
        // V2.13.1 — Bouton grisé si désactivé pour les non-admins (admin peut toujours forcer)
        const btnDisabled = (appConfig.urgenceButtonEnabled === false) && !isAdmin();
        const label = isAdminTestMode ? 'TESTER BOUTON URGENCE' : (btnDisabled ? 'BOUTON URGENCE (désactivé)' : 'BOUTON URGENCE');
        return `
          <button class="urgence-btn${btnDisabled ? ' disabled' : ''}" data-action="urgence-trigger">
            <span class="urg-icon">${btnDisabled ? '🔕' : '🚨'}</span>
            <span>${label}</span>
          </button>
        `;
      })()}
      ${isAdminTestMode ? '<div style="text-align:center;font-size:10px;color:#fca5a5;margin-top:6px;font-style:italic">🔧 Mode test admin — déclenche une vraie alerte sur les autres admins/managers</div>' : ''}
    </div>
  `;
}

function getFilteredDossiers() {
  let dossiers = view.weekOffset !== null ? getWeekDossiers(view.weekOffset) : getMyDossiers();
  dossiers = [...dossiers].sort((a, b) => new Date(b.dateAppel) - new Date(a.dateAppel));
  
  // Filtre catégorie
  if (view.filter === 'en-cours') dossiers = dossiers.filter(d => d.statut === 'intervention');
  else if (view.filter === 'appels') dossiers = dossiers.filter(d => d.type === 'telephone');
  else if (view.filter === 'clotures') dossiers = dossiers.filter(d => d.statut === 'cloture');
  else if (view.filter === 'a-qualifier') dossiers = dossiers.filter(d => d.type !== 'telephone' && d.type !== 'deplacement');
  
  // Filtre recherche
  if (view.searchQuery && view.searchQuery.trim()) {
    const q = view.searchQuery.toLowerCase().trim();
    // V2.11.0 — Bug fix : String() systématique pour éviter le crash sur les champs numériques (codeAstreinte, rapportNum)
    dossiers = dossiers.filter(d =>
      String(d.etablissement || '').toLowerCase().includes(q) ||
      String(d.motif || '').toLowerCase().includes(q) ||
      String(d.codeAstreinte || '').toLowerCase().includes(q) ||
      String(d.rapportN || d.rapportNum || '').toLowerCase().includes(q) ||
      String(d.compteRendu || '').toLowerCase().includes(q)
    );
  }
  
  return dossiers;
}

function getDossierStatus(d) {
  // V2.16.0 — Détection "À qualifier" : type ni téléphone ni déplacement
  if (d.type !== 'telephone' && d.type !== 'deplacement') return 'to-qualify';
  if (d.type === 'telephone') return d.statut === 'cloture' ? 'call-closed' : 'pending';
  if (d.statut === 'cloture') return 'done';
  if (d.statut === 'intervention') return 'intervention';
  return 'pending';
}

function getBadge(d) {
  const s = getDossierStatus(d);
  switch (s) {
    case 'call-closed': return { class: 'badge-call', text: '☎ Téléphone', card: 'status-call' };
    case 'intervention': return { class: 'badge-intervention', text: '⚠ En cours', card: 'status-intervention' };
    case 'done': return { class: 'badge-done', text: '✓ Clôturé', card: 'status-done' };
    // V2.16.0 — Badge "À qualifier" pour les dossiers sans type
    case 'to-qualify': return { class: 'badge-to-qualify', text: '❓ À QUALIFIER', card: 'status-to-qualify' };
    default: return { class: 'badge-pending', text: '◷ En attente', card: 'status-pending' };
  }
}

function findOpenSequence() {
  // V2.14.7 — Approche simplifiée : on regroupe les dossiers "en cours" par sequenceId.
  // Si la réparation auto a fait son boulot, tous les dossiers de la même séquence
  // partagent le même sequenceId. Sinon, on fait du best-effort en regroupant tout
  // ce qui est en cours (un tech ne fait qu'une chose à la fois en pratique).
  
  const myDossiers = getMyDossiers().filter(d => d.type === 'deplacement');
  if (myDossiers.length === 0) return null;
  
  const refTime = (d) => new Date(d.dateAppel).getTime();
  
  // Dossiers en cours = en intervention, pas encore rentré
  const enCours = myDossiers.filter(d =>
    d.statut === 'intervention' &&
    !d.retourDomicile
  );
  
  if (enCours.length === 0) return null;
  
  // Si un seul dossier en cours : c'est lui (séquence éventuellement à 1 dossier si chaînage X)
  if (enCours.length === 1) {
    const seul = enCours[0];
    // Si ce dossier n'a aucun marqueur X (chaînage), c'est un dossier isolé,
    // mais on retourne quand même la séquence (l'appel à addToSequence peut vouloir s'y rattacher)
    // → on inclut aussi les dossiers clôturés du même sequenceId (cas Jean Rostand cloturé + Thiais en cours)
    const sameSeq = seul.sequenceId
      ? myDossiers.filter(d => d.sequenceId === seul.sequenceId)
      : [seul];
    return { 
      sequenceId: seul.sequenceId || seul.id, 
      dossiers: sameSeq.sort((a, b) => refTime(a) - refTime(b))
    };
  }
  
  // Plusieurs dossiers en cours → ils font partie de la même séquence (un tech = une seule chaîne active)
  // On prend le sequenceId de la tête (= dossier le plus récent)
  const tete = enCours.sort((a, b) => refTime(b) - refTime(a))[0];
  const seqId = tete.sequenceId || tete.id;
  
  // On inclut tous les dossiers de la même séquence (cloturés ET en cours)
  const sameSeq = new Set(enCours.map(d => d.id));
  myDossiers.forEach(d => {
    if (seqId && d.sequenceId === seqId) sameSeq.add(d.id);
  });
  
  const result = myDossiers
    .filter(d => sameSeq.has(d.id))
    .sort((a, b) => refTime(a) - refTime(b));
  
  return { sequenceId: seqId, dossiers: result };
}

// V2.14.7 — Réparation auto des sequenceId orphelins
// Détecte les dossiers en cours dont le sequenceId est "solo" (1 seul dossier l'utilise)
// alors qu'il devrait faire partie d'une chaîne, et les rattache au bon sequenceId.
async function repairOrphanSequences(silent = true) {
  if (!authState.isAuthenticated) {
    if (!silent) toast('Tu dois être connecté pour réparer les séquences', 'warning');
    return { repaired: 0, total: 0 };
  }
  
  const myDossiers = (state.dossiers || []).filter(d =>
    d.type === 'deplacement' &&
    d.user_id === authState.user.id
  );
  
  if (myDossiers.length === 0) {
    return { repaired: 0, total: 0 };
  }
  
  // Compter combien de dossiers partagent chaque sequenceId
  const seqCounts = {};
  myDossiers.forEach(d => {
    if (d.sequenceId) {
      seqCounts[d.sequenceId] = (seqCounts[d.sequenceId] || 0) + 1;
    }
  });
  
  const refTime = (d) => new Date(d.dateAppel).getTime();
  
  // Trouver les dossiers à réparer :
  // - en cours (intervention, pas de retour)
  // - departDomicile = 'X' (chaînage entrant)
  // - sequenceId orphelin (1 seul dossier l'utilise = lui-même)
  const orphans = myDossiers.filter(d =>
    d.statut === 'intervention' &&
    !d.retourDomicile &&
    d.departDomicile === 'X' &&
    d.sequenceId &&
    seqCounts[d.sequenceId] === 1
  );
  
  if (orphans.length === 0) {
    if (!silent) toast('✅ Aucune séquence à réparer', 'success');
    return { repaired: 0, total: 0 };
  }
  
  // Pour chaque orphelin, trouver le bon sequenceId
  // = celui du dossier précédent (par dateAppel) qui appartient à une vraie séquence
  let repairedCount = 0;
  for (const orphan of orphans) {
    const orphanTime = refTime(orphan);
    
    // Cherche le dossier précédent qui appartient à une séquence non solo
    const predecessor = myDossiers
      .filter(d =>
        d.id !== orphan.id &&
        refTime(d) < orphanTime &&
        d.sequenceId &&
        seqCounts[d.sequenceId] > 1  // sequenceId valide (partagé)
      )
      .sort((a, b) => refTime(b) - refTime(a))[0];
    
    if (predecessor) {
      const oldSeqId = orphan.sequenceId;
      orphan.sequenceId = predecessor.sequenceId;
      orphan.updated_at = new Date().toISOString();
      seqCounts[predecessor.sequenceId] += 1;
      seqCounts[oldSeqId] -= 1;
      
      console.log('[V2.14.7] Séquence réparée :', orphan.etablissement, 
                  '→ sequenceId', oldSeqId, '➜', predecessor.sequenceId,
                  '(rattaché à', predecessor.etablissement + ')');
      
      // Sauvegarde locale + cloud
      try {
        await saveDossier(orphan);
        repairedCount++;
      } catch (e) {
        console.error('[V2.14.7] Erreur saveDossier orphan:', e);
      }
    } else {
      // Pas de prédécesseur trouvé : on cherche au moins un dossier précédent en cours
      // (cas où aucun sequenceId n'est encore solide)
      const fallback = myDossiers
        .filter(d =>
          d.id !== orphan.id &&
          refTime(d) < orphanTime &&
          d.sequenceId
        )
        .sort((a, b) => refTime(b) - refTime(a))[0];
      
      if (fallback) {
        const oldSeqId = orphan.sequenceId;
        orphan.sequenceId = fallback.sequenceId;
        orphan.updated_at = new Date().toISOString();
        seqCounts[fallback.sequenceId] += 1;
        seqCounts[oldSeqId] -= 1;
        
        console.log('[V2.14.7] Séquence réparée (fallback) :', orphan.etablissement,
                    '→ sequenceId', oldSeqId, '➜', fallback.sequenceId);
        
        try {
          await saveDossier(orphan);
          repairedCount++;
        } catch (e) {
          console.error('[V2.14.7] Erreur saveDossier orphan fallback:', e);
        }
      }
    }
  }
  
  if (!silent) {
    if (repairedCount > 0) {
      toast(`✅ ${repairedCount} séquence(s) réparée(s)`, 'success');
    } else {
      toast('ℹ️ Aucune séquence n\'a pu être réparée', 'info');
    }
  }
  
  return { repaired: repairedCount, total: orphans.length };
}

function recalcDurations(d) {
  if (d.arriveeSite && d.departSite) {
    d.tempsSiteMs = diffMs(d.arriveeSite, d.departSite);
    d.tempsSiteCalcule = fmtDuration(d.tempsSiteMs);
  }
  // Calcul total trajet : seulement si les deux ne sont pas X
  if (d.departDomicile && d.retourDomicile && d.departDomicile !== 'X' && d.retourDomicile !== 'X') {
    d.totalTrajetMs = diffMs(d.departDomicile, d.retourDomicile);
    d.totalTrajetCalcule = fmtDuration(d.totalTrajetMs);
  } else if (d.departDomicile === 'X' || d.retourDomicile === 'X') {
    d.totalTrajetMs = null;
    d.totalTrajetCalcule = null;
  }
}

// Timer pour rafraîchir Stats en temps réel (V2.9.2)
let statsRefreshTimer = null;

function render() {
  const app = $('#app');
  switch (view.current) {
    case 'list': app.innerHTML = renderList(); break;
    case 'new': app.innerHTML = renderNewDossier(); break;
    case 'detail': app.innerHTML = renderDetail(); break;
    case 'export': app.innerHTML = renderExport(); break;
    case 'settings': app.innerHTML = renderSettings(); break;
    case 'stats': app.innerHTML = renderStats(); break;
    case 'sequence': app.innerHTML = renderSequence(); break;
    // V2.10.2 — Vues admin
    case 'admin-users': app.innerHTML = renderAdminUsers(); break;
    case 'admin-logs': app.innerHTML = renderAdminLogs(); break;
    // V2.11 — Dashboard équipe Admin
    case 'dashboard-admin': app.innerHTML = renderDashboardAdmin(); break;
    // V2.11.0 — Vue manager (dépannage)
    case 'manager-view': app.innerHTML = renderManagerView(); break;
    // V2.12.1 — Vue Superviseur (tablette 24/7)
    case 'superviseur': app.innerHTML = renderSuperviseurDashboard(); break;
    // V2.13.0 — Mes urgences (tech/admin/manager : voit ses propres déclenchements)
    case 'mes-urgences': app.innerHTML = renderMesUrgences(); break;
  }
  attachListeners();
  
  // V2.10.2 — Modale édition user par dessus si nécessaire
  if (adminState.editingUser || adminState.creatingUser) {
    const modalDiv = document.createElement('div');
    modalDiv.innerHTML = renderUserEditModal();
    app.appendChild(modalDiv.firstElementChild);
    attachListeners();
  }
  
  // Wake lock pendant les saisies
  if (view.current === 'new' || view.current === 'detail') {
    requestWakeLock();
  } else {
    releaseWakeLock();
  }
  
  // V2.9.2 — Rafraîchissement auto de la page Stats toutes les 60 secondes
  // (pour mettre à jour le total estimé des séquences en cours)
  if (statsRefreshTimer) {
    clearInterval(statsRefreshTimer);
    statsRefreshTimer = null;
  }
  if (view.current === 'stats' || view.current === 'sequence') {
    statsRefreshTimer = setInterval(() => {
      if (view.current === 'stats' || view.current === 'sequence') {
        render();
      } else {
        clearInterval(statsRefreshTimer);
        statsRefreshTimer = null;
      }
    }, 60000); // Toutes les 60 secondes
  }
}

  };

    all: weekDossiers.length,
    'a-qualifier': weekDossiers.filter(isAQualifier).length,

    appels: weekDossiers.filter(d => d.type === 'telephone').length,

  };
  
  return `
    <header class="app-header">

// ----- DETAIL -----
function renderDetail() {
  const d = state.dossiers.find(x => x.id === view.dossierId);
  if (!d) { view.current = 'list'; return renderList(); }
  
  const b = getBadge(d);
  const status = getDossierStatus(d);
  
  // V2.9.4 — Détecter si ce dossier fait partie d'une séquence chaînée
  // (a un départ ou retour à X)
  const isInChain = d.departDomicile === 'X' || d.retourDomicile === 'X';
  let chainInfo = null;
  
  if (isInChain && d.type === 'deplacement') {
    // Reconstruire la séquence : tous les dossiers déplacement de la semaine, dans l'ordre
    const week = getAstreinteWeek();
    const weekDossiers = getWeekDossiers(0).filter(x => x.type === 'deplacement');
    const sorted = [...weekDossiers].sort((a, b) => new Date(a.dateAppel) - new Date(b.dateAppel));
    
    // Trouver le groupe auquel appartient ce dossier
    let currentGroup = null;
    const groups = [];
    
    for (const dx of sorted) {
      if (dx.departDomicile && dx.departDomicile !== 'X') {
        if (currentGroup) groups.push(currentGroup);
        currentGroup = { dossiers: [dx], firstDepart: dx.departDomicile, lastRetour: null };
      } else if (dx.departDomicile === 'X' && currentGroup) {
        currentGroup.dossiers.push(dx);
      } else if (dx.departDomicile === 'X' && !currentGroup) {
        currentGroup = { dossiers: [dx], firstDepart: null, lastRetour: null };
      }
      
      if (dx.retourDomicile && dx.retourDomicile !== 'X' && currentGroup) {
        currentGroup.lastRetour = dx.retourDomicile;
        groups.push(currentGroup);
        currentGroup = null;
      }
    }
    if (currentGroup) groups.push(currentGroup);
    
    // Trouver le groupe qui contient le dossier en cours
    const myGroup = groups.find(g => g.dossiers.some(x => x.id === d.id));
    
    if (myGroup && myGroup.dossiers.length > 1) {
      function safeDiff(start, end) {
        if (!start || !end) return 0;
        const startDate = new Date(start);
        const endDate = new Date(end);
        let ms = endDate - startDate;
        if (ms < 0) {
          const startMin = startDate.getHours() * 60 + startDate.getMinutes();
          const endMin = endDate.getHours() * 60 + endDate.getMinutes();
          let diffMin = endMin - startMin;
          if (diffMin < 0) diffMin += 24 * 60;
          ms = diffMin * 60 * 1000;
        }
        if (ms > 24 * 3600 * 1000) {
          const startMin = startDate.getHours() * 60 + startDate.getMinutes();
          const endMin = endDate.getHours() * 60 + endDate.getMinutes();
          let diffMin = endMin - startMin;
          if (diffMin < 0) diffMin += 24 * 60;
          ms = diffMin * 60 * 1000;
        }
        return ms;
      }
      
      let totalMs = 0;
      let statusLabel = '';
      if (myGroup.firstDepart && myGroup.lastRetour) {
        totalMs = safeDiff(myGroup.firstDepart, myGroup.lastRetour);
        statusLabel = 'Total séquence (clôturée)';
      } else if (myGroup.firstDepart) {
        totalMs = safeDiff(myGroup.firstDepart, new Date());
        statusLabel = 'Total séquence (en cours)';
      }
      
      // Position du dossier dans la séquence
      const myIndex = myGroup.dossiers.findIndex(x => x.id === d.id);
      const position = myIndex === 0 ? '1er (début)' :
                       myIndex === myGroup.dossiers.length - 1 ? `${myIndex + 1}e (fin)` :
                       `${myIndex + 1}e (milieu)`;
      
      chainInfo = {
        totalMs,
        statusLabel,
        nbDossiers: myGroup.dossiers.length,
        position,
        dossiers: myGroup.dossiers
      };
    }
  }
  
  return `
    <header class="app-header">
      <div class="header-top">
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
          <span class="header-back" data-action="nav" data-view="list">←</span>
          <div style="min-width:0;flex:1">
            <div class="header-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(d.codeAstreinte || d.etablissement)}</div>
            <div class="header-subtitle">${escapeHtml(d.etablissement)}</div>
          </div>
        </div>
      </div>
    </header>
    
    <div class="form-screen">
      <div class="status-banner ${status === 'intervention' ? 'intervention' : status === 'done' ? 'done' : status === 'call-closed' ? 'call' : 'pending'}">
        <span class="badge ${b.class}">${b.text}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-secondary)">${fmtDateTime(d.dateAppel)}</span>
      </div>
      
      ${chainInfo ? `
        <div class="section" style="background:var(--status-chain-bg);border:1px solid var(--status-chain-border);padding:14px 16px;margin-top:12px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-size:20px">🔗</span>
            <div style="flex:1">
              <div style="font-weight:700;color:var(--status-chain);font-size:14px">Fait partie d'une séquence chaînée</div>
              <div style="font-size:12px;color:var(--text-secondary);margin-top:2px">Position : ${chainInfo.position} • ${chainInfo.nbDossiers} dossiers au total</div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg-elevated);border-radius:var(--radius);margin-top:6px">
            <span style="font-size:12px;color:var(--text-secondary)">${chainInfo.statusLabel}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--status-chain)">${chainInfo.totalMs ? fmtDuration(chainInfo.totalMs) : '—'}</span>
          </div>
          <button class="btn btn-secondary" data-action="show-sequence" style="width:100%;margin-top:10px;font-size:13px">
            🔗 Voir toute la séquence →
          </button>
        </div>
      ` : ''}
      
      <div class="section">
        <div class="section-title">📋 Informations</div>
        <div class="detail-row">
          <span class="detail-label">Établissement</span>
          <input type="text" class="detail-input" data-bind-edit="etablissement" value="${escapeHtml(d.etablissement || '')}" placeholder="Nom de l'établissement">
        </div>
        <div class="detail-row">
          <span class="detail-label">Code astreinte</span>
          <input type="text" class="detail-input mono" data-bind-edit="codeAstreinte" value="${escapeHtml(d.codeAstreinte || '')}" placeholder="Ex: AST-0847">
        </div>
        <div class="detail-row">
          <span class="detail-label">Heure d'appel</span>
          <span class="detail-value">${d.bureau ? '📞 Bureau' : fmtDateTime(d.dateAppel)}</span>
        </div>
        <!-- V2.15.7 — Toggle Bureau/Heure réelle accessible en mode édition -->
        ${d.type === 'telephone' || d.type === 'deplacement' ? `

function renderTimestamp(d, field, label, icon) {
  const value = d[field];
  const isFilled = !!value;
  const isCrossed = value === 'X';
  
  let disabled = false;
  if (field === 'arriveeSite' && !d.departDomicile && d.pointDepart === 'domicile') disabled = true;
  // Pour le chaînage (départ domicile = X), arrivée site est OK
  if (field === 'departSite' && !d.arriveeSite) disabled = true;
  if (field === 'retourDomicile' && !d.departSite) disabled = true;
  
  // Cas spécial : timestamp avec un X (chaînage)
  if (isCrossed) {
    const subText = field === 'departDomicile' ? '✕ Pas de départ (chaînage entrant)' : '✕ Pas de retour (chaînage)';
    return `
      <div class="timestamp-row crossed">
        <div>
          <div class="timestamp-label">${icon} ${label}</div>
          <div class="timestamp-sub">${subText}</div>
        </div>
        <div class="ts-actions">
          <button class="ts-btn-icon" data-action="edit-ts" data-field="${field}">✏</button>
          <button class="ts-btn-icon" data-action="clear-ts" data-field="${field}">↩</button>
        </div>
      </div>
    `;
  }
  
  // Cas spécial : Retour domicile vide avec bouton "Pas de retour"
  if (field === 'retourDomicile' && !isFilled) {
    return `
      <div class="timestamp-row ${disabled ? 'disabled' : 'pending'}">
        <div>
          <div class="timestamp-label">${icon} ${label}</div>
          <div class="timestamp-sub">${disabled ? '—' : 'En attente'}</div>
        </div>
        <div class="ts-actions">
          <button class="ts-btn" data-action="ts-now" data-field="${field}" ${disabled ? 'disabled' : ''} style="padding:9px 12px">Rentré</button>
          <button class="ts-btn-icon" data-action="edit-ts" data-field="${field}" ${disabled ? 'disabled' : ''} title="Modifier l'heure">✏</button>
          <button class="ts-btn-icon" data-action="ts-cross" data-field="${field}" ${disabled ? 'disabled' : ''} title="Pas de retour (chaînage)" style="color:var(--status-chain)">✕</button>
        </div>
      </div>
    `;
  }
  
  // Cas spécial : Départ domicile vide avec bouton "Pas de départ" (chaînage entrant)
  if (field === 'departDomicile' && !isFilled) {
    return `
      <div class="timestamp-row ${disabled ? 'disabled' : 'pending'}">
        <div>
          <div class="timestamp-label">${icon} ${label}</div>
          <div class="timestamp-sub">${disabled ? '—' : 'En attente'}</div>
        </div>
        <div class="ts-actions">
          <button class="ts-btn" data-action="ts-now" data-field="${field}" ${disabled ? 'disabled' : ''}>Maintenant</button>
          <button class="ts-btn-icon" data-action="edit-ts" data-field="${field}" ${disabled ? 'disabled' : ''} title="Modifier l'heure">✏</button>
          <button class="ts-btn-icon" data-action="ts-cross" data-field="${field}" ${disabled ? 'disabled' : ''} title="Pas de départ du domicile (chaînage)" style="color:var(--status-chain)">✕</button>
        </div>
      </div>
    `;
  }
  
  return `
    <div class="timestamp-row ${isFilled ? '' : disabled ? 'disabled' : 'pending'}">
      <div>
        <div class="timestamp-label">${icon} ${label}</div>
        <div class="timestamp-sub">${isFilled ? fmtTime(value) : disabled ? '—' : 'En attente'}</div>
      </div>
      <div class="ts-actions">
        ${isFilled ? `
          <button class="ts-btn-icon" data-action="edit-ts" data-field="${field}">✏</button>
          <button class="ts-btn filled" data-action="edit-ts" data-field="${field}">${fmtTime(value)}</button>
          ${(field === 'departDomicile' || field === 'retourDomicile') ? `
            <button class="ts-btn-icon" data-action="ts-cross" data-field="${field}" title="Remplacer par ✕ (chaînage)" style="color:var(--status-chain)">✕</button>
          ` : ''}
        ` : `
          <button class="ts-btn" data-action="ts-now" data-field="${field}" ${disabled ? 'disabled' : ''}>Maintenant</button>
          <button class="ts-btn-icon" data-action="edit-ts" data-field="${field}" ${disabled ? 'disabled' : ''}>✏</button>
        `}
      </div>
    </div>
  `;
}

// ----- EXPORT -----
// V2.16.5 — Fonction COMMUNE de calcul du total payé hebdomadaire (par groupes de chaînage)
// Utilisée à la fois par renderStats ET renderExport pour garantir la cohérence des chiffres.
// Avant V2.16.5, l'export calculait dossier par dossier (ignorait les chaînages) → écart énorme
// sur les semaines avec beaucoup de séquences (ex: Redha 22h05 en stats vs 5h10 en export).
function computeWeekTotalMs(weekDossiers) {
  // Helper de calcul de durée tolérant aux dates incohérentes (passage minuit)
  function safeDiffLocal(start, end) {
    if (!start || !end) return 0;
    const startDate = new Date(start);
    const endDate = new Date(end);
    let ms = endDate - startDate;
    if (ms < 0 || ms > 24 * 3600 * 1000) {
      const startMin = startDate.getHours() * 60 + startDate.getMinutes();
      const endMin = endDate.getHours() * 60 + endDate.getMinutes();
      let diffMin = endMin - startMin;
      if (diffMin < 0) diffMin += 24 * 60;
      ms = diffMin * 60 * 1000;
    }
    return ms;
  }
  
  const sortedWeek = [...weekDossiers].sort((a, b) => new Date(a.dateAppel) - new Date(b.dateAppel));
  
  // Construction des groupes de chaînage (même logique que renderStats)
  let currentGroup = null;
  const groups = [];
  
  for (const d of sortedWeek) {
    if (d.type !== 'deplacement') continue;
    
    if (d.departDomicile && d.departDomicile !== 'X') {
      if (currentGroup) groups.push(currentGroup);
      currentGroup = { firstDepart: d.departDomicile, lastRetour: null };
    } else if (d.departDomicile === 'X' && currentGroup) {
      // Continuation de séquence
    } else if (d.departDomicile === 'X' && !currentGroup) {
      // Chaînage entrant orphelin : ignoré
      continue;
    } else if (!d.departDomicile && d.retourDomicile && d.retourDomicile !== 'X') {
      if (currentGroup) {
        currentGroup.lastRetour = d.retourDomicile;
        groups.push(currentGroup);
        currentGroup = null;
      }
    }
    
    if (d.retourDomicile && d.retourDomicile !== 'X' && currentGroup) {
      currentGroup.lastRetour = d.retourDomicile;
      groups.push(currentGroup);
      currentGroup = null;
    }
  }
  if (currentGroup) groups.push(currentGroup);
  
  let totalClos = 0;
  let totalEnCours = 0;
  let nbOuvertes = 0;
  for (const g of groups) {
    if (g.firstDepart && g.lastRetour) {
      totalClos += safeDiffLocal(g.firstDepart, g.lastRetour);
    } else if (g.firstDepart && !g.lastRetour) {
      totalEnCours += safeDiffLocal(g.firstDepart, new Date());
      nbOuvertes++;
    }
  }
  
  return { totalClos, totalEnCours, total: totalClos + totalEnCours, nbOuvertes };
}

// V2.9.9 — Calcul intelligent de la période "Rapport de la nuit"
// Prend en compte les weekends et jours fériés français
function computeNightPeriod() {
  const now = new Date();
  const today9h = new Date(now);
  today9h.setHours(9, 0, 0, 0);
  
  // Si on a un override custom, on l'utilise
  if (view.nightPeriodOverride) {
    return view.nightPeriodOverride;
  }
  
  // Calcul des jours fériés français pour l'année en cours
  const feries = getJoursFeriesFrance(now.getFullYear());
  
  // On part de "ce matin 9h" (ou hier 9h si on est avant 9h ce matin)
  let endDate = new Date(today9h);
  if (now < today9h) {
    // Il est avant 9h, donc le rapport va jusqu'à 9h ce matin
    // (déjà ok)
  }
  
  // Reculer pour trouver le début de la période
  // On part du jour précédent et on remonte tant qu'on tombe sur :
  // - Un samedi (jour 6)
  // - Un dimanche (jour 0)
  // - Un jour férié
  let startDate = new Date(endDate);
  startDate.setDate(startDate.getDate() - 1);
  
  // Le début de période est à 18h pour les jours de semaine, ou 17h pour le vendredi qui démarre un weekend
  // Donc on part par défaut à 18h hier et on remonte si besoin
  startDate.setHours(18, 0, 0, 0);
  
  // Tant que le jour AVANT startDate est un weekend ou férié, on recule
  // Mais attention : si on commence par exemple le mardi, on veut juste 18h lundi
  // Si on commence le lundi (après un weekend), on veut vendredi 17h
  
  let dayBefore = new Date(startDate);
  dayBefore.setDate(dayBefore.getDate() - 1);
  
  while (true) {
    const dayBeforeMidnight = new Date(dayBefore);
    dayBeforeMidnight.setHours(0, 0, 0, 0);
    
    const isWeekend = dayBeforeMidnight.getDay() === 0 || dayBeforeMidnight.getDay() === 6;
    const isFerie = isJourFerie(dayBeforeMidnight, feries);
    
    if (!isWeekend && !isFerie) break;
    
    // On recule d'un jour
    startDate = new Date(dayBefore);
    startDate.setHours(0, 0, 0, 0);
    dayBefore.setDate(dayBefore.getDate() - 1);
  }
  
  // Si le jour de startDate est vendredi (5), on démarre à 17h (début de weekend)
  // Si c'est un autre jour, on démarre à 18h
  if (startDate.getDay() === 5) {
    startDate.setHours(17, 0, 0, 0);
  } else {
    startDate.setHours(18, 0, 0, 0);
  }
  
  // Détecter si c'est un weekend ou une nuit simple
  const durationHours = (endDate - startDate) / 3600000;
  const isWeekend = durationHours > 24;
  
  return {
    start: startDate,
    end: endDate,
    label: isWeekend ? 'Rapport du week-end' : 'Rapport de la nuit',
    subtitle: `${fmtDateShort(startDate)} ${String(startDate.getHours()).padStart(2,'0')}h → ${fmtDateShort(endDate)} ${String(endDate.getHours()).padStart(2,'0')}h`,
    icon: isWeekend ? '🌴' : '🌙'
  };
}

// V2.9.9 — Jours fériés France (calcul automatique avec Pâques)
function getJoursFeriesFrance(year) {
  // Calcul de Pâques (algorithme de Butcher)
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  
  const easter = new Date(year, month - 1, day);
  
  // Lundi de Pâques = Pâques + 1
  const lundiPaques = new Date(easter); lundiPaques.setDate(lundiPaques.getDate() + 1);
  // Ascension = Pâques + 39
  const ascension = new Date(easter); ascension.setDate(ascension.getDate() + 39);
  // Pentecôte (lundi) = Pâques + 50
  const pentecote = new Date(easter); pentecote.setDate(pentecote.getDate() + 50);
  
  return [
    new Date(year, 0, 1),    // Jour de l'an
    lundiPaques,             // Lundi de Pâques
    new Date(year, 4, 1),    // Fête du travail
    new Date(year, 4, 8),    // Victoire 1945
    ascension,               // Ascension
    pentecote,               // Lundi de Pentecôte
    new Date(year, 6, 14),   // Fête nationale
    new Date(year, 7, 15),   // Assomption
    new Date(year, 10, 1),   // Toussaint
    new Date(year, 10, 11),  // Armistice 1918
    new Date(year, 11, 25)   // Noël
  ];
}

function isJourFerie(date, feries) {
  return feries.some(f => 
    f.getFullYear() === date.getFullYear() &&
    f.getMonth() === date.getMonth() &&
    f.getDate() === date.getDate()
  );
}

// Permet à l'utilisateur de modifier la période du rapport de nuit
async function editRapportPeriodeCustom() {
  const current = computeNightPeriod();
  const startStr = await showPrompt(
    'Date/heure de début',
    'Format : JJ/MM/AAAA HH:MM',
    `${fmtDate(current.start)} ${String(current.start.getHours()).padStart(2,'0')}:${String(current.start.getMinutes()).padStart(2,'0')}`
  );
  if (!startStr) return;
  
  const endStr = await showPrompt(
    'Date/heure de fin',
    'Format : JJ/MM/AAAA HH:MM',
    `${fmtDate(current.end)} ${String(current.end.getHours()).padStart(2,'0')}:${String(current.end.getMinutes()).padStart(2,'0')}`
  );
  if (!endStr) return;
  
  try {
    const parseDate = (str) => {
      const [datePart, timePart] = str.trim().split(' ');
      const [d, m, y] = datePart.split('/');
      const [h, mi] = timePart.split(':');
      return new Date(y, m - 1, d, h, mi, 0, 0);
    };
    
    const start = parseDate(startStr);
    const end = parseDate(endStr);
    
    if (isNaN(start) || isNaN(end) || start >= end) {
      toast('Dates invalides', 'error');
      return;
    }
    
    view.nightPeriodOverride = {
      start, end,
      label: 'Rapport personnalisé',
      subtitle: `${fmtDateShort(start)} ${String(start.getHours()).padStart(2,'0')}h → ${fmtDateShort(end)} ${String(end.getHours()).padStart(2,'0')}h`,
      icon: '⏰'
    };
    toast('Période modifiée', 'success');
    render();
  } catch (e) {
    toast('Format de date invalide', 'error');
  }
}

function renderStats() {
  // V2.9.9 — Navigation entre semaines
  const offset = view.statsWeekOffset || 0;
  const baseDate = new Date();
  baseDate.setDate(baseDate.getDate() + offset * 7);
  const week = getAstreinteWeek(baseDate);
  const weekDossiers = getWeekDossiers(offset);
  const totalKm = weekDossiers.reduce((s, d) => s + safeKm(d.km), 0);
  
  // V2.9.3 — Algorithme tolérant aux dates incohérentes
  // Calcul par groupes en se basant sur l'ORDRE des dossiers (par dateAppel) et non les dates des timestamps
  let totalMsClos = 0;
  let totalMsEnCours = 0;
  let nbSeqOuvertes = 0;
  let earliestOpenDepart = null;
  
  // Helper pour calculer une durée avec gestion auto du passage minuit
  function safeDiff(start, end) {
    if (!start || !end) return 0;
    const startDate = new Date(start);
    const endDate = new Date(end);
    let ms = endDate - startDate;
    
    // Si négatif (passage minuit avec date erronée), on prend juste les heures HH:MM et on suppose +1 jour
    if (ms < 0) {
      // Utiliser uniquement HH:MM:SS pour faire le calcul
      const startMin = startDate.getHours() * 60 + startDate.getMinutes();
      const endMin = endDate.getHours() * 60 + endDate.getMinutes();
      let diffMin = endMin - startMin;
      if (diffMin < 0) diffMin += 24 * 60; // Passage minuit
      ms = diffMin * 60 * 1000;
    }
    
    // Si > 24h, on suppose une mauvaise date → on prend juste les heures
    if (ms > 24 * 3600 * 1000) {
      const startMin = startDate.getHours() * 60 + startDate.getMinutes();
      const endMin = endDate.getHours() * 60 + endDate.getMinutes();
      let diffMin = endMin - startMin;
      if (diffMin < 0) diffMin += 24 * 60;
      ms = diffMin * 60 * 1000;
    }
    
    return ms;
  }
  
  const sortedWeek = [...weekDossiers].sort((a, b) => new Date(a.dateAppel) - new Date(b.dateAppel));
  
  // Construction des groupes de chaînage
  let currentGroup = null;
  const groups = [];
  
  for (const d of sortedWeek) {
    if (d.type !== 'deplacement') continue;
    
    if (d.departDomicile && d.departDomicile !== 'X') {
      // Nouveau groupe
      if (currentGroup) groups.push(currentGroup);
      currentGroup = { dossiers: [d], firstDepart: d.departDomicile, lastRetour: null };
    } else if (d.departDomicile === 'X' && currentGroup) {
      // Continuation
      currentGroup.dossiers.push(d);
    } else if (d.departDomicile === 'X' && !currentGroup) {
      // Chaînage entrant orphelin : on l'ignore pour le total (incohérence de saisie)
      continue;
    } else if (!d.departDomicile && d.retourDomicile && d.retourDomicile !== 'X') {
      // Cas spécial : retour rempli mais pas de départ → on l'ajoute au groupe en cours
      if (currentGroup) {
        currentGroup.dossiers.push(d);
        currentGroup.lastRetour = d.retourDomicile;
        groups.push(currentGroup);
        currentGroup = null;
      }
    }
    
    if (d.retourDomicile && d.retourDomicile !== 'X' && currentGroup) {
      currentGroup.lastRetour = d.retourDomicile;
      groups.push(currentGroup);
      currentGroup = null;
    }
  }
  if (currentGroup) groups.push(currentGroup);
  
  for (const g of groups) {
    if (g.firstDepart && g.lastRetour) {
      totalMsClos += safeDiff(g.firstDepart, g.lastRetour);
    } else if (g.firstDepart && !g.lastRetour) {
      totalMsEnCours += safeDiff(g.firstDepart, new Date());
      nbSeqOuvertes++;
      if (!earliestOpenDepart || new Date(g.firstDepart) < new Date(earliestOpenDepart)) {
        earliestOpenDepart = g.firstDepart;
      }
    }
  }
  
  const totalMsCombine = totalMsClos + totalMsEnCours;
  const interventions = weekDossiers.filter(d => d.type === 'deplacement').length;
  const appels = weekDossiers.filter(d => d.type === 'telephone').length;
  
  function tempsAffiche(d, idx, arr) {
    if (d.departDomicile && d.departDomicile !== 'X' && d.retourDomicile && d.retourDomicile !== 'X') {
      return fmtDuration(safeDiff(d.departDomicile, d.retourDomicile));
    }
    if (d.departDomicile && d.departDomicile !== 'X' && d.retourDomicile === 'X') {
      return '🔗 début';
    }
    if (d.departDomicile === 'X' && d.retourDomicile === 'X') {
      return '🔗 milieu';
    }
    if (d.departDomicile === 'X' && d.retourDomicile && d.retourDomicile !== 'X') {
      return '🔗 fin';
    }
    if (d.type === 'telephone') return '☎';
    return '—';
  }
  
  const now = new Date();
  const nowTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  
  return `
    <header class="app-header">
      <div class="header-top">
        <div style="flex:1">
          <div class="header-title">Statistiques</div>
          <div class="header-subtitle">${state.settings.technicien || 'AMI2S'}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="icon-btn" data-action="stats-prev-week" title="Semaine précédente">‹</button>
          <button class="icon-btn" data-action="stats-next-week" title="Semaine suivante" ${offset >= 0 ? 'disabled style="opacity:0.3"' : ''}>›</button>
        </div>
      </div>
    </header>
    
    <div class="form-screen">
      <!-- Bandeau semaine sélectionnée -->
      <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">
            Semaine n°${week.weekNumber}${offset === 0 ? ' (actuelle)' : offset === -1 ? ' (précédente)' : offset < 0 ? ` (il y a ${-offset} sem.)` : ''}
          </div>
          <div style="font-size:13px;color:var(--text);font-family:'JetBrains Mono',monospace;margin-top:2px">
            ${fmtDateShort(week.start)} 09h → ${fmtDateShort(week.end)} 09h
          </div>
        </div>
        ${offset !== 0 ? `<button class="btn-link" data-action="stats-current-week" style="font-size:12px;color:var(--accent);font-weight:600;background:none;border:none;cursor:pointer">Actuelle</button>` : ''}
      </div>
      <!-- Total payé combiné -->
      <div class="stat-card accent" style="grid-column:1 / -1;padding:20px;margin-bottom:8px">
        <div class="stat-value" style="font-size:38px">${totalMsCombine ? fmtDuration(totalMsCombine) : '—'}</div>
        <div class="stat-label">Total payé ${nbSeqOuvertes > 0 ? '(estimé, en cours)' : ''}</div>
        ${(totalMsClos > 0 || nbSeqOuvertes > 0) ? `
          <div style="margin-top:12px;display:flex;justify-content:space-around;gap:8px;font-size:11px;font-family:'JetBrains Mono',monospace">
            <div style="flex:1;text-align:center;padding:6px;background:var(--bg-elevated);border-radius:var(--radius-sm)">
              <div style="color:var(--status-success);font-weight:700;font-size:14px">${totalMsClos > 0 ? fmtDuration(totalMsClos) : '—'}</div>
              <div style="color:var(--text-secondary);font-size:10px;margin-top:2px">✅ clôturé</div>
            </div>
            ${nbSeqOuvertes > 0 ? `
              <div style="flex:1;text-align:center;padding:6px;background:var(--status-chain-bg);border-radius:var(--radius-sm)">
                <div style="color:var(--status-chain);font-weight:700;font-size:14px">${fmtDuration(totalMsEnCours)}</div>
                <div style="color:var(--text-secondary);font-size:10px;margin-top:2px">🟠 en cours ⏱</div>
              </div>
            ` : ''}
          </div>
          ${earliestOpenDepart ? `
            <div style="margin-top:8px;text-align:center;font-size:10px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace">
              Séquence en cours depuis ${fmtDate(earliestOpenDepart)} ${fmtTime(earliestOpenDepart)} • Maintenant : ${nowTime}
            </div>
          ` : ''}
        ` : ''}
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${weekDossiers.length}</div>
          <div class="stat-label">Dossiers</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${interventions}</div>
          <div class="stat-label">Interventions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${appels}</div>
          <div class="stat-label">Appels résolus</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalKm.toFixed(0)}</div>
          <div class="stat-label">Kilomètres</div>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">Dossiers de la semaine</div>
        ${weekDossiers.length === 0 ? `
          <div style="padding:24px;text-align:center;color:var(--text-tertiary);font-size:13px">
            Aucun dossier cette semaine
          </div>
        ` : sortedWeek.slice().reverse().map((d, idx, arr) => `
          <div class="detail-row">
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;color:var(--text);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(d.etablissement)}</div>
              <div style="font-size:11px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;margin-top:2px">${fmtDateShort(d.dateAppel)} ${fmtTime(d.dateAppel)}</div>
            </div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);font-weight:700;white-space:nowrap">
              ${tempsAffiche(d, idx, arr)}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
    
    ${renderBottomNav()}
  `;
}

function renderSequence() {
  const openSeq = findOpenSequence();
  
  if (!openSeq || openSeq.dossiers.length === 0) {
    return `
      <header class="app-header">
        <div class="header-top">
          <div style="display:flex;align-items:center;gap:10px">
            <button class="icon-btn" data-action="back-list">←</button>
            <div>
              <div class="header-title">Séquence</div>
              <div class="header-subtitle">Aucune séquence ouverte</div>
            </div>
          </div>
        </div>
      </header>
      <main class="main-content">
        <div class="empty-state" style="padding:60px 20px">
          <div class="empty-state-icon">✅</div>
          <div class="empty-state-title">Pas de séquence ouverte</div>
          <div class="empty-state-desc">Toutes tes interventions sont clôturées avec retour domicile.</div>
        </div>
      </main>
      ${renderBottomNav()}
    `;
  }
  
  // V2.9.7 — Tri intelligent qui gère les dossiers pas encore visités
  // Si un dossier n'a pas d'arrivée site, on le met EN DERNIER (parce que tu n'y es pas encore allé)
  function getInterventionTime(d) {
    if (d.arriveeSite) return new Date(d.arriveeSite);
    if (d.departDomicile && d.departDomicile !== 'X') return new Date(d.departDomicile);
    // Pas encore arrivé : on met en dernier (futur lointain)
    return new Date(9999, 11, 31);
  }
  const dossiers = [...openSeq.dossiers].sort((a, b) => getInterventionTime(a) - getInterventionTime(b));
  
  // Calculs récap
  let totalKm = 0;
  let totalTimeSiteMs = 0;
  let totalTimeTrajetMs = 0;
  
  // Premier départ domicile (le vrai, pas X)
  const firstDepart = dossiers.find(d => d.departDomicile && d.departDomicile !== 'X');
  // Dernier retour domicile (s'il existe et n'est pas X)
  const lastRetour = [...dossiers].reverse().find(d => d.retourDomicile && d.retourDomicile !== 'X');
  
  if (firstDepart && lastRetour) {
    totalTimeTrajetMs = diffMs(firstDepart.departDomicile, lastRetour.retourDomicile);
  } else if (firstDepart) {
    // Séquence en cours : estime depuis le départ jusqu'à maintenant
    totalTimeTrajetMs = diffMs(firstDepart.departDomicile, new Date());
  }
  
  dossiers.forEach(d => {
    totalKm += safeKm(d.km);
    if (d.tempsSiteMs) totalTimeSiteMs += d.tempsSiteMs;
  });
  
  return `
    <header class="app-header">
      <div class="header-top">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="icon-btn" data-action="back-list">←</button>
          <div>
            <div class="header-title">Séquence ouverte</div>
            <div class="header-subtitle">${dossiers.length} dossier(s) enchaîné(s)</div>
          </div>
        </div>
      </div>
    </header>
    
    <main class="main-content">
      <!-- Récap global -->
      <div class="section" style="margin-top:16px">
        <div class="section-title">📊 Récapitulatif</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px">
          <div class="stat-card">
            <div class="stat-value">${dossiers.length}</div>
            <div class="stat-label">Dossiers</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${totalKm.toFixed(1)}</div>
            <div class="stat-label">Km parcourus</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${fmtDuration(totalTimeSiteMs)}</div>
            <div class="stat-label">Sur site (total)</div>
          </div>
          <div class="stat-card accent">
            <div class="stat-value">${totalTimeTrajetMs ? fmtDuration(totalTimeTrajetMs) : '—'}</div>
            <div class="stat-label">${lastRetour ? 'Total payé' : 'Estimé (en cours)'}</div>
          </div>
        </div>
        ${firstDepart ? `
          <div style="margin-top:12px;padding:12px;background:var(--bg-subtle);border-radius:var(--radius);font-size:13px;color:var(--text-secondary)">
            <div>🏠 <b>Départ :</b> ${fmtDate(firstDepart.departDomicile)} à ${fmtTime(firstDepart.departDomicile)}</div>
            ${lastRetour ? `
              <div style="margin-top:4px">🏠 <b>Retour :</b> ${fmtDate(lastRetour.retourDomicile)} à ${fmtTime(lastRetour.retourDomicile)}</div>
            ` : `
              <div style="margin-top:4px;color:var(--status-chain)">🔗 <b>Pas encore rentré</b> (séquence en cours)</div>
            `}
          </div>
        ` : ''}
      </div>
      
      <!-- Timeline des dossiers -->
      <div class="section">
        <div class="section-title">🔗 Timeline d'enchaînement</div>
        <div class="sequence-timeline">
          ${dossiers.map((d, idx) => {
            const isLast = idx === dossiers.length - 1;
            const next = dossiers[idx + 1];
            const isChainOut = d.retourDomicile === 'X' && !isLast;
            
            return `
              <div class="seq-step">
                <div class="seq-step-dot" style="background:${d.statut === 'cloture' ? 'var(--status-success)' : 'var(--status-warning)'}"></div>
                <div class="seq-step-content" data-action="detail" data-id="${d.id}">
                  <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:6px">
                    <div style="font-weight:600;font-size:15px">${escapeHtml(d.etablissement)}</div>
                    <div style="font-size:11px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;white-space:nowrap">${fmtDateShort(d.dateAppel)} ${fmtTime(d.dateAppel)}</div>
                  </div>
                  ${d.adresseSite ? `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px">📍 ${escapeHtml(d.adresseSite)}</div>` : ''}
                  <div style="display:flex;gap:12px;font-size:12px;color:var(--text-secondary);flex-wrap:wrap">
                    ${d.departDomicile === 'X' ? '<span style="color:var(--status-chain)">🔗 Chaînage entrant</span>' : 
                      d.departDomicile ? '<span>🏠→ ' + fmtTime(d.departDomicile) + '</span>' : ''}
                    ${d.tempsSiteCalcule ? '<span>⏱ ' + d.tempsSiteCalcule + '</span>' : ''}
                    ${d.km ? '<span>📏 ' + d.km + ' km</span>' : ''}
                    ${d.retourDomicile === 'X' ? '<span style="color:var(--status-chain)">→🔗 Chaînage sortant</span>' :
                      d.retourDomicile ? '<span>→🏠 ' + fmtTime(d.retourDomicile) + '</span>' : ''}
                  </div>
                </div>
                ${isChainOut ? `<div class="seq-chain-arrow">↓ chaînage vers le site suivant</div>` : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
      
      <div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:12px">
        💡 Clique sur un dossier pour le modifier
      </div>
    </main>
    
    ${renderBottomNav()}
  `;
}

// EVENTS

function attachListeners() {
  $$('[data-action]').forEach(el => el.addEventListener('click', handleAction));
  
  // V2.12.3 — Démarrer keepalive audio au premier clic pour les users qui reçoivent les urgences
  // (admin, manager, superviseur)
  if (canReceiveUrgence() && !urgenceState.keepaliveActive && !document._audioActivationListenerAdded) {
    document._audioActivationListenerAdded = true;
    const activateOnFirstClick = () => {
      if (canReceiveUrgence()) {
        startAudioKeepalive();
      }
      document.removeEventListener('click', activateOnFirstClick);
      document.removeEventListener('touchstart', activateOnFirstClick);
    };
    document.addEventListener('click', activateOnFirstClick, { once: false });
    document.addEventListener('touchstart', activateOnFirstClick, { once: false });
  }
  
  // V2.11.0 — Binding pour la recherche dans la vue Manager
  const mgrSearch = document.getElementById('manager-search-input');
  if (mgrSearch) {
    mgrSearch.addEventListener('input', (e) => {
      managerState.searchQuery = e.target.value;
      // Re-render mais on garde le focus
      const cursorPos = e.target.selectionStart;
      render();
      const newInput = document.getElementById('manager-search-input');
      if (newInput) {
        newInput.focus();
        newInput.setSelectionRange(cursorPos, cursorPos);
      }
    });
  }
  $$('[data-bind]').forEach(el => {
    el.addEventListener('input', (e) => {
      if (tempDossier) tempDossier[e.target.dataset.bind] = e.target.value;
    });
  });
  $$('[data-bind-edit]').forEach(el => {
    // V2.9.9 — Liste blanche des champs autorisés en édition inline
    // Les champs sensibles (horaires, sequenceId, type, statut) ne sont JAMAIS éditables via data-bind-edit
    const ALLOWED_EDIT_FIELDS = [
      'etablissement', 'codeAstreinte', 'motif', 'rapportN', 
      'adresseSite', 'km', 'compteRendu'
    ];
    
    // Mémoriser la valeur initiale pour détecter un vrai changement
    el.dataset.initialValue = el.value;
    
    el.addEventListener('input', (e) => {
      const field = e.target.dataset.bindEdit;
      
      // Vérification sécurité : seuls les champs autorisés peuvent être édités
      if (!ALLOWED_EDIT_FIELDS.includes(field)) {
        console.warn(`Champ "${field}" non autorisé en édition inline`);
        return;
      }
      
      const d = state.dossiers.find(x => x.id === view.dossierId);
      if (!d) return;
      
      // Pas de sauvegarde si la valeur n'a pas vraiment changé
      const newValue = e.target.value;
      if (newValue === el.dataset.initialValue) return;
      
      d[field] = newValue;
      // Mettre à jour la valeur initiale après modification
      el.dataset.initialValue = newValue;
      
      if (autosaveTimer) clearTimeout(autosaveTimer);
      autosaveTimer = setTimeout(() => {
        // Nettoyer le flag _isEdit qui peut traîner
        delete d._isEdit;
        saveDossier(d);
        toast('Sauvegardé', 'success');
      }, 800);
    });
  });
  
  // Barre de recherche
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      view.searchQuery = e.target.value;
      // Re-render seulement la liste pour pas perdre le focus
      const listEl = document.querySelector('.dossiers-list');
      if (listEl) {
        const filtered = getFilteredDossiers();
        listEl.innerHTML = filtered.length === 0 ? `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <div class="empty-state-title">Aucun résultat</div>
            <div class="empty-state-desc">Aucun dossier ne correspond à "${escapeHtml(view.searchQuery)}"</div>
          </div>
        ` : filtered.map(renderDossierCard).join('');
        // Re-attach detail handlers
        listEl.querySelectorAll('[data-action="detail"]').forEach(el => el.addEventListener('click', handleAction));
      }
    });
  }
}

async function handleAction(e) {
  const t = e.currentTarget;
  const action = t.dataset.action;
  haptic('light');
  
  switch (action) {
    case 'nav':
      view.current = t.dataset.view;
      if (view.current === 'list') view.dossierId = null;
      // V2.11.0 — Si on navigue vers manager-view, charger les dossiers
      if (view.current === 'manager-view' && isManagerOrAdmin()) {
        render();
        managerLoadDossiers();
      } else {
        render();
      }
      break;
    case 'new':
      tempDossier = null;
      view.current = 'new';
      render();
      break;
    case 'quick-new':
      await quickNew();
      break;
    case 'quick-call':
      // V2.11.0 — Saisie rapide téléphone (3 étapes)
      await quickPhoneCall();
      break;
    // V2.12.0 — Déclenchement urgence
    case 'urgence-trigger':
      await urgenceTrigger();
      break;
    case 'cancel-new':
      // V2.11.1 — Si on créait un dossier pour un tech, retour à la vue d'origine
      const wasForTech = tempDossier && tempDossier._createdByAdmin === true;
      const cancelReturnTo = tempDossier && tempDossier._returnTo;
      tempDossier = null;
      if (wasForTech && cancelReturnTo) {
        view.current = cancelReturnTo;
      } else {
        view.current = 'list';
      }
      render();
      break;
    case 'back-list':
      view.current = 'list';
      render();
      break;
    case 'save-new':
      await saveNewDossier();
      break;
    case 'set-type':
      if (tempDossier) { tempDossier.type = t.dataset.type; render(); }
      break;
    case 'toggle-bureau':
      // V2.15.7 — Gère création (tempDossier) ET édition (dossier existant via view.dossierId)
      if (tempDossier) {
        tempDossier.bureau = !tempDossier.bureau;
        render();
      } else if (view.dossierId) {
        const dossier = state.dossiers.find(x => x.id === view.dossierId);
        if (dossier) {
          dossier.bureau = !dossier.bureau;
          await saveDossier(dossier);
          render();
          toast(dossier.bureau ? '📞 Basculé en mode Bureau' : '🕐 Basculé en heure d\'appel réelle', 'success');
        }
      }
      break;
    case 'set-depart':
      // V2.13.8 — Gère création (tempDossier) ET édition (dossier existant via view.dossierId)
      if (tempDossier) {
        tempDossier.pointDepart = t.dataset.depart;
        render();
      } else if (view.dossierId) {
        const dossier = state.dossiers.find(x => x.id === view.dossierId);
        if (dossier) {
          dossier.pointDepart = t.dataset.depart;
          await saveDossier(dossier);
          render();
        }
      }
      break;
    case 'detail':
      view.dossierId = t.dataset.id;
      view.current = 'detail';
      render();
      break;
    case 'filter':
      view.filter = t.dataset.filter;
      render();
      break;
    case 'clear-search':
      view.searchQuery = '';
      render();
      break;
    case 'prev-week':
      view.weekOffset--;
      render();
      break;
    case 'next-week':

      const dossierId = t.dataset.dossierId || t.closest('[data-dossier-id]')?.dataset.dossierId;

      let dossier = (dashboardState.allDossiers || []).find(x => x.id === dossierId);
      
      // 2. Sinon chercher dans state.dossiers (cache local)
      if (!dossier) {
        dossier = (state.dossiers || []).find(x => x.id === dossierId);
      }
      
      // 3. Sinon, fetch direct depuis le cloud (cas superviseur ou cache vide)
      if (!dossier) {
        console.log('[V2.14.12] Dossier pas en cache, fetch cloud...');
        try {
          const res = await cloudCall('getDossiers', {});

            dossier = res.dossiers.find(x => x.id === dossierId);

              if (!Array.isArray(dashboardState.allDossiers)) dashboardState.allDossiers = [];
              const existing = dashboardState.allDossiers.findIndex(x => x.id === dossierId);
              if (existing >= 0) dashboardState.allDossiers[existing] = dossier;
              else dashboardState.allDossiers.push(dossier);
            }
          }
        } catch(e) {
          console.error('[V2.14.12] Erreur fetch cloud:', e);
        }
      } else {
        // Le dossier vient de state.dossiers — s'assurer qu'il est aussi dans dashboardState
        // pour que openSuperviseurDossierModal le trouve
        if (!Array.isArray(dashboardState.allDossiers)) dashboardState.allDossiers = [];
        const existing = dashboardState.allDossiers.findIndex(x => x.id === dossierId);
        if (existing < 0) dashboardState.allDossiers.push(dossier);
      }
      
      if (!dossier) {
        toast('Dossier introuvable (peut-être supprimé)', 'warning');
        console.warn('[V2.14.12] Dossier id=' + dossierId + ' introuvable nulle part');
        break;
