  --status-intervention-bg: rgba(251, 191, 36, 0.10);
  --status-intervention-border: rgba(251, 191, 36, 0.30);
  
  --status-done: #34d399;
  --status-done-bg: rgba(52, 211, 153, 0.10);
  --status-done-border: rgba(52, 211, 153, 0.30);
  
  --status-chain: #a78bfa;
  --status-chain-bg: rgba(167, 139, 250, 0.10);
  --status-chain-border: rgba(167, 139, 250, 0.30);
  
  --danger: #f87171;
  --danger-bg: rgba(248, 113, 113, 0.10);
  --danger-border: rgba(248, 113, 113, 0.30);
  
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
  --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.4), 0 4px 6px rgba(0, 0, 0, 0.2);
  --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background var(--transition), color var(--transition);
}

body { font-size: 15px; line-height: 1.5; }

#app {
  max-width: 500px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  padding-bottom: 80px;
}

/* ============================================================================
   HEADER
============================================================================ */
.app-header {
  position: sticky;
  top: 0;
  padding: max(env(safe-area-inset-top, 0px), 12px) 20px 12px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 50;
}
[data-theme="dark"] .app-header { background: rgba(15, 23, 42, 0.85); }

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.header-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
}
.header-back {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  margin-left: -8px;
  font-size: 22px;
  transition: background var(--transition);
}
.header-back:active { background: var(--bg-muted); }
.header-subtitle {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 1px;
  font-weight: 500;
}
.header-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: transparent;
  border: none;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}
.icon-btn:active { background: var(--bg-muted); }
.icon-btn.primary { background: var(--accent); color: var(--text-on-accent); }
.icon-btn.primary:active { background: var(--accent-hover); }

/* ============================================================================
   WEEK BANNER
============================================================================ */
.week-banner {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.week-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.week-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}
.week-dates {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.week-count {
  text-align: right;
}
.week-count-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}
.week-count-label {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
  margin-top: 4px;
}

/* ============================================================================
   SEQUENCE INDICATOR (séquence ouverte)
============================================================================ */
.sequence-indicator {
  margin: 12px 20px 0;
  padding: 12px 14px;
  background: var(--status-chain-bg);
  border: 1px solid var(--status-chain-border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sequence-pulse {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--status-chain);
  position: relative;
  flex-shrink: 0;
}
.sequence-pulse::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: var(--status-chain);
  animation: pulse 2s ease-out infinite;
  opacity: 0.6;
}
@keyframes pulse {
  to { transform: scale(2.5); opacity: 0; }
}
.sequence-text {
  flex: 1;
  font-size: 12px;
  color: var(--status-chain);
  font-weight: 600;
}
.sequence-text strong { display: block; font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.sequence-action {
  font-size: 11px;
  color: var(--status-chain);
  font-weight: 700;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  background: rgba(124, 58, 237, 0.1);
}

/* ============================================================================
   FILTERS / SEGMENTED CONTROL
============================================================================ */
.filter-tabs {
  display: flex;
  gap: 6px;
  padding: 14px 20px 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 7px 14px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
}
.filter-tab.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}
.filter-tab-count {
  display: inline-block;
  margin-left: 4px;
  font-family: 'JetBrains Mono', monospace;
  opacity: 0.7;
  font-size: 11px;
}

/* ============================================================================
   DOSSIER CARDS
============================================================================ */
.dossiers-list {
  padding: 8px 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.dossier {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.dossier::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--border-strong);
}
.dossier.status-call::before { background: var(--status-call); }
.dossier.status-intervention::before { background: var(--status-intervention); }
.dossier.status-done::before { background: var(--status-done); }
.dossier.status-pending::before { background: var(--text-tertiary); }
.dossier:active { transform: scale(0.99); background: var(--bg-subtle); }

.dossier-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 6px;
}
.dossier-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 600;
}
.dossier-badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 3px 8px;
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.badge-call { background: var(--status-call-bg); color: var(--status-call); border: 1px solid var(--status-call-border); }
.badge-intervention { background: var(--status-intervention-bg); color: var(--status-intervention); border: 1px solid var(--status-intervention-border); }
.badge-done { background: var(--status-done-bg); color: var(--status-done); border: 1px solid var(--status-done-border); }
.badge-pending { background: var(--bg-muted); color: var(--text-secondary); border: 1px solid var(--border); }
.badge-chain { background: var(--status-chain-bg); color: var(--status-chain); border: 1px solid var(--status-chain-border); }
/* V2.16.0 — Badge À qualifier (orange/jaune) */
.badge-to-qualify { background: rgba(245,158,11,0.15); color: #d97706; border: 1px solid rgba(245,158,11,0.4); font-weight: 700; }
.dossier.status-to-qualify::before { background: #f59e0b; }

.dossier-etablissement {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 3px;
  letter-spacing: -0.01em;
  color: var(--text);
}
.dossier-motif {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.4;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.dossier-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--text-tertiary);
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}
.dossier-meta span { display: flex; align-items: center; gap: 4px; font-weight: 500; }

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-tertiary);
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-state-desc { font-size: 13px; line-height: 1.5; max-width: 240px; margin: 0 auto; }

/* ============================================================================
   FAB
============================================================================ */
.fab {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 300;
  box-shadow: var(--shadow-lg), 0 0 0 4px var(--bg);
  cursor: pointer;
  z-index: 40;
  border: none;
  line-height: 1;
  transition: transform var(--transition);
}
.fab:active { transform: scale(0.95); }

/* ============================================================================
   BOTTOM NAV
============================================================================ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 500px;
  margin: 0 auto;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 50;
}
[data-theme="dark"] .bottom-nav { background: rgba(15, 23, 42, 0.92); }
.nav-item {
  flex: 1;
  height: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: var(--text-tertiary);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  padding: 6px;
  border: none;
  background: transparent;
  transition: color var(--transition);
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 22px; line-height: 1; }

/* ============================================================================
   FORMS
============================================================================ */
.form-screen { padding: 16px 20px 120px; }

.section {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 12px;
}

.section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 14px;
}

.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }

.form-label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-weight: 600;
}
.required { color: var(--danger); }

.form-input, .form-textarea, .form-select {
  width: 100%;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px;
  font-size: 15px;
  color: var(--text);
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color var(--transition), background var(--transition);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-tertiary); }
.form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.form-input:focus, .form-textarea:focus, .form-select:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg-elevated);
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ============================================================================
   PICKER BUTTONS (date/time custom)
============================================================================ */
.picker-btn {
  width: 100%;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px;
  font-size: 15px;
  color: var(--text);
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all var(--transition);
  font-variant-numeric: tabular-nums;
}
.picker-btn:active { background: var(--bg-muted); }
.picker-btn-icon { color: var(--text-tertiary); font-size: 16px; }
.picker-btn .rounded-pill {
  font-size: 9px;
  background: var(--accent);
  color: var(--text-on-accent);
  padding: 2px 6px;
  border-radius: 100px;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-left: 6px;
}

/* ============================================================================
   TYPE SELECTOR (Tel / Déplacement)
============================================================================ */
.type-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.type-option {
  background: var(--bg-subtle);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 12px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
}
.type-option:active { transform: scale(0.97); }
.type-option.selected.phone {
  background: var(--status-call-bg);
  border-color: var(--status-call);
}
.type-option.selected.move {
  background: var(--status-intervention-bg);
  border-color: var(--status-intervention);
}
.type-option .icon { font-size: 28px; margin-bottom: 6px; display: block; }
.type-option .label { font-size: 13px; font-weight: 700; color: var(--text); }
.type-option .desc { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

/* ============================================================================
   RADIO OPTIONS
============================================================================ */
.radio-group { display: flex; flex-direction: column; gap: 8px; }
.radio-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
}
.radio-option:active { transform: scale(0.98); }
.radio-option.selected {
  border-color: var(--accent);
  background: var(--accent-subtle);
}
.radio-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  flex-shrink: 0;
  position: relative;
  transition: border-color var(--transition);
}
.radio-option.selected .radio-dot { border-color: var(--accent); }
.radio-option.selected .radio-dot::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}
.radio-icon { font-size: 20px; }
.radio-content { flex: 1; }
.radio-title { font-size: 14px; font-weight: 600; color: var(--text); }
.radio-subtitle { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

/* ============================================================================
   TIMESTAMPS
============================================================================ */
.timestamp-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 12px 14px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  transition: all var(--transition);
}
.timestamp-row.pending {
  border-color: var(--accent);
  background: var(--accent-subtle);
}
.timestamp-row.disabled { opacity: 0.5; }
.timestamp-row.crossed {
  background: var(--bg-muted);
  border-style: dashed;
}
.timestamp-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.timestamp-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
}
.ts-actions { display: flex; gap: 4px; align-items: center; }
.ts-btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 9px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  transition: all var(--transition);
}
.ts-btn:active { transform: scale(0.95); }
.ts-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.ts-btn.filled {
  background: var(--bg-elevated);
  color: var(--text);
  border: 1px solid var(--border);
}
.ts-btn-icon {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 7px 9px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}

/* ============================================================================
   DURATIONS DISPLAY
============================================================================ */
.duration-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
}
.duration-card {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
}
.duration-card.payed {
  background: var(--status-done-bg);
  border-color: var(--status-done-border);
}
.duration-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
}
.duration-card.payed .duration-value { color: var(--status-done); }
.duration-label {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 4px;
  font-weight: 700;
}

/* ============================================================================
   BUTTONS
============================================================================ */
.btn {
  padding: 13px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all var(--transition);
  letter-spacing: -0.01em;
}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-block { width: 100%; }
.btn-primary { background: var(--accent); color: var(--text-on-accent); }
.btn-primary:active { background: var(--accent-hover); }
.btn-secondary { background: var(--bg-muted); color: var(--text); }
.btn-success { background: var(--status-done); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-ghost-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger-border); }
.btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }

.form-actions {
  position: fixed;
  bottom: calc(64px + env(safe-area-inset-bottom, 0px));
  left: 0; right: 0;
  max-width: 500px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  padding: 12px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  z-index: 49;
}
.form-actions.no-nav { bottom: env(safe-area-inset-bottom, 0px); }
.form-actions .btn { flex: 1; }

/* ============================================================================
   MODAL / BOTTOM SHEET
============================================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: flex-end;
  z-index: 200;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal {
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  background: var(--bg-elevated);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding: 8px 20px calc(20px + env(safe-area-inset-bottom, 0px));
  animation: slideUp 0.3s ease-out;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: 0 auto 18px;
}
.modal-title { font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 6px; letter-spacing: -0.01em; }
.modal-subtitle { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 20px; line-height: 1.5; }
.modal-choices { display: flex; flex-direction: column; gap: 8px; }
.modal-choice {
  background: var(--bg-subtle);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  width: 100%;
  font-family: inherit;
  transition: all var(--transition);
}
.modal-choice:active { transform: scale(0.98); }
.modal-choice.primary { border-color: var(--accent); background: var(--accent-subtle); }
.modal-choice.danger { border-color: var(--danger); background: var(--danger-bg); }
.modal-choice-icon { font-size: 26px; }
.modal-choice-content { flex: 1; }
.modal-choice-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.modal-choice-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

/* ============================================================================
   TIME PICKER (Custom roulette)
============================================================================ */
.time-picker-display {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 24px 0;
  background: var(--bg-subtle);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
}
.time-segment {
  font-size: 48px;
  font-weight: 800;
  color: var(--text);
  min-width: 80px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.04em;
}
.time-colon { font-size: 40px; color: var(--text-tertiary); font-weight: 300; }

.time-picker-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.time-control-column { display: flex; flex-direction: column; gap: 6px; }
.time-control-label {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.time-control-btns { display: flex; gap: 6px; justify-content: center; }
.time-ctrl-btn {
  background: var(--bg-muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  min-width: 44px;
  font-family: inherit;
}
.time-ctrl-btn:active { background: var(--bg-hover); }
.time-ctrl-btn.now {
  background: var(--accent);
  color: var(--text-on-accent);
  border-color: var(--accent);
  width: 100%;
}

.time-quick-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.time-quick {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 6px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  cursor: pointer;
}
.time-quick:active { background: var(--bg-muted); }

/* ============================================================================
   DATE PICKER
============================================================================ */
.date-picker-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin: 16px 0;
}
.date-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  background: transparent;
  border: 1px solid transparent;
}
.date-cell.header { font-size: 10px; font-weight: 700; color: var(--text-tertiary); cursor: default; text-transform: uppercase; }
.date-cell.other-month { color: var(--text-tertiary); opacity: 0.4; }
.date-cell:not(.header):active { background: var(--bg-muted); }
.date-cell.today { border-color: var(--accent); color: var(--accent); }
.date-cell.selected { background: var(--accent); color: var(--text-on-accent); }
.date-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.date-nav-btn {
  background: var(--bg-muted);
  border: none;
  width: 36px; height: 36px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  color: var(--text);
}
.date-nav-title {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
}

/* ============================================================================
   SETTINGS
============================================================================ */
.settings-section { margin-bottom: 20px; }
.settings-section-title {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  padding-left: 14px;
  font-weight: 700;
}
.settings-group {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.settings-row {
  display: flex;
  align-items: center;
  padding: 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
}
.settings-row:active { background: var(--bg-subtle); }
.settings-row:last-child { border-bottom: none; }
.settings-row-icon {
  width: 32px; height: 32px;
  background: var(--bg-subtle);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  margin-right: 12px;
  flex-shrink: 0;
}
.settings-row-content { flex: 1; min-width: 0; }
.settings-row-title { font-size: 14px; font-weight: 600; color: var(--text); }
.settings-row-value {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.settings-row-chevron { color: var(--text-tertiary); font-size: 18px; flex-shrink: 0; margin-left: 8px; }

/* Theme selector buttons */
.theme-selector {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 14px;
}
.theme-option {
  padding: 14px 8px;
  background: var(--bg-subtle);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  text-align: center;
  transition: all var(--transition);
}
.theme-option.active { border-color: var(--accent); background: var(--accent-subtle); }
.theme-option-icon { font-size: 22px; margin-bottom: 4px; display: block; }
.theme-option-label { font-size: 12px; font-weight: 600; color: var(--text); }

/* ============================================================================
   EXPORT CARDS
============================================================================ */
.export-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all var(--transition);
}
.export-card:active { transform: scale(0.99); }
.export-card.primary { border-color: var(--accent); }
.export-card.pdf { border-color: var(--danger); }
.export-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.export-icon-box {
  width: 42px; height: 42px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.export-title { font-size: 14px; font-weight: 700; color: var(--text); }
.export-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.export-stats {
  display: flex;
  gap: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.export-stat { display: flex; flex-direction: column; gap: 2px; }
.export-stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.01em;
}
.export-stat-label {
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-size: 9px;
  font-weight: 700;
}

/* ============================================================================
   DETAIL VIEW
============================================================================ */
.status-banner {
  padding: 12px 14px;
  border-radius: var(--radius);
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.status-banner.intervention { background: var(--status-intervention-bg); border: 1px solid var(--status-intervention-border); }
.status-banner.done { background: var(--status-done-bg); border: 1px solid var(--status-done-border); }
.status-banner.call { background: var(--status-call-bg); border: 1px solid var(--status-call-border); }
.status-banner.pending { background: var(--bg-subtle); border: 1px solid var(--border); }

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.detail-row:last-child { border-bottom: none; }
.detail-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; flex-shrink: 0; }
.detail-value { font-size: 13px; color: var(--text); font-weight: 600; text-align: right; flex: 1; word-break: break-word; }
.detail-value.mono { font-family: 'JetBrains Mono', monospace; }
.detail-block { padding: 10px 0; border-bottom: 1px solid var(--border); }
.detail-block:last-child { border-bottom: none; }
.detail-block-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; margin-bottom: 6px; }
.detail-block-content { font-size: 14px; color: var(--text); line-height: 1.5; }

/* V2.9.8 — Édition inline dans le détail */
.detail-input {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 13px;
  color: var(--text);
  font-weight: 600;
  flex: 1;
  text-align: right;
  min-width: 0;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.detail-input:focus {
  border-color: var(--accent);
  background: var(--bg);
  text-align: left;
}
.detail-input.mono {
  font-family: 'JetBrains Mono', monospace;
}
.detail-input::placeholder {
  color: var(--text-tertiary);
  font-weight: 400;
}

/* ============================================================================
   STATS
============================================================================ */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.stat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 6px;
  font-weight: 700;
}
.stat-card.accent { background: var(--accent-subtle); border-color: var(--accent-border); }
.stat-card.accent .stat-value { color: var(--accent); }

/* ============================================================================
   SEQUENCE TIMELINE
============================================================================ */
.sequence-timeline {
  position: relative;
  padding-left: 8px;
}
.seq-step {
  position: relative;
  padding-left: 32px;
  padding-bottom: 16px;
}
.seq-step:not(:last-child)::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 24px;
  bottom: -4px;
  width: 2px;
  background: var(--border);
}
.seq-step-dot {
  position: absolute;
  left: 5px;
  top: 6px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 3px solid var(--bg);
  z-index: 1;
  box-shadow: 0 0 0 2px var(--border);
}
.seq-step-content {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.seq-step-content:active {
  transform: scale(0.98);
  background: var(--bg-subtle);
}
.seq-chain-arrow {
  position: relative;
  left: -18px;
  margin: -4px 0 0 0;
  padding: 4px 8px;
  color: var(--status-chain);
  font-size: 11px;
  font-weight: 600;
  text-align: left;
}

/* ============================================================================
   TOAST
============================================================================ */
.toast-container {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  left: 0; right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  z-index: 1000;
  pointer-events: none;
}
.toast {
  background: var(--text);
  color: var(--bg);
  padding: 10px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  max-width: 90%;
  animation: toastIn 0.3s ease-out;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.success { background: var(--status-done); color: white; }
.toast.error { background: var(--danger); color: white; }
.toast.warning { background: var(--status-intervention); color: white; }
@keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ============================================================================
   HELPERS
============================================================================ */
.hidden { display: none !important; }
.text-center { text-align: center; }
.help-text { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; line-height: 1.4; }

.warning-inline {
  background: var(--status-intervention-bg);
  border: 1px solid var(--status-intervention-border);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--status-intervention);
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.sync-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 100px;
}
.sync-badge.ok { background: var(--status-done-bg); color: var(--status-done); }
.sync-badge.pending { background: var(--status-intervention-bg); color: var(--status-intervention); }
.sync-badge.error { background: var(--danger-bg); color: var(--danger); }
.sync-badge.off { background: var(--bg-muted); color: var(--text-tertiary); }

.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.sync-badge.pending .sync-dot { animation: blink 1.2s infinite; }
@keyframes blink { 50% { opacity: 0.3; } }

/* ═══════════════════════════════════════════════════════════════
   V2.10.0 — PAGE LOGIN (Auth multi-utilisateurs)
   ═══════════════════════════════════════════════════════════════ */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg-secondary) 100%);
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
}
.login-logo {
  text-align: center;
  margin-bottom: 24px;
}
.login-logo img {
  max-width: 140px;
  height: auto;
}
.login-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  margin-bottom: 6px;
}
.login-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 28px;
}
.login-form-group {
  margin-bottom: 16px;
}
.login-form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.login-form-group input {
  width: 100%;
  padding: 12px 14px;
  font-size: 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  box-sizing: border-box;
  transition: border-color 0.15s;
}
.login-form-group input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}
.login-btn {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: var(--text-on-accent);
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 8px;
}
.login-btn:hover:not(:disabled) {
  background: var(--accent-hover);
}
.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.login-error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #b91c1c;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 14px;
  display: none;
}
.login-error.visible {
  display: block;
}
.login-info {
  background: var(--accent-subtle);
  border: 1px solid var(--accent-border);
  color: var(--accent-hover);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 14px;
}
.login-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: var(--text-tertiary);
}
[data-theme="dark"] .login-error {
  background: #422020;
  border-color: #7f1d1d;
  color: #fca5a5;
}

/* ═══════════════════════════════════════════════════════════════
   V2.10.0 — Header user + bouton logout (placeholder pour P3)
   ═══════════════════════════════════════════════════════════════ */
.user-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--accent-subtle);
  color: var(--accent-hover);
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.btn-logout {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  margin-left: 8px;
}
.btn-logout:hover {
  background: var(--surface-hover);
  color: var(--text);
}

/* ═══════════════════════════════════════════════════════════════
   V2.10.2 — Admin : Users + Logs + Modale édition
   ═══════════════════════════════════════════════════════════════ */
.user-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
}
.user-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}
.user-card.user-inactive {
  opacity: 0.55;
  background: var(--bg-secondary);
}
.user-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
  gap: 12px;
}
.user-card-username {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
}
.user-card-name {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.user-card-role {
  font-size: 11px;
  color: var(--text-tertiary);
  padding: 3px 8px;
  background: var(--bg-secondary);
  border-radius: 6px;
  white-space: nowrap;
}
.user-card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}
.user-card-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.btn-sm {
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 8px;
}

/* Modale édition user */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 16px;
}
.user-edit-modal {
  background: var(--surface);
  border-radius: 14px;
  max-width: 440px;
  width: 100%;
  max-height: 90vh;
  overflow: auto;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-weight: 700;
  font-size: 16px;
  color: var(--text);
}
.modal-close {
  background: transparent;
  border: none;
  font-size: 26px;
  cursor: pointer;
  color: var(--text-tertiary);
  line-height: 1;
  padding: 0 4px;
}
.modal-body {
  padding: 16px 18px;
}
.modal-body .form-group {
  margin-bottom: 14px;
}
.modal-body label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 5px;
}
.modal-body input,
.modal-body select {
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  box-sizing: border-box;
}
.modal-body input:focus,
.modal-body select:focus {
  outline: none;
  border-color: var(--accent);
}
.modal-footer {
  display: flex;
  gap: 8px;
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  justify-content: flex-end;
}

/* Logs */
.log-list {
  padding: 0 12px 24px;
}
.log-row {
  display: grid;
  grid-template-columns: 100px 90px 130px 1fr;
  gap: 10px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.log-time {
  color: var(--text-tertiary);
  font-family: monospace;
}
.log-user {
  font-weight: 600;
  color: var(--text);
}
.log-action {
  font-weight: 600;
  font-family: monospace;
}
.log-details {
  color: var(--text-secondary);
  word-break: break-word;
}
@media (max-width: 600px) {
  .log-row {

/* ============================================================ */
/* V2.11.0 — SPLASH SCREEN (affiché immédiatement au démarrage)  */
/* ============================================================ */
#splash-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a2238 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
}
#splash-screen.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
#splash-screen .splash-logo {
  width: 100px;
  height: 100px;
  margin-bottom: 24px;
  animation: splash-pulse 1.5s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(37, 99, 235, 0.4));
}
#splash-screen .splash-title {
  color: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}
#splash-screen .splash-subtitle {
  color: #94a3b8;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  margin-bottom: 32px;
}
#splash-screen .splash-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-top-color: #2563eb;
  border-radius: 50%;
  animation: splash-spin 0.8s linear infinite;
}
#splash-screen .splash-status {
  margin-top: 20px;
  color: #64748b;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  letter-spacing: 0.3px;
}
@keyframes splash-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.05); opacity: 0.85; }
}
@keyframes splash-spin {
  to { transform: rotate(360deg); }
}

/* ============================================================ */
/* V2.11.0 — BANDEAU "ASTREINTE EN COURS"                       */
/* ============================================================ */
.astreinte-active {
  background: linear-gradient(135deg, rgba(239, 68, 68, 0.12) 0%, rgba(220, 38, 38, 0.06) 100%);
  border: 1px solid rgba(239, 68, 68, 0.4);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.astreinte-active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
}
.astreinte-active-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.astreinte-active-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #ef4444;
  color: white;
  padding: 3px 9px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.6px;
  text-transform: uppercase;
}
.astreinte-active-badge::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: white;
  animation: pulse-red 1.4s ease-in-out infinite;
}
@keyframes pulse-red {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}
.astreinte-active-countdown {
  font-size: 13px;
  color: var(--text);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.astreinte-active-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.astreinte-stat {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  text-align: center;
}
.astreinte-stat-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.astreinte-stat-label {
  font-size: 9px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  letter-spacing: 0.5px;
  margin-top: 2px;
}
.astreinte-quick-call-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.3px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
  transition: transform 0.15s, box-shadow 0.15s;
}
.astreinte-quick-call-btn:active {
  transform: scale(0.98);
  box-shadow: 0 2px 6px rgba(37, 99, 235, 0.4);
}
.astreinte-quick-call-btn .phone-icon {
  font-size: 18px;
}

  white-space: pre-wrap;
}
#update-modal .update-modal-btn-primary {
  width: 100%;
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 8px;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}
#update-modal .update-modal-btn-secondary {
  width: 100%;
  background: transparent;
  color: var(--text-tertiary);
  border: 1px solid var(--border);
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
}

/* ============================================================ */
/* V2.11.0 — INDICATEUR ONLINE/OFFLINE                          */
/* ============================================================ */
.network-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.network-badge.online {
  background: rgba(34, 197, 94, 0.15);
  color: #22c55e;
}
.network-badge.offline {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
}
.network-badge .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.network-badge.online .dot {
  animation: pulse-online 2s ease-in-out infinite;
}
@keyframes pulse-online {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ============================================================ */
/* V2.12.1 — VUE SUPERVISEUR (tablette de supervision 24/7)      */
/* ============================================================ */
.superviseur-view {
  position: fixed;
  inset: 0;
  background: #0a0e1a;
  z-index: 99990;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.superviseur-header {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}
.superviseur-clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 1px;
  font-variant-numeric: tabular-nums;
}
.superviseur-date {
  font-size: 13px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}
.superviseur-status-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(34, 197, 94, 0.15);
  color: #22c55e;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid rgba(34, 197, 94, 0.3);
}
.superviseur-status-badge.alert {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
  border-color: rgba(239, 68, 68, 0.3);
  animation: pulse-red 1.2s ease-in-out infinite;
}
.superviseur-status-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
  animation: pulse-online 2s ease-in-out infinite;
}
.superviseur-content {
  flex: 1;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  max-width: 1600px;
  margin: 0 auto;
  width: 100%;
  box-sizing: border-box;
}
@media (max-width: 900px) {
  .superviseur-content { grid-template-columns: 1fr; }
}
.superviseur-block {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 14px;
  padding: 18px;
}
.superviseur-block h3 {
  margin: 0 0 14px 0;
  font-size: 14px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 700;
}
.superviseur-footer {
  background: rgba(0, 0, 0, 0.3);
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: #64748b;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}
.superviseur-footer button {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: #94a3b8;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
}
.superviseur-footer button:hover {
  background: rgba(255, 255, 255, 0.05);
  color: #ffffff;
}
.superviseur-snooze-active {
  background: rgba(234, 179, 8, 0.15) !important;
  color: #eab308 !important;
  border-color: rgba(234, 179, 8, 0.4) !important;
}

</style>

let _jsPdfLoadPromise = null;
function loadJsPDF() {
  if (_jsPdfLoadPromise) return _jsPdfLoadPromise;
  _jsPdfLoadPromise = new Promise((resolve, reject) => {
    if (window.jspdf && window.jspdf.jsPDF) {
      resolve(window.jspdf.jsPDF);
      return;
    }
    const s1 = document.createElement('script');
    s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.0/jspdf.plugin.autotable.min.js';
      s2.onload = () => resolve(window.jspdf.jsPDF);
      s2.onerror = () => reject(new Error('Échec chargement jspdf-autotable'));
      document.head.appendChild(s2);
    };
    s1.onerror = () => reject(new Error('Échec chargement jsPDF'));
    document.head.appendChild(s1);
  });
  return _jsPdfLoadPromise;
}

// V2.13.3 — LAZY LOAD Chart.js (chargement différé)
// ============================================================================
let _chartJsLoadPromise = null;
function loadChartJs() {
  if (_chartJsLoadPromise) return _chartJsLoadPromise;
  _chartJsLoadPromise = new Promise((resolve, reject) => {
    if (window.Chart) {
      resolve(window.Chart);
      return;
    }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
    s.onload = () => {
      if (window.Chart) {
        // Désactiver les animations de chargement initial pour fluidité au switch onglet
        window.Chart.defaults.animation = { duration: 300 };
        resolve(window.Chart);
      } else {
        reject(new Error('Chart.js chargé mais variable absente'));
      }
    };
    s.onerror = () => reject(new Error('Échec chargement Chart.js'));
    document.head.appendChild(s);
  });
  return _chartJsLoadPromise;
}

// V2.13.3 — Couleurs adaptées au thème courant (clair/sombre)
function getChartTheme() {
  // Robustesse : state peut ne pas être défini au tout premier appel
  const settings = (typeof state !== 'undefined' && state && state.settings) ? state.settings : {};
  const isDark = document.documentElement.classList.contains('dark') 
    || settings.theme === 'dark'
    || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches 
        && settings.theme === 'auto');
  return {
    isDark: isDark,
    text: isDark ? '#e5e7eb' : '#374151',
    textTertiary: isDark ? '#9ca3af' : '#6b7280',
    grid: isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)',
    border: isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.08)',

    primary: '#3b82f6',
    primaryFill: 'rgba(59,130,246,0.15)',
    green: '#22c55e',

    yellow: '#eab308',

    red: '#dc2626',

}

const _chartInstances = {};
function destroyChart(canvasId) {
  if (_chartInstances[canvasId]) {

}
function registerChart(canvasId, instance) {
  destroyChart(canvasId);

}

// Appel public à getAppConfig (pas besoin de token)
async function publicCall(action, data) {
  try {
    const response = await fetch(AUTH_CONFIG.BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action,
        data: data || {}
      })
    });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    return await response.json();
  } catch (err) {
    return { ok: false, error: 'Erreur reseau : ' + err.message };
  }
}

// Récupérer la config app depuis le cloud
async function fetchAppConfig() {
  try {
    const res = await publicCall('getAppConfig', {});
    if (res.ok && res.config) {
      appConfig.maintenanceMode = res.config.maintenanceMode === true || res.config.maintenanceMode === 'true';
      appConfig.maintenanceMessage = res.config.maintenanceMessage || appConfig.maintenanceMessage;
      // V2.11.2 FIX : valider que latestVersion est bien un numéro de version, pas une date
      const rawVersion = res.config.latestVersion;
      const versionStr = (typeof rawVersion === 'string') ? rawVersion : String(rawVersion || '');
      if (/^\d+\.\d+(\.\d+)?$/.test(versionStr)) {
        appConfig.latestVersion = versionStr;
      } else {
        console.warn('latestVersion corrompue :', rawVersion, '→ fallback', APP_VERSION);
        appConfig.latestVersion = APP_VERSION;
      }
      appConfig.updateMessage = res.config.updateMessage || appConfig.updateMessage;
      appConfig.forceUpdate = res.config.forceUpdate === true || res.config.forceUpdate === 'true';
      appConfig.changelog = res.config.changelog || '';
      // V2.12.0 — Désignation tech d'astreinte
      appConfig.astreinteTitulaireId = res.config.astreinteTitulaireId || '';
      appConfig.astreinteSuppleantId = res.config.astreinteSuppleantId || '';
      appConfig.astreinteWeekNumber = parseInt(res.config.astreinteWeekNumber, 10) || 0;
      // V2.16.6 — Planning multi-semaines
      appConfig.astreintePlanning = (typeof res.config.astreintePlanning === 'string' && res.config.astreintePlanning.trim() !== '') ? res.config.astreintePlanning : '{}';
      // V2.12.0 — Système d'urgence
      appConfig.urgenceActive = res.config.urgenceActive === true || res.config.urgenceActive === 'true';
      appConfig.urgenceDetails = res.config.urgenceDetails || '';
      appConfig.urgenceAck = res.config.urgenceAck === true || res.config.urgenceAck === 'true';
      // V2.13.1 — Toggle bouton d'urgence (true par défaut si clé absente)
      if (res.config.urgenceButtonEnabled === false || res.config.urgenceButtonEnabled === 'false') {
        appConfig.urgenceButtonEnabled = false;
      } else {
        appConfig.urgenceButtonEnabled = true;
      }
      appConfig.urgenceButtonDisabledMessage = res.config.urgenceButtonDisabledMessage || appConfig.urgenceButtonDisabledMessage;
      appConfig.loaded = true;
      try { localStorage.setItem('_appConfig', JSON.stringify(appConfig)); } catch(e) {}
      return true;
    }
  } catch (e) {
    console.warn('fetchAppConfig failed:', e);
  }
  // Fallback : lire depuis localStorage si dispo
  try {
    const cached = localStorage.getItem('_appConfig');
    if (cached) {
      const parsed = JSON.parse(cached);
      Object.assign(appConfig, parsed);
      appConfig.loaded = true;
    }
  } catch(e) {}
  return false;
}

// Mettre à jour une clé de config (admin uniquement)
async function setAppConfigValue(key, value) {
  try {
    const res = await cloudCall('setAppConfig', { key, value });
    if (res.ok || res.success) {
      // Mettre à jour le local
      appConfig[key] = value;
      try { localStorage.setItem('_appConfig', JSON.stringify(appConfig)); } catch(e) {}
      return true;
    } else {
      toast('Erreur : ' + (res.error || 'inconnu'), 'error');
      return false;
    }
  } catch (e) {
    toast('Erreur réseau : ' + e.message, 'error');
    return false;
  }
}

// Comparer 2 versions semver-like (ex: "2.11.0" vs "2.10.16")
function compareVersions(a, b) {
  const pa = String(a || '0').split('.').map(n => parseInt(n, 10) || 0);
  const pb = String(b || '0').split('.').map(n => parseInt(n, 10) || 0);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const da = pa[i] || 0;
    const db = pb[i] || 0;
    if (da > db) return 1;
    if (da < db) return -1;
  }
  return 0;
}

// Vérifier si une MAJ est disponible
function isUpdateAvailable() {
  return appConfig.loaded && compareVersions(appConfig.latestVersion, APP_VERSION) > 0;
}

// Forcer le rechargement avec cache vidé
async function forceAppReload() {
  try {
    // 1. Désinscrire le Service Worker
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) await reg.unregister();
    }
    // 2. Vider tous les caches
    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    // 3. Vider sessionStorage et localStorage SAUF auth (sinon déconnexion)
    const authBackup = localStorage.getItem('_auth_token_v210');
    sessionStorage.clear();
    // Note : on ne vide PAS localStorage pour conserver la session
    if (authBackup) localStorage.setItem('_auth_token_v210', authBackup);
  } catch (e) {
    console.warn('forceAppReload cleanup failed:', e);
  }
  // 4. Recharger avec timestamp pour bypass cache HTTP
  const url = new URL(window.location.href);
  url.searchParams.set('_v', Date.now());
  window.location.href = url.toString();
}

// Rendu de la page maintenance (bloquante pour les non-admins)
function renderMaintenanceScreen() {
  // Vérifier si déjà affiché
  if (document.getElementById('maintenance-screen')) return;
  
  const screen = document.createElement('div');
  screen.id = 'maintenance-screen';
  screen.innerHTML = `
    <div class="maintenance-icon">🚧</div>
    <div class="maintenance-title">Maintenance en cours</div>
    <div class="maintenance-message">${escapeHtml(appConfig.maintenanceMessage)}</div>
    <button class="maintenance-retry" id="maint-retry-btn">Réessayer</button>
    <div class="maintenance-info">L'application sera disponible à nouveau dès que la maintenance sera terminée.<br>Version ${APP_VERSION}</div>
  `;
  document.body.appendChild(screen);
  
  document.getElementById('maint-retry-btn').addEventListener('click', async () => {
    const btn = document.getElementById('maint-retry-btn');
    btn.textContent = 'Vérification...';
    btn.disabled = true;
    await fetchAppConfig();
    if (!appConfig.maintenanceMode || (authState.user && authState.user.role === 'admin')) {
      // Sortie de maintenance
      screen.remove();
      window.location.reload();
    } else {
      btn.textContent = 'Toujours en maintenance';
      setTimeout(() => {
        btn.textContent = 'Réessayer';
        btn.disabled = false;
      }, 2000);
    }
  });
}

// Vérifier si on doit afficher la maintenance (bloque les non-admins)
function checkMaintenanceBlock() {
  if (!appConfig.maintenanceMode) {
    // Sortir si on était en maintenance
    const screen = document.getElementById('maintenance-screen');
    if (screen) screen.remove();
    return false;
  }
  // Admin : bypass total
  if (authState.user && authState.user.role === 'admin') {
    return false;
  }
  // Autres : bloquer
  renderMaintenanceScreen();
  return true;
}

// Rendu du bandeau MAJ (en haut de l'app, non bloquant)
function renderUpdateBanner() {
  // Supprimer si déjà présent
  const existing = document.getElementById('update-banner');
  if (existing) existing.remove();
  
  if (!isUpdateAvailable()) return;
  
  // Si forceUpdate → afficher la modal, pas le bandeau
  if (appConfig.forceUpdate) {
    renderUpdateModal();
    return;
  }
  
  // Si déjà dismissed pour cette version, on ne réaffiche pas
  try {
    const dismissed = localStorage.getItem('_updateDismissed');
    if (dismissed === appConfig.latestVersion) return;
  } catch(e) {}
  
  const banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.innerHTML = `
    <div class="update-text">
      🎉 Nouvelle version <span class="update-version">${escapeHtml(appConfig.latestVersion)}</span> disponible !
    </div>
    <button class="update-btn" id="update-btn-now">Mettre à jour</button>
    <button class="update-dismiss" id="update-btn-dismiss" title="Plus tard">×</button>
  `;
  document.body.appendChild(banner);
  
  document.getElementById('update-btn-now').addEventListener('click', async () => {
    const btn = document.getElementById('update-btn-now');
    btn.textContent = 'Mise à jour...';
    btn.disabled = true;
    if (typeof toast === 'function') toast('🔄 Application en cours de mise à jour...', 'info');
    await forceAppReload();
  });
  
  document.getElementById('update-btn-dismiss').addEventListener('click', () => {
    try { localStorage.setItem('_updateDismissed', appConfig.latestVersion); } catch(e) {}
    banner.remove();
  });
}

// Vérifier périodiquement la config app (toutes les 5 min)
let _appConfigPollingStarted = false;
function startAppConfigPolling() {
  // V2.12.1 FIX — Protection contre double démarrage
  if (_appConfigPollingStarted) return;
  _appConfigPollingStarted = true;
  
  // Polling général : maintenance + version (toutes les 5 min, peu critique)
  setInterval(async () => {
    await fetchAppConfig();
    checkMaintenanceBlock();
    if (isUpdateAvailable()) {
      if (appConfig.forceUpdate) {
        renderUpdateModal();
      } else if (!document.getElementById('update-banner')) {
        renderUpdateBanner();
      }
    }
  }, 5 * 60 * 1000); // 5 min
  
  // V2.12.0 — Polling rapide pour urgence (toutes les 15 secondes - critique)
  setInterval(async () => {
    if (!authState.isAuthenticated) return;
    try {
      // Récupération légère uniquement de la config
      const res = await publicCall('getAppConfig', {});
      if (res.ok && res.config) {
        // Mettre à jour uniquement les champs urgence
        appConfig.urgenceActive = res.config.urgenceActive === true || res.config.urgenceActive === 'true';
        appConfig.urgenceDetails = res.config.urgenceDetails || '';
        appConfig.urgenceAck = res.config.urgenceAck === true || res.config.urgenceAck === 'true';
        // V2.13.1 — Toggle bouton SOS
        const prevEnabled = appConfig.urgenceButtonEnabled;
        if (res.config.urgenceButtonEnabled === false || res.config.urgenceButtonEnabled === 'false') {
          appConfig.urgenceButtonEnabled = false;
        } else {
          appConfig.urgenceButtonEnabled = true;
        }
        appConfig.urgenceButtonDisabledMessage = res.config.urgenceButtonDisabledMessage || appConfig.urgenceButtonDisabledMessage;
        // Si l'état a changé, re-render pour mettre à jour bandeau + état du bouton
        if (prevEnabled !== appConfig.urgenceButtonEnabled && typeof render === 'function') {
          render();
        }
        // Mettre à jour les champs astreinte aussi (pour l'auto-update du bandeau)
        appConfig.astreinteTitulaireId = res.config.astreinteTitulaireId || '';
        appConfig.astreinteSuppleantId = res.config.astreinteSuppleantId || '';
        appConfig.astreinteWeekNumber = parseInt(res.config.astreinteWeekNumber, 10) || 0;
        // Vérifier l'urgence
        checkUrgenceActive();
      }
    } catch(e) { /* silent */ }
  }, 8 * 1000); // V2.12.2 - 8 sec (pour respecter max 10 sec demandé)
}

function renderNetworkBadge() {
  const online = networkState.online;
  return `<span class="network-badge ${online ? 'online' : 'offline'}" title="${online ? 'Connecté au serveur' : 'Hors ligne - les modifications seront synchronisées au retour'}">
    <span class="dot"></span>${online ? 'En ligne' : 'Hors ligne'}
  </span>`;
}

function setupNetworkDetection() {
  const updateState = () => {
    const wasOnline = networkState.online;
    networkState.online = navigator.onLine;
    if (wasOnline !== networkState.online) {
      // Changement d'état : toast + re-render
      if (networkState.online) {
        if (typeof toast === 'function') toast('🟢 Connexion rétablie - synchronisation en cours', 'success');
        // Tenter une sync auto
        if (authState.isAuthenticated && typeof cloudPull === 'function') {
          setTimeout(() => cloudPull(false), 500);
        }
      } else {
        if (typeof toast === 'function') toast('🔴 Hors ligne - vos modifications seront sauvegardées localement', 'warning');
      }
      if (typeof render === 'function') render();
    }
  };
  window.addEventListener('online', updateState);
  window.addEventListener('offline', updateState);
}
setupNetworkDetection();

  fileInput.addEventListener('change', async (e) => {

        <button class="btn btn-primary" data-action="ver-publish">📢 Publier</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  
  overlay.addEventListener('click', async (e) => {
    const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;
    
    if (action === 'ver-modal-close' || e.target === overlay) {
      overlay.remove();
      return;
    }
    
    if (action === 'ver-publish') {
      const newVer = overlay.querySelector('#ver-num').value.trim();
      const newMsg = overlay.querySelector('#ver-msg').value.trim();
      const newChangelog = overlay.querySelector('#ver-changelog').value.trim();
      const forceUpd = overlay.querySelector('#ver-force').checked;
      
      if (!newVer || !/^\d+\.\d+(\.\d+)?$/.test(newVer)) {
        toast('Format de version invalide (ex: 2.11.0)', 'error');
        return;
      }
      
      const btn = e.target;
      btn.textContent = '⏳ Publication...';
      btn.disabled = true;
      
      const ok1 = await setAppConfigValue('latestVersion', newVer);
      const ok2 = await setAppConfigValue('updateMessage', newMsg || 'Une nouvelle version est disponible.');
      const ok3 = await setAppConfigValue('changelog', newChangelog);
      const ok4 = await setAppConfigValue('forceUpdate', forceUpd);
      
      if (ok1 && ok2 && ok3 && ok4) {
        toast('📢 Version ' + newVer + ' publiée ! Les users vont être notifiés.', 'success');
        overlay.remove();
        render();
      } else {
        btn.textContent = '📢 Publier';
        btn.disabled = false;
        toast('Erreur lors de la publication', 'error');
      }
    }
  });
}
