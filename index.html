// Vérifier s'il y a une urgence en cours (appelé au polling)
function checkUrgenceActive() {
  if (!appConfig.loaded) return;
  
  const isActive = appConfig.urgenceActive && !appConfig.urgenceAck;
  if (!isActive) {
    // Fermer si elle était affichée
    if (urgenceState.isShowing) urgenceCloseAlertScreen();
    return;
  }
  
  // Parser les détails
  let info = {};
  try { info = typeof appConfig.urgenceDetails === 'string' ? JSON.parse(appConfig.urgenceDetails) : appConfig.urgenceDetails; } catch(e) {}
  
  // V2.12.2 — Vérifier en PRIORITÉ si déjà acquittée localement (évite le retour de l'alerte)
  if (info.id && urgenceState.acknowledgedIds.has(info.id)) return;
  
  // V2.12.2 — Filtrer par DEVICE_ID au lieu de userId
  // Permet à un admin connecté sur 2 appareils de recevoir l'alerte sur l'autre
  if (info.deviceId && info.deviceId === getDeviceId()) return;
  // Fallback ancien : si pas de deviceId dans les anciennes urgences, exclure par userId
  if (!info.deviceId && info.userId && authState.user && info.userId === authState.user.id) return;
  
  // V2.12.1 - Admin, manager ET superviseur reçoivent les alertes
  if (!canReceiveUrgence()) return;
  
  // V2.12.1 - Mode snooze : ignorer les alertes pendant la durée du snooze
  if (urgenceState.snoozeUntil && Date.now() < urgenceState.snoozeUntil) return;
  
  // Afficher !
  urgenceShowAlertScreen(info);
}

// ============================================================================
// V2.12.0 — SUPERVISION TEMPS REEL (detection etape d'une intervention)
// ============================================================================

/**
 * Detecte l'etape actuelle d'une intervention en cours
 * Retourne { step, label, sinceMin, color, emoji } ou null si pas en cours
 */
function detectInterventionStep(d) {
  if (!d || dashboardIsCloture(d)) return null;
  
  const now = Date.now();
  
  // V2.16.3 — Dossiers "À qualifier" (type non défini : ni telephone, ni deplacement)
  // → ils représentent un appel en cours dont l'issue n'est pas encore décidée
  // → affichés en supervision avec un statut distinct
  if (d.type !== 'telephone' && d.type !== 'deplacement') {
    const sinceMs = now - new Date(d.dateAppel).getTime();
    return {
      step: 'to_qualify',
      label: 'À qualifier (appel en cours)',
      sinceMin: Math.round(sinceMs / 60000),
      color: '#f59e0b', // Jaune/orange (cohérent avec le badge À qualifier)
      emoji: '❓',
      nextExpected: 'Choix téléphone ou déplacement',
      warnIfOver: 90,    // Orange à partir de 1h30
      alertIfOver: 180   // Rouge à partir de 3h00
    };
  }
  
  // TELEPHONE en attente de saisie de duree
  if (d.type === 'telephone') {
    if (!d.dureeAppel) {
      const sinceMs = now - new Date(d.dateAppel).getTime();
      return {
        step: 'phone_pending',
        label: 'Appel en cours',
        sinceMin: Math.round(sinceMs / 60000),
        color: '#3b82f6',
        emoji: '📞',
        nextExpected: 'Saisie de la duree d\'appel'
      };
    }
    return null;
  }
  
  if (d.type !== 'deplacement') return null;
  
  // V2.14.5 — Fix : gérer les 2 noms de champs (cloud=finIntervention, local=departSite)
  // Le bug : sur la modale superviseur, les dossiers viennent direct du cloud
  // sans passer par adaptCloudToLocal, donc 'departSite' n'existait pas → l'étape n'était pas détectée
  const departSiteValue = d.finIntervention || d.departSite;
  
  const hasDepart = d.departDomicile && d.departDomicile !== 'X';
  const hasArrivee = d.arriveeSite && d.arriveeSite !== 'X';
  const hasDepartSite = departSiteValue && departSiteValue !== 'X';
  const hasRetour = d.retourDomicile && d.retourDomicile !== 'X';
  
  // V2.14.6 — Cas du chaînage entrant : departDomicile === 'X' signifie que le tech
  // vient d'une intervention précédente (pas qu'il n'est jamais parti).
  // L'étape "Départ domicile" est implicitement franchie.
  const isChainageEntrant = d.departDomicile === 'X';
  const departStarted = hasDepart || isChainageEntrant;
  
  if (hasRetour) return null;
  
  // V2.14.6 — Vérifier les étapes du PLUS AVANCÉ au moins avancé,
  // pour qu'un dossier "arrivé sur site" ne soit pas catégorisé "Appel reçu"
  // juste parce qu'il est en chaînage entrant.
  
  // Étape la plus avancée : Retour en cours (départ site fait, retour pas encore)
  if (hasDepartSite && !hasRetour) {
    const sinceMs = now - new Date(departSiteValue).getTime();
    return {
      step: 'returning',
      label: 'Retour domicile',
      sinceMin: Math.round(sinceMs / 60000),
      color: '#06b6d4',
      emoji: '🏠',
      nextExpected: 'Arrivee a domicile (cloture)'
    };
  }
  
  // Sur site : arrivée cochée, départ site pas encore
  if (hasArrivee && !hasDepartSite) {
    const sinceMs = now - new Date(d.arriveeSite).getTime();
    return {
      step: 'on_site',
      label: 'Sur site',
      sinceMin: Math.round(sinceMs / 60000),
      color: '#22c55e',
      emoji: '🛠',
      nextExpected: 'Depart du site',
      warnIfOver: 90,    // V2.15.5 — Orange à partir de 1h30
      alertIfOver: 180   // Rouge à partir de 3h00
    };
  }
  
  // V2.14.8 — Distinction "Enchaîné en attente" vs "En route (chaînage)"
  // Quand un dossier est en chaînage entrant (departDom=X), il faut savoir si le tech
  // a effectivement pris la route ou s'il est encore sur le site précédent.
  // Signal "tech en route" = pointDepart ≠ 'domicile' ET km > 0
  // (le tech a sélectionné un point de départ et cliqué "Calculer")
  const hasRouteSignal = (
    d.pointDepart && 
    d.pointDepart !== 'domicile' && 
    d.pointDepart !== '' &&
    safeKm(d.km) > 0
  );
  
  // Cas spécial : chaînage entrant SANS signal de mise en route
  // = le tech a créé le dossier mais n'a pas encore quitté le site précédent
  if (isChainageEntrant && !hasArrivee && !hasDepartSite && !hasRouteSignal) {
    const sinceMs = now - new Date(d.dateAppel).getTime();
    return {
      step: 'chained_waiting',
      label: 'Enchaîné en attente',
      sinceMin: Math.round(sinceMs / 60000),
      color: '#a855f7',
      emoji: '📋',
      nextExpected: 'Depart vers le site (calculer km)'
    };
  }
  
  // En route : départ fait (ou chaînage entrant avec signal de route), arrivée pas encore
  if (departStarted && !hasArrivee && !hasDepartSite) {
    // Si chaînage entrant, on n'a pas d'heure de départ domicile pour calculer depuis quand
    // → on utilise la dateAppel comme fallback (= "depuis l'appel")
    const refTime = hasDepart ? new Date(d.departDomicile).getTime() : new Date(d.dateAppel).getTime();
    const sinceMs = now - refTime;
    return {
      step: 'en_route',
      label: isChainageEntrant ? 'En route (chaînage)' : 'En route',
      sinceMin: Math.round(sinceMs / 60000),
      color: '#f97316',
      emoji: '🚗',
      nextExpected: 'Arrivee sur site'
    };
  }
  
  // Appel reçu : aucune étape démarrée (et pas de chaînage entrant)
  if (!departStarted) {
    const sinceMs = now - new Date(d.dateAppel).getTime();
    return {
      step: 'received',
      label: 'Appel recu',
      sinceMin: Math.round(sinceMs / 60000),
      color: '#eab308',
      emoji: '⏳',
      nextExpected: 'Depart du domicile',
      warnIfOver: 90,    // V2.15.5 — Orange à partir de 1h30 (au lieu de rouge direct à 30 min)
      alertIfOver: 180   // V2.15.5 — Rouge à partir de 3h00 (SLA 4h, donc 1h de marge restante)
    };
  }
  
  // Cas étape manquante (départ + departSite sans arrivée)
  if (departStarted && !hasArrivee && hasDepartSite) {
    const sinceMs = now - new Date(departSiteValue).getTime();
    return {
      step: 'missing_step',
      label: 'Etape manquante',
      sinceMin: Math.round(sinceMs / 60000),
      color: '#a855f7',
      emoji: '⚠️',
      nextExpected: 'Pense a completer l\'arrivee sur site pour la tracabilite'
    };
  }
  
  return null;
}

/**
 * Recupere toutes les interventions en cours pour la semaine actuelle + dossiers en retard
 */
function getInProgressInterventions() {
  const week = getAstreinteWeek(new Date());
  return dashboardState.allDossiers
    .filter(d => {
      if (!d || d.deleted) return false;
      if (dashboardIsCloture(d)) return false;
      const dt = new Date(d.dateAppel);
      return dt < week.end;
    })
    .map(d => ({ dossier: d, step: detectInterventionStep(d) }))
    .filter(x => x.step !== null)
    .sort((a, b) => new Date(a.dossier.dateAppel) - new Date(b.dossier.dateAppel));
}

/**
 * Formatte un temps relatif en francais lisible
 */
function fmtRelativeTime(minutes) {
  if (minutes < 1) return 'a l\'instant';
  if (minutes < 60) return `${minutes} min`;
  const hours = Math.floor(minutes / 60);
  const mins = minutes % 60;
  if (hours < 24) return mins > 0 ? `${hours}h${String(mins).padStart(2, '0')}` : `${hours}h`;
  const days = Math.floor(hours / 24);
  const remHours = hours % 24;
  return remHours > 0 ? `${days}j ${remHours}h` : `${days}j`;
}

/**
 * V2.13.4 — Détecte si on est actuellement en période d'astreinte (hors heures bureau)
 * Bureau : Lun-Jeu 9h-18h, Ven 9h-17h. Reste = astreinte (week-end, soirs, nuits).
 * Retourne un objet avec { isAstreinte: bool, label: string, color: string, bg: string, nextChange: Date }
 */
function getCurrentAstreintePeriod() {
  const now = new Date();
  const day = now.getDay(); // 0=dim, 1=lun, ..., 6=sam
  const h = now.getHours() + now.getMinutes() / 60;
  
  let isAstreinte = false;
  if (day === 0 || day === 6) {
    // Week-end : toujours astreinte
    isAstreinte = true;
  } else if (day >= 1 && day <= 4) {
    // Lun-Jeu : bureau 9h-18h
    isAstreinte = !(h >= 9 && h < 18);
  } else if (day === 5) {
    // Vendredi : bureau 9h-17h
    isAstreinte = !(h >= 9 && h < 17);
  }
  
  return isAstreinte
    ? { isAstreinte: true, label: 'Période d\'astreinte', icon: '🌙', color: '#a855f7', bg: 'rgba(168,85,247,0.12)', border: 'rgba(168,85,247,0.4)' }
    : { isAstreinte: false, label: 'Heures de bureau', icon: '☀️', color: '#3b82f6', bg: 'rgba(59,130,246,0.10)', border: 'rgba(59,130,246,0.35)' };
}

/**
 * Detecte si un dossier fait partie d'un chainage (X) - position/total
 */
function detectChainage(dossier, allDossiers) {
  if (!dossier || dossier.type !== 'deplacement') return null;
  if (dossier.departDomicile !== 'X' && dossier.retourDomicile !== 'X') return null;
  
  const userId = dossier.user_id;
  const dossierDate = new Date(dossier.dateAppel).getTime();
  const dayStart = dossierDate - 24 * 3600 * 1000;
  
  const chain = allDossiers
    .filter(d => 
      d.user_id === userId && 
      d.type === 'deplacement' &&
      new Date(d.dateAppel).getTime() >= dayStart &&
      new Date(d.dateAppel).getTime() <= dossierDate + 24 * 3600 * 1000
    )
    .sort((a, b) => new Date(a.dateAppel) - new Date(b.dateAppel));
  
  if (chain.length < 2) return null;
  
  let currentChain = [];
  let foundChain = null;
  for (const d of chain) {
    currentChain.push(d);
    if (d.retourDomicile && d.retourDomicile !== 'X') {
      if (currentChain.some(x => x.id === dossier.id) && currentChain.length > 1) {
        foundChain = currentChain;
        break;
      }
      currentChain = [];
    }
  }
  if (!foundChain && currentChain.some(x => x.id === dossier.id) && currentChain.length > 1) {
    foundChain = currentChain;
  }
  
  if (!foundChain || foundChain.length < 2) return null;
  const position = foundChain.findIndex(x => x.id === dossier.id) + 1;
  return { position, total: foundChain.length };
}

// V2.11.3 — Helper safeDiff (idem renderStats : gère minuit + dates erronées)
function dashboardSafeDiff(start, end) {
  if (!start || !end) return 0;
  const startDate = new Date(start);
  const endDate = new Date(end);
  let ms = endDate - startDate;
  if (ms < 0) {
    const startMin = startDate.getHours() * 60 + startDate.getMinutes();
    const endMin = endDate.getHours() * 60 + endDate.getMinutes();
    let diffMin = endMin - startMin;
    if (diffMin < 0) diffMin += 24 * 60;
    ms = diffMin * 60 * 1000;
  }
  if (ms > 24 * 3600 * 1000) {
    const startMin = startDate.getHours() * 60 + startDate.getMinutes();
    const endMin = endDate.getHours() * 60 + endDate.getMinutes();
    let diffMin = endMin - startMin;
    if (diffMin < 0) diffMin += 24 * 60;
    ms = diffMin * 60 * 1000;
  }
  return Math.round(ms / 60000); // en minutes
}

// V2.11.3 — Minutes d'un seul dossier (utilisé pour les alertes, pas pour les totaux)
// NOTE : pour les totaux par tech, utilise dashboardTechMinutes() qui gère les groupes
function dashboardDossierMinutes(d) {
  // TÉLÉPHONE
  if (d.type === 'telephone') {
    if (d.dureeAppel) {
      const s = String(d.dureeAppel);
      let match = s.match(/(\d+)h(\d+)?/i);
      if (match) return parseInt(match[1], 10) * 60 + (parseInt(match[2], 10) || 0);
      match = s.match(/(\d+)\s*min/i);
      if (match) return parseInt(match[1], 10);
      const num = parseInt(s, 10);
      if (!isNaN(num) && num > 0 && num < 600) return num;
    }
    return 0;
  }
  // DÉPLACEMENT — uniquement si départ/retour complets et non-X
  if (d.type === 'deplacement') {
    if (d.departDomicile && d.departDomicile !== 'X' && 
        d.retourDomicile && d.retourDomicile !== 'X') {
      return dashboardSafeDiff(d.departDomicile, d.retourDomicile);
    }
  }
  return 0;
}

// V2.11.3 — Total minutes pour un ENSEMBLE de dossiers (gestion des groupes de chaînage X)
function dashboardTechMinutes(dossiers) {
  let totalMinutes = 0;
  
  // 1. Téléphones : addition simple
  dossiers.filter(d => d.type === 'telephone').forEach(d => {
    if (d.dureeAppel) {
      const s = String(d.dureeAppel);
      const match = s.match(/(\d+)h(\d+)?/i);
      if (match) totalMinutes += parseInt(match[1], 10) * 60 + (parseInt(match[2], 10) || 0);
    }
  });
  
  // 2. Déplacements : groupes de chaînage (X = continuation)
  const deplacements = dossiers.filter(d => d.type === 'deplacement')
    .sort((a, b) => new Date(a.dateAppel) - new Date(b.dateAppel));
  
  let currentGroup = null;
  const groups = [];
  
  for (const d of deplacements) {
    if (d.departDomicile && d.departDomicile !== 'X') {
      // Nouveau groupe
      if (currentGroup) groups.push(currentGroup);
      currentGroup = { firstDepart: d.departDomicile, lastRetour: null };
    } else if (d.departDomicile === 'X' && currentGroup) {
      // Continuation, on garde le groupe actif
    }
    
    if (d.retourDomicile && d.retourDomicile !== 'X' && currentGroup) {
      currentGroup.lastRetour = d.retourDomicile;
      groups.push(currentGroup);
      currentGroup = null;
    }
  }
  if (currentGroup) groups.push(currentGroup);
  
  for (const g of groups) {
    if (g.firstDepart && g.lastRetour) {
      totalMinutes += dashboardSafeDiff(g.firstDepart, g.lastRetour);
    }
  }
  
  return totalMinutes;
}

// Formater minutes en "Xh YYm"
function dashboardFmtMinutes(min) {
  if (!min || min === 0) return '0h00';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h}h${String(m).padStart(2, '0')}`;
}

// V2.12.0 — Carte individuelle d'une intervention en cours
// V2.15.5 — Ajout du niveau "warning" (orange) en plus d'"alert" (rouge)
function renderInterventionCard(d, step) {
  const techName = dashboardGetUsername(d);
  
  // V2.15.5 — 3 niveaux d'alerte
  // - isAlert  = rouge (sinceMin >= alertIfOver)
  // - isWarn   = orange (sinceMin >= warnIfOver mais pas alertIfOver)
  // - sinon    = normal (couleur de l'étape)
  const isAlert = step.alertIfOver && step.sinceMin >= step.alertIfOver;
  const isWarn = !isAlert && step.warnIfOver && step.sinceMin >= step.warnIfOver;
  
  let cardBg, cardBorder, badge;
  if (isAlert) {
    cardBg = 'rgba(239,68,68,0.15)';     // Rouge
    cardBorder = 'rgba(239,68,68,0.5)';
    badge = '<span style="background:#ef4444;color:white;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:800;letter-spacing:0.5px">⚠️ ALERTE</span>';
  } else if (isWarn) {
    cardBg = 'rgba(249,115,22,0.12)';    // Orange
    cardBorder = 'rgba(249,115,22,0.5)';
    badge = '<span style="background:#f97316;color:white;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:800;letter-spacing:0.5px">⚠ ATTENTION</span>';
  } else {
    cardBg = 'rgba(255,255,255,0.04)';   // Normal
    cardBorder = 'var(--border)';
    badge = '';
  }
  
  // Detection chainage
  const chainInfo = detectChainage(d, dashboardState.allDossiers);
  
  // URL Google Maps si adresse
  const address = d.adresseSite || '';
  const mapsUrl = address 
    ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`
    : null;
  
  return `
    <div style="background:${cardBg};border:1px solid ${cardBorder};border-radius:10px;padding:11px 12px">
      <!-- En-tete : tech + statut + temps -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
          <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,${step.color},${step.color});color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">
            ${escapeHtml(techName.substring(0,1).toUpperCase())}
          </div>
          <div style="min-width:0;flex:1">
            <div style="font-weight:700;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(techName)}</div>
            <div style="font-size:11px;color:${step.color};font-weight:600;display:flex;align-items:center;gap:4px">
              <span>${step.emoji}</span>
              <span>${escapeHtml(step.label)}</span>
              <span style="color:var(--text-tertiary);font-weight:400">- depuis ${fmtRelativeTime(step.sinceMin)}</span>
            </div>
          </div>
        </div>
        ${badge}
      </div>
      
      <!-- Etablissement + motif -->
      <div style="margin-bottom:8px">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px">${escapeHtml(d.etablissement || 'Sans nom')}</div>
        ${d.motif ? `<div style="font-size:11px;color:var(--text-tertiary);line-height:1.4">${escapeHtml(d.motif.substring(0, 120))}${d.motif.length > 120 ? '...' : ''}</div>` : ''}
        ${chainInfo ? `<div style="font-size:10px;color:#a855f7;font-weight:600;margin-top:4px">🔗 Dossier ${chainInfo.position}/${chainInfo.total} en chainage</div>` : ''}
      </div>
      
      <!-- Prochaine etape attendue -->
      ${step.nextExpected ? `
        <div style="font-size:10px;color:var(--text-tertiary);background:var(--bg-subtle);padding:6px 8px;border-radius:6px;margin-bottom:8px">
          → ${escapeHtml(step.nextExpected)}
        </div>
      ` : ''}
      
      <!-- Boutons d'action -->
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button data-action="dashboard-view-dossier" data-id="${d.id}" style="flex:1;min-width:0;background:var(--bg-subtle);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600">
          📋 Voir le dossier
        </button>
        ${mapsUrl ? `
          <a href="${mapsUrl}" target="_blank" rel="noopener" style="background:var(--bg-subtle);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:11px;text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:4px">
            🗺️ Maps
          </a>
        ` : ''}
      </div>
    </div>
  `;
}

// Options communes (axes, tooltip, légende) avec thème dynamique
function buildCommonChartOptions(theme) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: {
      mode: 'index',
      intersect: false
    },
    plugins: {
      legend: {
        labels: {
          color: theme.text,
          font: { size: 11 },
          boxWidth: 14,
          padding: 10
        }
      },
      tooltip: {
        backgroundColor: theme.isDark ? 'rgba(15,23,42,0.95)' : 'rgba(255,255,255,0.98)',
        titleColor: theme.text,
        bodyColor: theme.text,
        borderColor: theme.border,
        borderWidth: 1,
        padding: 10,
        cornerRadius: 6,
        titleFont: { size: 12, weight: '600' },
        bodyFont: { size: 12 }
      }
    },
    scales: {
      x: {
        ticks: { color: theme.textTertiary, font: { size: 10 } },
        grid: { color: theme.grid }
      },
      y: {
        ticks: { color: theme.textTertiary, font: { size: 10 }, precision: 0 },
        grid: { color: theme.grid },
        beginAtZero: true
      }
    }
  };
}

// a) Évolution mensuelle
async function renderChartEvolutionMensuelle(dossiers) {
  const canvas = document.getElementById('chart-evolution-mensuelle');
  if (!canvas) return;
  try {
    const Chart = await loadChartJs();
    const theme = getChartTheme();
    const data = buildDatasetEvolutionMensuelle(dossiers);
    const opts = buildCommonChartOptions(theme);
    const instance = new Chart(canvas, {
      type: 'line',
      data: {
        labels: data.labels,
        datasets: [{
          label: 'Interventions / mois',
          data: data.counts,
          borderColor: theme.primary,
          backgroundColor: theme.primaryFill,
          borderWidth: 2,
          tension: 0.3,
          fill: true,
          pointRadius: 3,
          pointHoverRadius: 5,
          pointBackgroundColor: theme.primary
        }]
      },
      options: opts
    });
    registerChart('chart-evolution-mensuelle', instance);
  } catch(e) { console.warn('chart-evolution-mensuelle:', e.message); }
}

      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${pill(f.statut === 'all', 'dashboard-set-statut', 'data-statut="all"', 'Tous')}
        ${pill(f.statut === 'en-cours', 'dashboard-set-statut', 'data-statut="en-cours"', '⏳ En cours')}
        ${pill(f.statut === 'clotures', 'dashboard-set-statut', 'data-statut="clotures"', '✓ Clôturés')}
        ${pill(f.statut === 'non-recupere-erp', 'dashboard-set-statut', 'data-statut="non-recupere-erp"', '⚠ Non récupéré ERP')}
      </div>
    </div>
  `;
  
  // Checkbox astreinte uniquement
  const astreinteHtml = `
    <div style="margin-bottom:4px">
      <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--text)">
        <input type="checkbox" id="adv-astreinte-only" data-action="dashboard-toggle-astreinte-only" ${f.astreinteOnly ? 'checked' : ''} 
               style="width:16px;height:16px;cursor:pointer">
        <span>🌙 Astreinte uniquement (hors heures bureau)</span>
      </label>
      <div style="font-size:10px;color:var(--text-tertiary);margin-top:3px;margin-left:24px;line-height:1.4">
        Bureau : Lun-Jeu 9h-18h, Ven 9h-17h. Le reste est considéré comme astreinte.
      </div>
    </div>
  `;
  
  return `
    ${headerBtn}
    <div style="margin:0 10px 14px 10px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:10px">
      ${periodHtml}
      ${techsHtml}
      ${typeHtml}
      ${statutHtml}
      ${astreinteHtml}
    </div>
  `;
}

// Tab 1 : Vue d'ensemble (qui est d'astreinte + alertes)
function renderDashboardOverview() {
  // V2.13.2 — Si un filtre période est actif, on ignore le sélecteur de semaine et on filtre globalement
  const hasPeriodFilter = dashboardState.advFilters.period && dashboardState.advFilters.period !== 'all';
  const nbActiveFilters = countActiveAdvFilters();
  
  let weekDossiers;
  if (hasPeriodFilter) {
    // Filtre période → on part de tous les dossiers et on filtre via applyDashboardAdvFilters
    weekDossiers = applyDashboardAdvFilters(dashboardState.allDossiers);
  } else {
    // Pas de filtre période → comportement classique : semaine d'astreinte selon weekOffset
    weekDossiers = dashboardGetWeekDossiers(dashboardState.weekOffset);
    // Mais on applique quand même les autres filtres (techs / type / statut / astreinteOnly)
    if (nbActiveFilters > 0) {
      weekDossiers = applyDashboardAdvFilters(weekDossiers);
    }
  }
  
  const week = getAstreinteWeek(new Date(Date.now() + dashboardState.weekOffset * 7 * 86400000));
  const weekNum = getWeekNumber(week.start);
  
  // Grouper par tech (V2.11.3 — pas de cumul ligne par ligne, calcul par groupes ensuite)
  const byTech = {};
  weekDossiers.forEach(d => {
    const username = dashboardGetUsername(d);
    if (!byTech[username]) {
      byTech[username] = { dossiers: [], totalMinutes: 0, totalKm: 0, clotures: 0, enCours: 0 };
    }
    byTech[username].dossiers.push(d);
    byTech[username].totalKm += parseFloat(d.distance) || parseFloat(d.km) || 0;
    if (dashboardIsCloture(d)) byTech[username].clotures++;
    else byTech[username].enCours++;
  });
  // V2.11.3 — Recalcul des minutes en groupes pour chaque tech
  Object.keys(byTech).forEach(u => {
    byTech[u].totalMinutes = dashboardTechMinutes(byTech[u].dossiers);
  });
  
  // Détecter les alertes : dossiers > 24h non clôturés
  const now = new Date();
  const alertes = weekDossiers.filter(d => {
    if (dashboardIsCloture(d)) return false;
    const dt = new Date(d.dateAppel);
    return (now - dt) > 24 * 3600 * 1000;
  });
  
  // Compteur global
  const totalDossiers = weekDossiers.length;
  const totalClotures = weekDossiers.filter(d => dashboardIsCloture(d)).length;
  const totalEnCours = totalDossiers - totalClotures;
  const totalMinutes = Object.values(byTech).reduce((s, t) => s + t.totalMinutes, 0);
  const totalKm = Object.values(byTech).reduce((s, t) => s + t.totalKm, 0);
  
  return `
    <div style="padding:0 12px 80px">
      <!-- Sélecteur semaine (désactivé quand un filtre période est actif) -->
      ${hasPeriodFilter ? `
        <div class="week-banner" style="margin-bottom:14px;opacity:0.85">
          <div class="week-info">
            <div class="week-label">🔧 Filtre période actif</div>
            <div class="week-dates">${escapeHtml(periodLabel())} • ${weekDossiers.length} dossier${weekDossiers.length > 1 ? 's' : ''}</div>
          </div>
          <div style="font-size:10px;color:var(--text-tertiary);text-align:right;line-height:1.4">
            Sélecteur de semaine<br>désactivé
          </div>
        </div>
      ` : `
        <div class="week-banner" style="margin-bottom:14px">
          <div class="week-info">
            <div class="week-label">Semaine n°${weekNum}${dashboardState.weekOffset === 0 ? ' (actuelle)' : dashboardState.weekOffset === -1 ? ' (précédente)' : ''}</div>
            <div class="week-dates">${fmtDateShort(week.start)} 09h → ${fmtDateShort(week.end)} 09h</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="icon-btn" data-action="dashboard-prev-week">‹</button>
            <button class="icon-btn" data-action="dashboard-next-week" ${dashboardState.weekOffset >= 0 ? 'disabled style="opacity:0.3"' : ''}>›</button>
          </div>
        </div>
      `}
      
      <!-- KPIs globaux -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
        <div class="astreinte-stat">
          <div class="astreinte-stat-value">${totalDossiers}</div>
          <div class="astreinte-stat-label">Dossiers</div>
        </div>
        <div class="astreinte-stat" style="background:rgba(34,197,94,0.06)">
          <div class="astreinte-stat-value" style="color:#22c55e">${totalClotures}</div>
          <div class="astreinte-stat-label">Clôturés</div>
        </div>
        <div class="astreinte-stat" style="background:rgba(234,179,8,0.06)">
          <div class="astreinte-stat-value" style="color:#eab308">${totalEnCours}</div>
          <div class="astreinte-stat-label">En cours</div>
        </div>
        <div class="astreinte-stat">
          <div class="astreinte-stat-value">${dashboardFmtMinutes(totalMinutes)}</div>
          <div class="astreinte-stat-label">Travail</div>
        </div>
      </div>
      
      <!-- V2.11.1 — Bouton créer un dossier pour un tech -->
      <button class="btn btn-primary" data-action="dashboard-create-for-tech" style="width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;margin-bottom:14px;background:linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);color:white;border:none;box-shadow:0 4px 12px rgba(37,99,235,0.3)">
        ➕ Créer un dossier pour un technicien
      </button>
      
      <!-- V2.12.0 — Supervision temps réel -->
      ${dashboardState.weekOffset === 0 ? renderRealTimeMonitoring() : ''}
      
      <!-- V2.12.1 — Timeline 24h -->
      ${dashboardState.weekOffset === 0 ? renderTimeline24h() : ''}
      
      <!-- Alertes -->
      ${alertes.length > 0 ? `
        <div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.4);border-radius:10px;padding:14px;margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;color:#ef4444;font-weight:700;font-size:13px">
            ⚠️ ${alertes.length} dossier${alertes.length > 1 ? 's' : ''} non clôturé${alertes.length > 1 ? 's' : ''} depuis +24h
          </div>
          ${alertes.slice(0, 5).map(d => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;margin-bottom:6px;font-size:12px">
              <div>
                <strong>${escapeHtml(d.etablissement || 'Sans nom')}</strong> — ${escapeHtml(dashboardGetUsername(d))}
                <div style="color:var(--text-tertiary);font-size:11px;margin-top:2px">
                  ${fmtDateShort(new Date(d.dateAppel))} ${new Date(d.dateAppel).toTimeString().slice(0,5)}
                </div>
              </div>
              <button class="btn btn-secondary" data-action="dashboard-view-dossier" data-id="${d.id}" style="padding:6px 12px;font-size:11px">Voir</button>
            </div>
          `).join('')}
          ${alertes.length > 5 ? `<div style="font-size:11px;color:var(--text-tertiary);margin-top:6px;text-align:center">+${alertes.length - 5} autres...</div>` : ''}
        </div>
      ` : ''}
      
      <!-- Liste des techs -->
      <div class="settings-section-title" style="margin:10px 0">Équipe — ${Object.keys(byTech).length} technicien${Object.keys(byTech).length > 1 ? 's' : ''} actif${Object.keys(byTech).length > 1 ? 's' : ''}</div>
      
      ${Object.keys(byTech).length === 0 ? `
        <div style="text-align:center;padding:40px 20px;color:var(--text-tertiary);font-size:13px">
          📭 Aucune activité cette semaine
        </div>
      ` : Object.entries(byTech).sort((a, b) => b[1].dossiers.length - a[1].dossiers.length).map(([username, data]) => `
        <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="font-weight:700;font-size:14px">👤 ${escapeHtml(username)}</div>
            <div style="display:flex;gap:6px">
              ${data.enCours > 0 ? `<span style="background:rgba(234,179,8,0.15);color:#eab308;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">${data.enCours} en cours</span>` : ''}
              ${data.clotures > 0 ? `<span style="background:rgba(34,197,94,0.15);color:#22c55e;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">${data.clotures} clôturés</span>` : ''}
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:11px">
            <div style="text-align:center"><div style="font-weight:700;font-size:14px;color:var(--accent)">${data.dossiers.length}</div><div style="color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.3px">Dossiers</div></div>
            <div style="text-align:center"><div style="font-weight:700;font-size:14px;color:var(--accent)">${dashboardFmtMinutes(data.totalMinutes)}</div><div style="color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.3px">Heures</div></div>
            <div style="text-align:center"><div style="font-weight:700;font-size:14px;color:var(--accent)">${data.totalKm.toFixed(0)} km</div><div style="color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.3px">Distance</div></div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// Tab 2 : Statistiques équipe
function renderDashboardStats() {
  // V2.13.2 — Si un filtre période est actif, on utilise applyDashboardAdvFilters
  // Sinon on garde le comportement classique (30 derniers jours) + autres filtres si actifs
  const hasPeriodFilter = dashboardState.advFilters.period && dashboardState.advFilters.period !== 'all';
  const nbActiveFilters = countActiveAdvFilters();
  
  let dossiers30;
  let periodHeaderLabel = '30 derniers jours';
  
  if (hasPeriodFilter) {
    dossiers30 = applyDashboardAdvFilters(dashboardState.allDossiers);
    periodHeaderLabel = periodLabel();
  } else {
    // Comportement classique : 30 derniers jours
    const now = new Date();
    const limit30 = new Date(now.getTime() - 30 * 86400000);
    dossiers30 = dashboardState.allDossiers.filter(d => new Date(d.dateAppel) >= limit30);
    // Mais on applique quand même les autres filtres si actifs
    if (nbActiveFilters > 0) {
      dossiers30 = applyDashboardAdvFilters(dossiers30);
    }
  }
  
  // Top établissements
  const sitesMap = {};
  dossiers30.forEach(d => {
    const site = d.etablissement || 'Inconnu';
    sitesMap[site] = (sitesMap[site] || 0) + 1;
  });
  const topSites = Object.entries(sitesMap).sort((a, b) => b[1] - a[1]).slice(0, 10);
  
  // Répartition téléphone / déplacement (V2.11.3 — fix type 'telephone')
  const totalPhone = dossiers30.filter(d => d.type === 'telephone').length;
  const totalDep = dossiers30.filter(d => d.type === 'deplacement').length;
  const pctPhone = dossiers30.length > 0 ? Math.round(totalPhone * 100 / dossiers30.length) : 0;
  const pctDep = 100 - pctPhone;
  
  // Total km
  let totalKm = 0;
  dossiers30.forEach(d => {
    totalKm += parseFloat(d.distance) || parseFloat(d.km) || 0;
  });
  
  // Comparatif techniciens (V2.11.3 — calcul par groupes)
  const techDossiers = {};
  dossiers30.forEach(d => {
    const u = dashboardGetUsername(d);
    if (!techDossiers[u]) techDossiers[u] = [];
    techDossiers[u].push(d);
  });
  
  const techMap = {};
  Object.entries(techDossiers).forEach(([u, dList]) => {
    techMap[u] = {
      dossiers: dList.length,
      minutes: dashboardTechMinutes(dList),
      km: dList.reduce((s, d) => s + (parseFloat(d.distance) || parseFloat(d.km) || 0), 0)
    };
  });
  const techRanking = Object.entries(techMap).sort((a, b) => b[1].dossiers - a[1].dossiers);
  
  // Total minutes global (somme des techs avec leur calcul par groupe)
  const totalMinutes = Object.values(techMap).reduce((s, t) => s + t.minutes, 0);
  
  return `
    <div style="padding:0 12px 80px">
      <div style="text-align:center;padding:10px;background:var(--bg-subtle);border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--text-tertiary)">
        📅 Statistiques sur <strong style="color:var(--text)">${escapeHtml(periodHeaderLabel)}</strong>${nbActiveFilters > 1 ? ` <span style="color:#3b82f6">(${nbActiveFilters - (hasPeriodFilter ? 1 : 0)} autre${nbActiveFilters - (hasPeriodFilter ? 1 : 0) > 1 ? 's' : ''} filtre${nbActiveFilters - (hasPeriodFilter ? 1 : 0) > 1 ? 's' : ''} actif${nbActiveFilters - (hasPeriodFilter ? 1 : 0) > 1 ? 's' : ''})</span>` : ''}
      </div>
      
      <!-- KPIs principaux -->
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px">
        <div class="astreinte-stat" style="padding:14px"><div class="astreinte-stat-value">${dossiers30.length}</div><div class="astreinte-stat-label">Dossiers</div></div>
        <div class="astreinte-stat" style="padding:14px"><div class="astreinte-stat-value">${dashboardFmtMinutes(totalMinutes)}</div><div class="astreinte-stat-label">Travail total</div></div>
        <div class="astreinte-stat" style="padding:14px"><div class="astreinte-stat-value">${totalKm.toFixed(0)} km</div><div class="astreinte-stat-label">Distance</div></div>
        <div class="astreinte-stat" style="padding:14px"><div class="astreinte-stat-value">${Object.keys(techMap).length}</div><div class="astreinte-stat-label">Techniciens</div></div>
      </div>
      
      <!-- Répartition phone vs déplacement -->
      <div class="settings-section-title">📞 Répartition des interventions</div>
      <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">
        <div style="display:flex;height:36px;border-radius:8px;overflow:hidden;margin-bottom:10px">
          <div style="background:#3b82f6;flex:${pctPhone};display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px">${pctPhone > 10 ? `📞 ${pctPhone}%` : ''}</div>
          <div style="background:#22c55e;flex:${pctDep};display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px">${pctDep > 10 ? `🚗 ${pctDep}%` : ''}</div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px">
          <span style="color:#3b82f6">📞 Téléphone : <strong>${totalPhone}</strong></span>
          <span style="color:#22c55e">🚗 Déplacement : <strong>${totalDep}</strong></span>
        </div>
      </div>
      
      <!-- Top sites -->
      <div class="settings-section-title">🏆 Top 10 établissements</div>
      <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:14px">
        ${topSites.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text-tertiary);font-size:12px">Aucune donnée</div>' : topSites.map(([site, count], i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-bottom:${i < topSites.length - 1 ? '1px solid var(--border)' : 'none'}">
            <div style="display:flex;align-items:center;gap:10px;min-width:0">
              <div style="font-weight:700;color:var(--text-tertiary);width:24px;text-align:right">${i + 1}.</div>
              <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(site)}</div>
            </div>
            <div style="font-size:12px;color:var(--accent);font-weight:700;white-space:nowrap;margin-left:10px">${count} dossier${count > 1 ? 's' : ''}</div>
          </div>
        `).join('')}
      </div>
      
      <!-- Comparatif techniciens -->
      <div class="settings-section-title">👥 Comparatif équipe</div>
      <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:14px">
        ${techRanking.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text-tertiary);font-size:12px">Aucune donnée</div>' : techRanking.map(([username, data], i) => {
          const maxDossiers = techRanking[0][1].dossiers;
          const pct = (data.dossiers / maxDossiers) * 100;
          return `
            <div style="padding:8px 6px;border-bottom:${i < techRanking.length - 1 ? '1px solid var(--border)' : 'none'}">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <div style="font-size:13px;font-weight:600">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : ''}  ${escapeHtml(username)}</div>
                <div style="font-size:11px;color:var(--text-tertiary)">
                  ${data.dossiers} doss. • ${dashboardFmtMinutes(data.minutes)} • ${data.km.toFixed(0)}km
                </div>
              </div>
              <div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#2563eb,#1d4ed8);border-radius:3px"></div>
              </div>
            </div>

        }).join('')}
      </div>
      
      <!-- V2.13.3 — Section Graphiques -->
      <div class="settings-section-title">📊 Graphiques</div>
      <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:14px">
        <!-- Évolution mensuelle -->
        <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
          <div style="font-size:12px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px">📈 Évolution mensuelle</div>
          <div style="position:relative;height:240px">
            <canvas id="chart-evolution-mensuelle"></canvas>
          </div>
        </div>
        
        <!-- Activité par jour de la semaine -->
        <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
          <div style="font-size:12px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px">📊 Activité par jour de la semaine</div>
          <div style="position:relative;height:220px">
            <canvas id="chart-jour-semaine"></canvas>
          </div>
        </div>
        
        <!-- Activité par heure -->
        <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
          <div style="font-size:12px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px">🕐 Activité par heure de la journée</div>
          <div style="position:relative;height:220px">
            <canvas id="chart-par-heure"></canvas>
          </div>
        </div>
        
        <!-- Charge par technicien -->
        <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
          <div style="font-size:12px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px">👥 Charge par technicien</div>
          <div style="position:relative;height:${Math.max(180, techRanking.length * 32 + 60)}px">
            <canvas id="chart-charge-tech"></canvas>
          </div>
        </div>
      </div>
    </div>
    ${(() => { renderAllStatsCharts(dossiers30); return ''; })()}
  `;
}

// Tab 3 : Validation rapide des semaines
function renderDashboardValidation() {
  // Pour chaque tech, calculer le statut de la dernière semaine (-1)
  const week = getAstreinteWeek(new Date(Date.now() - 7 * 86400000));
  const weekNum = getWeekNumber(week.start);
  const weekDossiers = dashboardState.allDossiers.filter(d => {
    const dt = new Date(d.dateAppel);
    return dt >= week.start && dt < week.end;
  });
  
  const byTech = {};
  weekDossiers.forEach(d => {
    const u = dashboardGetUsername(d);
    if (!byTech[u]) byTech[u] = { dossiers: [], clotures: 0, enCours: 0, validated: false };
    byTech[u].dossiers.push(d);
    if (dashboardIsCloture(d)) byTech[u].clotures++;
    else byTech[u].enCours++;
  });
  
  // Lire le statut de validation depuis les settings appConfig (à terme : un endpoint dédié)
  // Pour l'instant, on simule via localStorage
  Object.keys(byTech).forEach(u => {
    try {
      const validated = localStorage.getItem(`_validated_${u}_${weekNum}`);
      byTech[u].validated = validated === 'true';
    } catch(e) {}
  });
  
  return `

// ── Historique urgences V2.13.0 ────────────────────────────────
let urgencesLogState = {
  list: [],
  loaded: false,
  loading: false,
  error: null
};

async function loadUrgencesLog() {
  if (urgencesLogState.loading) return;
  urgencesLogState.loading = true;
  urgencesLogState.error = null;
  try {
    const res = await cloudCall('getUrgencesLog', {});
    if (res && (res.success || res.ok)) {
      urgencesLogState.list = res.urgences || [];
      urgencesLogState.loaded = true;
    } else {
      urgencesLogState.error = (res && res.error) || 'Erreur inconnue';
    }
  } catch(e) {
    urgencesLogState.error = e.message;
  } finally {
    urgencesLogState.loading = false;
    if (typeof render === 'function') render();
  }
}

function formatUrgenceDelai(seconds) {
  if (seconds === null || seconds === undefined || seconds === '' || isNaN(seconds)) return '—';
  const s = Number(seconds);
  if (s < 60) return s + ' sec';
  if (s < 3600) {
    const m = Math.floor(s / 60);
    const rs = s % 60;
    return rs > 0 ? (m + ' min ' + rs + ' sec') : (m + ' min');
  }
  const h = Math.floor(s / 3600);
  const rm = Math.floor((s % 3600) / 60);
  return rm > 0 ? (h + 'h ' + rm + ' min') : (h + 'h');
}

function formatUrgenceDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yyyy = d.getFullYear();
    const hh = String(d.getHours()).padStart(2, '0');
    const mn = String(d.getMinutes()).padStart(2, '0');
    return dd + '/' + mm + '/' + yyyy + ' ' + hh + ':' + mn;
  } catch(e) { return iso; }
}

// V2.12.1 — VUE SUPERVISEUR (tablette de supervision 24/7)
// ============================================================================
const superviseurState = {
  wakeLock: null,
  clockTimer: null,
  refreshTimer: null,
  active: false
};

// Demander Wake Lock pour empêcher l'écran de s'éteindre
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return false;
  try {
    superviseurState.wakeLock = await navigator.wakeLock.request('screen');
    superviseurState.wakeLock.addEventListener('release', () => {
      // Si l'utilisateur réactive l'onglet, re-demander
      if (superviseurState.active && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });
    return true;
  } catch (e) {
    console.warn('Wake Lock refusé:', e);
    return false;
  }
}

// Mettre à jour l'horloge en haut
function updateSuperviseurClock() {
  const clockEl = document.getElementById('sup-clock');
  const dateEl = document.getElementById('sup-date');
  if (!clockEl || !dateEl) return;
  
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  clockEl.textContent = `${h}:${m}:${s}`;
  
  const days = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
  const months = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
  dateEl.textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

// Démarrer le mode Superviseur (au login d'un user superviseur)
async function startSuperviseurMode() {
  superviseurState.active = true;
  
  // Wake Lock - empêcher écran de s'éteindre
  await requestWakeLock();
  
  // Charger les données initiales
  await dashboardLoadData();
  
  // Auto-refresh très fréquent (15 sec)
  let refreshCount = 0;
  superviseurState.refreshTimer = setInterval(async () => {
    if (!superviseurState.active) return;
    
    // V2.12.3 — Vérifier le keepalive audio et le redémarrer si suspendu
    if (urgenceState.keepaliveActive) {
      checkAudioKeepalive(); // tente resume si suspended
    }
    
    try {
      const resDossiers = await cloudCall('getDossiers', {});
      if (resDossiers.success) {
        dashboardState.allDossiers = (resDossiers.dossiers || []).filter(d => !d.deleted);
      }
      // V2.13.4 — Rafraîchir aussi les users toutes les 5 minutes (20 cycles × 15s)
      // pour rester à jour si l'admin crée un nouveau tech
      refreshCount++;
      if (refreshCount >= 20) {
        refreshCount = 0;
        const resUsers = await cloudCall('listUsers', {});
        if (resUsers.success) dashboardState.users = resUsers.users || [];
      }
      if (view.current === 'superviseur') render();
    } catch (e) { /* silent */ }
  }, 15000);
  
  // Horloge mise à jour toutes les secondes
  superviseurState.clockTimer = setInterval(updateSuperviseurClock, 1000);
  updateSuperviseurClock();
}

// Arrêter le mode Superviseur
function stopSuperviseurMode() {
  superviseurState.active = false;
  // V2.12.3 — Arrêter aussi le keepalive audio
  stopAudioKeepalive();
  if (superviseurState.refreshTimer) {
    clearInterval(superviseurState.refreshTimer);
    superviseurState.refreshTimer = null;
  }
  if (superviseurState.clockTimer) {
    clearInterval(superviseurState.clockTimer);
    superviseurState.clockTimer = null;
  }
  if (superviseurState.wakeLock) {
    try { superviseurState.wakeLock.release(); } catch(e) {}
    superviseurState.wakeLock = null;
  }
}

// Snooze 1h
function superviseurSnooze1h() {
  urgenceState.snoozeUntil = Date.now() + 60 * 60 * 1000;
  toast('🔇 Mode silencieux activé pour 1 heure', 'success');
  render();
}

// Annuler le snooze
function superviseurUnsnooze() {
  urgenceState.snoozeUntil = 0;
  toast('🔔 Mode silencieux désactivé', 'success');
  render();
}

// V2.13.4 — Modale détails dossier pour le superviseur (lecture seule)
// V2.13.6 — Fix : ID unique sur l'overlay + pattern de fermeture plus robuste
function openSuperviseurDossierModal(dossierId) {
  // Si une modale est déjà ouverte, la fermer d'abord (sécurité anti double-ouverture)
  const existing = document.getElementById('sup-dossier-modal');
  if (existing) existing.remove();
  
  // V2.16.6 — Lookup robuste : dashboard (admin) OU manager (dépannage) OU local
  const d = (dashboardState.allDossiers || []).find(x => x.id === dossierId)
         || (typeof managerState !== 'undefined' && (managerState.allDossiers || []).find(x => x.id === dossierId))
         || (state.dossiers || []).find(x => x.id === dossierId);
  if (!d) { toast('Dossier introuvable', 'error'); return; }
  
  const techName = dashboardGetUsername(d);
  const isCloture = dashboardIsCloture(d);
  const dateAppelStr = d.dateAppel ? new Date(d.dateAppel).toLocaleString('fr-FR', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
  const heureFinStr = d.heureFin ? new Date(d.heureFin).toLocaleString('fr-FR', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
  
  // Calcul de la durée
  let dureeStr = '—';
  if (d.dateAppel && d.heureFin) {
    const ms = new Date(d.heureFin) - new Date(d.dateAppel);
    const minutes = Math.round(ms / 60000);
    dureeStr = fmtRelativeTime(minutes);
  } else if (d.dateAppel && !isCloture) {
    const ms = Date.now() - new Date(d.dateAppel).getTime();
    const minutes = Math.round(ms / 60000);
    dureeStr = fmtRelativeTime(minutes) + ' (en cours)';
  }
  
  const km = parseFloat(d.distance) || parseFloat(d.km) || 0;
  const typeLabel = d.type === 'telephone' ? '☎️ Téléphone' : '🚗 Déplacement';
  const statutBadge = isCloture
    ? '<span style="background:rgba(34,197,94,0.15);color:#22c55e;padding:5px 12px;border-radius:8px;font-size:13px;font-weight:700">✓ CLÔTURÉ</span>'
    : '<span style="background:rgba(239,68,68,0.15);color:#ef4444;padding:5px 12px;border-radius:8px;font-size:13px;font-weight:700">🔴 EN COURS</span>';
  
  // Step actuel si en cours
  const step = !isCloture ? detectInterventionStep(d) : null;
  
  // V2.13.7 — Code astreinte
  const codeAstreinte = (d.codeAstreinte != null && String(d.codeAstreinte).trim() !== '') ? String(d.codeAstreinte) : '';
  
  // V2.13.7 — Construction de la timeline pour les déplacements
  // Cloud renvoie : dateAppel, departDomicile, arriveeSite, finIntervention (= departSite), retourDomicile
  // Local : utilise departSite (alias de finIntervention)
  const fmtTime = (iso) => {
    if (!iso || iso === '' || iso === 'X') return null;
    try {
      const dt = new Date(iso);
      if (isNaN(dt.getTime())) return null;
      return String(dt.getHours()).padStart(2, '0') + ':' + String(dt.getMinutes()).padStart(2, '0');
    } catch(e) { return null; }
  };
  const diffMinutes = (iso1, iso2) => {
    try {
      const t1 = new Date(iso1).getTime();
      const t2 = new Date(iso2).getTime();
      if (isNaN(t1) || isNaN(t2)) return null;
      return Math.round((t2 - t1) / 60000);
    } catch(e) { return null; }
  };
  const fmtDuration = (mn) => {
    if (mn === null || mn === undefined || isNaN(mn)) return '';
    if (mn < 1) return '< 1 min';
    if (mn < 60) return mn + ' min';
    const h = Math.floor(mn / 60);
    const m = mn % 60;
    return m > 0 ? (h + 'h' + String(m).padStart(2, '0')) : (h + 'h');
  };
  
  // Récupération des horodatages (gère les 2 noms de champs : cloud vs local)
  const departDom = d.departDomicile;
  const arriveeSt = d.arriveeSite;
  const departSt = d.finIntervention || d.departSite;
  const retourDom = d.retourDomicile;
  
  // Génération du HTML de la timeline (uniquement pour les déplacements)
  let timelineHtml = '';
  if (d.type === 'deplacement') {
    // Définition des 4 étapes
    const steps = [
      { 
        key: 'depart_dom',
        label: 'Départ domicile',
        icon: '🏠',
        value: departDom,
        time: fmtTime(departDom),
        isChainage: departDom === 'X'
      },
      { 
        key: 'arrivee_site',
        label: 'Arrivée sur site',
        icon: '📍',
        value: arriveeSt,
        time: fmtTime(arriveeSt)
      },
      { 
        key: 'depart_site',
        label: 'Départ du site',
        icon: '🚗',
        value: departSt,
        time: fmtTime(departSt)
      },
      { 
        key: 'retour_dom',
        label: 'Retour domicile',
        icon: '🏠',
        value: retourDom,
        time: fmtTime(retourDom),
        isChainage: retourDom === 'X'
      }
    ];
    
    // Trouver l'index de l'étape "courante" (la première vide après une remplie)
    let currentIdx = -1;
    for (let i = 0; i < steps.length; i++) {
      if (!steps[i].time && !steps[i].isChainage) {
        currentIdx = i;
        break;
      }
    }
    // Si l'intervention est clôturée, pas d'étape "en cours"
    if (isCloture) currentIdx = -1;
    
    // Pour chaque étape, calculer la durée écoulée depuis l'étape précédente remplie
    const stepHtml = steps.map((s, i) => {
      let statusColor, bgColor, iconColor, textColor, statusLabel;
      
      if (s.isChainage) {
        // Chaînage : affichage en violet
        statusColor = '#a855f7';
        bgColor = 'rgba(168,85,247,0.08)';
        iconColor = '#a855f7';
        textColor = 'var(--text)';
        statusLabel = i === 0 ? '⚓ Chaînage (depuis intervention précédente)' : '⚓ Chaînage (vers intervention suivante)';
      } else if (s.time) {
        // Étape complétée : vert
        statusColor = '#22c55e';
        bgColor = 'rgba(34,197,94,0.08)';
        iconColor = '#22c55e';
        textColor = 'var(--text)';
        statusLabel = '✓ ' + s.time;
      } else if (i === currentIdx) {
        // Étape en cours : orange animé
        statusColor = '#f97316';
        bgColor = 'rgba(249,115,22,0.10)';
        iconColor = '#f97316';
        textColor = '#f97316';
        statusLabel = '⏳ En attente';
      } else {
        // Étape future : grisée
        statusColor = 'var(--border)';
        bgColor = 'transparent';
        iconColor = 'var(--text-tertiary)';
        textColor = 'var(--text-tertiary)';
        statusLabel = '—';
      }
      
      // Calcul du delta avec étape précédente
      let deltaHtml = '';
      if (i > 0 && s.time && !s.isChainage) {
        // Chercher la précédente étape avec un vrai horodatage (pas chaînage)
        for (let j = i - 1; j >= 0; j--) {
          if (steps[j].time && !steps[j].isChainage) {
            const mn = diffMinutes(steps[j].value, s.value);
            if (mn !== null && mn >= 0) {
              deltaHtml = `<div style="margin-left:34px;font-size:10px;color:var(--text-tertiary);padding:2px 0">⏱ ${fmtDuration(mn)} depuis "${steps[j].label.toLowerCase()}"</div>`;
            }
            break;
          }
        }
      }
      // Cas spécial : si l'étape courante est en cours (orange), afficher le temps écoulé depuis la précédente
      if (i === currentIdx) {
        for (let j = i - 1; j >= 0; j--) {
          if (steps[j].time && !steps[j].isChainage) {
            const mn = diffMinutes(steps[j].value, new Date().toISOString());
            if (mn !== null && mn >= 0) {
              deltaHtml = `<div style="margin-left:34px;font-size:10px;color:#f97316;padding:2px 0;font-weight:600">⏱ Depuis ${fmtDuration(mn)}</div>`;
            }
            break;
          }
        }
      }
      
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${bgColor};border:1px solid ${statusColor === 'var(--border)' ? 'var(--border)' : statusColor + '40'};border-radius:8px;margin-bottom:${i < steps.length - 1 ? '4px' : '0'}">
          <div style="font-size:20px;line-height:1">${s.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:${textColor}">${escapeHtml(s.label)}</div>
            <div style="font-size:11px;color:${statusColor === 'var(--border)' ? 'var(--text-tertiary)' : iconColor};margin-top:2px">${statusLabel}</div>
          </div>
        </div>
        ${deltaHtml}
      `;
    }).join('');
    
    timelineHtml = `
      <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px">
        <div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;font-weight:600">⏳ Étapes de l'intervention</div>
        ${stepHtml}
      </div>
    `;
  }
  
  const overlay = document.createElement('div');
  overlay.id = 'sup-dossier-modal';
  overlay.className = 'modal-overlay visible';
  // V2.13.6 — z-index très élevé pour passer au-dessus de tout
  overlay.style.zIndex = '99999';
  overlay.innerHTML = `
    <div class="modal" style="max-width:680px;max-height:90vh;overflow-y:auto" data-modal-content="1">
      <div class="modal-header" style="background:rgba(59,130,246,0.1);position:sticky;top:0;z-index:2">
        <div class="modal-title" style="color:#3b82f6">📋 Détails du dossier</div>
        <button class="modal-close" data-close-sup-modal="1" style="background:transparent;border:none;color:var(--text-tertiary);font-size:24px;cursor:pointer;padding:0 8px">×</button>
      </div>
      <div class="modal-body" style="padding:22px">
        <!-- Header établissement + statut -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap">
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Établissement</div>
            <div style="font-size:20px;font-weight:700;color:var(--text);line-height:1.3">${escapeHtml(d.etablissement || 'Sans nom')}</div>
            ${codeAstreinte ? `<div style="font-size:12px;color:var(--text-tertiary);margin-top:4px">🔑 Code astreinte : <span style="color:var(--text);font-weight:600;font-family:monospace">${escapeHtml(codeAstreinte)}</span></div>` : ''}
          </div>
          ${statutBadge}
        </div>
        
        <!-- Type + Tech -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
            <div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Type</div>
            <div style="font-size:15px;font-weight:600;color:var(--text)">${typeLabel}</div>
          </div>
          <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
            <div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Technicien</div>
            <div style="font-size:15px;font-weight:600;color:var(--text)">${escapeHtml(techName)}</div>
          </div>
        </div>
        
        <!-- Adresse (uniquement pour déplacement, le téléphone n'en a pas besoin) -->
        ${d.type === 'deplacement' && (d.adresseSite || d.adresse) ? `
          <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:16px">
            <div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">📍 Adresse</div>
            <div style="font-size:13px;color:var(--text);line-height:1.4">${escapeHtml(d.adresseSite || d.adresse || '')}</div>
          </div>
        ` : ''}
        
        <!-- Motif -->
        ${d.motif ? `
          <div style="background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.25);border-radius:10px;padding:12px;margin-bottom:16px">
            <div style="font-size:10px;color:#3b82f6;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;font-weight:600">📝 Motif de l'intervention</div>
            <div style="font-size:14px;color:var(--text);line-height:1.5">${escapeHtml(d.motif)}</div>
          </div>
        ` : ''}
        
        <!-- V2.13.7 — Horaires : timeline pour déplacement, format simple pour téléphone -->
        ${d.type === 'deplacement' ? timelineHtml : `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
            <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
              <div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">🕐 Début</div>
              <div style="font-size:13px;color:var(--text);font-weight:600">${escapeHtml(dateAppelStr)}</div>
            </div>
            <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
              <div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">🏁 Fin</div>
              <div style="font-size:13px;color:var(--text);font-weight:600">${escapeHtml(heureFinStr)}</div>
            </div>
          </div>
        `}
        
        <!-- Durée + Km (toujours affiché) -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
            <div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">⏱ Durée totale</div>
            <div style="font-size:15px;font-weight:700;color:var(--text)">${escapeHtml(dureeStr)}</div>
          </div>
          <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;padding:12px">
            <div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">🚗 Distance</div>
            <div style="font-size:15px;font-weight:700;color:var(--text)">${km > 0 ? km.toFixed(1) + ' km' : '—'}</div>
          </div>
        </div>
        
        <!-- Étape en cours - affichée uniquement pour le téléphone (déplacement a sa timeline) -->
        ${step && d.type === 'telephone' ? `
          <div style="background:${step.color}15;border:1px solid ${step.color}40;border-radius:10px;padding:12px;margin-bottom:16px">
            <div style="font-size:10px;color:${step.color};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;font-weight:600">Étape actuelle</div>
            <div style="font-size:15px;font-weight:700;color:${step.color}">${step.emoji} ${escapeHtml(step.label)}</div>
            <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">Depuis ${fmtRelativeTime(step.sinceMin)}</div>
          </div>
        ` : ''}
        
        <!-- Récupéré ERP -->
        ${isCloture ? `
          <div style="text-align:center;padding:10px;background:var(--bg-subtle);border-radius:8px;font-size:12px;color:var(--text-tertiary)">
            ${d.recupereERP ? '✅ <span style="color:#22c55e;font-weight:600">Récupéré dans l\'ERP</span>' : '⏳ <span style="color:#f97316;font-weight:600">Non récupéré dans l\'ERP</span>'}
          </div>
        ` : ''}
      </div>
      <div class="modal-footer" style="padding:14px 22px;border-top:1px solid var(--border);text-align:center">
        <button data-close-sup-modal="1" style="padding:10px 24px;font-size:14px;background:#3b82f6;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer">Fermer</button>
      </div>
    </div>
  `;
  
  document.body.appendChild(overlay);
  
  // V2.13.6 — Fermeture robuste via délégation
  // On utilise data-close-sup-modal sur les boutons + click sur overlay (mais PAS sur le contenu de la modale)
  const closeModal = () => {
    overlay.remove();
  };
  
  overlay.addEventListener('click', (e) => {
    // Si on a cliqué sur un bouton de fermeture (peu importe la profondeur)
    if (e.target.closest('[data-close-sup-modal]')) {
      e.preventDefault();
      e.stopPropagation();
      closeModal();
      return;
    }
    // Si on a cliqué directement sur l'overlay (pas sur la modale elle-même)
    if (e.target === overlay) {
      closeModal();
    }
  });
}

// Rendu de la grande Vue Superviseur
function renderSuperviseurDashboard() {
  const inProgress = getInProgressInterventions();
  const hasActive = inProgress.length > 0;
  const snoozeActive = urgenceState.snoozeUntil > Date.now();
  const snoozeRemainingMin = snoozeActive ? Math.ceil((urgenceState.snoozeUntil - Date.now()) / 60000) : 0;
  
  // V2.12.3 — État du keepalive audio (pour afficher overlay si pas activé)
  const audioActive = checkAudioKeepalive();
  
  // État global
  let statusBadge;
  if (snoozeActive) {
    statusBadge = `<div class="superviseur-status-badge" style="background:rgba(234,179,8,0.15);color:#eab308;border-color:rgba(234,179,8,0.4)"><span class="dot"></span>MODE SILENCIEUX (${snoozeRemainingMin}min)</div>`;
  } else if (hasActive) {
    statusBadge = `<div class="superviseur-status-badge alert"><span class="dot"></span>${inProgress.length} INTERVENTION${inProgress.length > 1 ? 'S' : ''} EN COURS</div>`;
  } else {
    statusBadge = `<div class="superviseur-status-badge"><span class="dot"></span>TOUT EST CALME</div>`;
  }
  
  // Astreinte de la semaine
  const titulaireName = getAstreinteTitulaireName();
  const suppleantName = getAstreinteSuppleantName();
  
  // Derniers dossiers récupérés (5 derniers clôturés des dernières 48h)
  const last48h = new Date(Date.now() - 48 * 3600 * 1000);
  const recentClotures = dashboardState.allDossiers

// ── Charger la liste des utilisateurs ───────────────────────────
async function adminLoadUsers() {
  if (!isAdmin()) { toast('Accès refusé', 'error'); return; }
  adminState.loading = true;
  adminState.error = null;
  if (typeof render === 'function') render();

  try {
    const res = await cloudCall('listUsers', {});
    if (!res.success) throw new Error(res.error);
    adminState.users = res.users || [];
    adminState.loading = false;
    if (typeof render === 'function') render();
  } catch (err) {
    adminState.loading = false;
    adminState.error = err.message;
    toast('Erreur: ' + err.message, 'error');
    if (typeof render === 'function') render();
  }
}

// ── Créer un utilisateur ────────────────────────────────────────
async function adminCreateUser(userData) {
  if (!isAdmin()) return { success: false, error: 'Accès refusé' };

  // Validation côté frontend
  if (!userData.username || userData.username.trim().length < 2) {
    return { success: false, error: 'Username trop court (min 2 caractères)' };
  }
  if (!userData.password || userData.password.length < 6) {
    return { success: false, error: 'Mot de passe trop court (min 6 caractères)' };
  }
  if (!['admin', 'technicien', 'manager', 'superviseur'].includes(userData.role)) {
    return { success: false, error: 'Rôle invalide' };
  }

  try {
    const res = await cloudCall('createUser', userData);
    if (!res.success) return { success: false, error: res.error };
    toast(`✅ Compte "${userData.username}" créé`, 'success');
    await adminLoadUsers();
    return { success: true };
  } catch (err) {
    return { success: false, error: err.message };
  }
}

// ── Modifier un utilisateur ─────────────────────────────────────
async function adminUpdateUser(userData) {
  if (!isAdmin()) return { success: false, error: 'Accès refusé' };
  if (!userData.id) return { success: false, error: 'ID requis' };

  try {
    const res = await cloudCall('updateUser', userData);
    if (!res.success) return { success: false, error: res.error };
    toast('✅ Modifications enregistrées', 'success');
    await adminLoadUsers();
    return { success: true };
  } catch (err) {
    return { success: false, error: err.message };
  }
}

// ── Supprimer un utilisateur ────────────────────────────────────
async function adminDeleteUser(id, username) {
  if (!isAdmin()) return;
  if (!confirm(`Supprimer définitivement le compte "${username}" ?\n\nCette action est irréversible. Les dossiers de cet utilisateur resteront dans la base mais ne seront plus accessibles.`)) {
    return;
  }

  try {
    const res = await cloudCall('deleteUser', { id });
    if (!res.success) {
      toast('Erreur: ' + res.error, 'error');
      return;
    }
    toast(`🗑 Compte "${username}" supprimé`, 'success');
    await adminLoadUsers();
  } catch (err) {
    toast('Erreur: ' + err.message, 'error');
  }
}

// ── Reset password d'un utilisateur ─────────────────────────────
async function adminResetPassword(id, username) {
  if (!isAdmin()) return;

  const newPwd = prompt(`Nouveau mot de passe pour "${username}" :\n(min 6 caractères, le user devra le changer au prochain login)`, '');
  if (!newPwd) return;
  if (newPwd.length < 6) {
    toast('Mot de passe trop court (min 6 caractères)', 'error');
    return;
  }

  try {
    const res = await cloudCall('resetPassword', { id, newPassword: newPwd });
    if (!res.success) {
      toast('Erreur: ' + res.error, 'error');
      return;
    }
    toast(`🔐 Mot de passe réinitialisé pour "${username}"`, 'success');
    toast(`Communique-lui : ${newPwd}`, 'warning');
    await adminLoadUsers();
  } catch (err) {
    toast('Erreur: ' + err.message, 'error');
  }
}

// ── Handlers création/édition ───────────────────────────────────
async function handleAdminSaveNewUser() {
  const username = document.getElementById('user-username').value.trim();
  const password = document.getElementById('user-password').value;
  const nom_complet = document.getElementById('user-fullname').value.trim();
  const email = document.getElementById('user-email').value.trim();
  const role = document.getElementById('user-role').value;

  if (!username || username.includes(' ')) {
    toast('Username requis (sans espace)', 'error');
    return;
  }

  const res = await adminCreateUser({ username, password, role, nom_complet, email });
  if (res.success) {
    adminState.editingUser = null;
    adminState.creatingUser = false;
    if (typeof render === 'function') render();
  } else {
    toast('Erreur: ' + res.error, 'error');
  }
}

// ── Charger tous les dossiers (manager voit tout, admin aussi) ──
async function managerLoadDossiers() {
  if (!isManagerOrAdmin()) return;
  managerState.loading = true;
  if (typeof render === 'function') render();

  try {
    const res = await cloudCall('getDossiers', {});
    if (!res.success) throw new Error(res.error);
    managerState.allDossiers = (res.dossiers || []).filter(d => !d.deleted);

// ── Marquer un dossier "récupéré ERP" ───────────────────────────
async function managerMarkRecupered(id, currentValue) {
  if (!isManagerOrAdmin()) return;
  try {

  } catch (err) {
    toast('Erreur : ' + err.message, 'error');
  }
}

// ── Copier les infos du dossier dans le presse-papier ───────────
function managerCopyDossier(id) {
  const d = managerState.allDossiers.find(x => x.id === id);
  if (!d) return;

  const fmt = (iso) => {
    if (!iso) return '—';
    try {
      const dt = new Date(iso);
      return dt.toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    } catch (e) { return iso; }
  };

  let txt = `╔════════════════════════════════════════╗\n`;
  txt += `  DOSSIER ${d.type === 'telephone' ? '☎ TÉLÉPHONE' : '🚗 DÉPLACEMENT'}\n`;
  txt += `  Technicien : ${d.username || '—'}\n`;
  txt += `╚════════════════════════════════════════╝\n\n`;
  txt += `📅 Date appel : ${fmt(d.dateAppel)}\n`;
  txt += `🏢 Établissement : ${d.etablissement || '—'}\n`;
  if (d.codeAstreinte) txt += `🔑 Code astreinte : ${d.codeAstreinte}\n`;
  if (d.demandeur) txt += `👤 Demandeur : ${d.demandeur}\n`;
  if (d.rapportNum) txt += `📄 N° rapport : ${d.rapportNum}\n`;
  txt += `\n`;
  txt += `📋 Motif :\n${d.motif || '—'}\n\n`;

  if (d.type === 'deplacement') {
    txt += `─── HORODATAGES ───\n`;
    txt += `🏠 Départ domicile : ${d.departDomicile === 'X' ? '(chaînage entrant)' : fmt(d.departDomicile)}\n`;
    txt += `📍 Arrivée site : ${fmt(d.arriveeSite)}\n`;
    txt += `🚗 Départ site : ${fmt(d.finIntervention)}\n`;
    txt += `🏠 Retour domicile : ${d.retourDomicile === 'X' ? '(chaînage sortant)' : fmt(d.retourDomicile)}\n\n`;
    if (d.adresse) txt += `📍 Adresse site : ${d.adresse}\n`;
    if (d.km) txt += `🛣 Distance : ${d.km} km\n`;
    txt += `\n`;
  }

  if (d.rapport) txt += `📝 Rapport :\n${d.rapport}\n\n`;
  if (d.compteRendu) txt += `📄 Compte-rendu :\n${d.compteRendu}\n`;

  navigator.clipboard.writeText(txt).then(() => {
    toast('📋 Infos copiées dans le presse-papier', 'success');
  }).catch(() => {
    toast('Erreur de copie', 'error');
  });
}

// ── Helpers d'analyse ──────────────────────────────────────────
function getManagerWeekDossiers() {
  const base = new Date();
  base.setDate(base.getDate() + managerState.weekOffset * 7);
  const { start, end } = getAstreinteWeek(base);
  return managerState.allDossiers.filter(d => {
    const dt = new Date(d.dateAppel);
    return dt >= start && dt < end;
  });
}

// V2.12.0 — Distinguer dossiers "vraiment finis" vs "en cours"
// V2.13.5 — Fix : reconnaître le cas de chaînage (retourDomicile === 'X')
// Un dossier est "fini" si cloturé ET (pour déplacement : retour domicile rempli OU chaînage sortant)
function isDossierReallyFinished(d) {
  if (!d) return false;
  // Doit etre cloture
  const isClotured = d.cloture === true || d.cloture === 'true' || d.statut === 'cloture';
  if (!isClotured) return false;
  // Pour téléphone : cloture suffit (jamais de retour domicile)
  if (d.type !== 'deplacement') return true;
  // V2.13.5 — Pour un déplacement :
  // - Si retourDomicile === 'X' → chaînage sortant : l'intervention EST finie (le tech enchaîne sur une autre)
  // - Si retourDomicile est rempli avec une vraie valeur → retour effectué : l'intervention EST finie
  // - Si retourDomicile est vide ou null → le tech n'a pas saisi son retour : on considère "non fini"
  const r = d.retourDomicile;
  if (r === 'X') return true; // chaînage sortant : fini
  if (r && typeof r === 'string' && r.trim() !== '') return true; // retour saisi : fini
  return false; // retour manquant : non fini
}

// V2.12.0 — Compter les dossiers "en cours" de la semaine
function getManagerInProgressCount() {
  return getManagerWeekDossiers().filter(d => !isDossierReallyFinished(d)).length;
}

function getManagerFiltered() {
  // V2.12.0 — On exclut systematiquement les dossiers non-vraiment-finis
  let dossiers = getManagerWeekDossiers().filter(d => isDossierReallyFinished(d));

  // Filtre statut récupération
  if (managerState.filter === 'a-recuperer') {
    dossiers = dossiers.filter(d => !d.recupereERP);
  } else if (managerState.filter === 'recuperes') {
    dossiers = dossiers.filter(d => d.recupereERP);
  }

  // Filtre recherche
  if (managerState.searchQuery && managerState.searchQuery.trim()) {
    const q = managerState.searchQuery.toLowerCase().trim();
    dossiers = dossiers.filter(d =>
      (d.etablissement || '').toLowerCase().includes(q) ||
      (d.username || '').toLowerCase().includes(q) ||
      (d.motif || '').toLowerCase().includes(q) ||
      (d.codeAstreinte || '').toLowerCase().includes(q)
    );
  }

  return dossiers.sort((a, b) => {
    // V2.11.0 — Tri intelligent : non-récupérés en premier, puis date décroissante
    const aRecup = a.recupereERP ? 1 : 0;
    const bRecup = b.recupereERP ? 1 : 0;
    if (aRecup !== bRecup) return aRecup - bRecup; // 0 (non-récup) avant 1 (récup)
    return new Date(b.dateAppel) - new Date(a.dateAppel);
  });
}
function groupDossiersByTech(dossiers) {
  const byTech = {};
  for (const d of dossiers) {
    const tech = d.username || '?';
    if (!byTech[tech]) byTech[tech] = [];
    byTech[tech].push(d);
  }
  return byTech;
}
